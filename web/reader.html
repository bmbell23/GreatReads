        // backs out of the WebView or force-stops the app).
        let _pushTimer = null;
        let _pendingState = null;
        const PUSH_DEBOUNCE_MS = 1200;

        function schedulePushReadingState(state) {
            _pendingState = state;
            if (_pushTimer) clearTimeout(_pushTimer);
            _pushTimer = setTimeout(flushReadingState, PUSH_DEBOUNCE_MS);
        }

        function flushReadingState(useKeepalive) {
            if (!_pendingState || !bookId) return;
            const body = JSON.stringify({
                bookTitle:  title,
                format:     format,
                anchor:     _pendingState.anchor,
                page:       _pendingState.page,
                total:      _pendingState.total,
                progress:   _pendingState.progress,
                fontSize:   _pendingState.fontSize
            });
            _pendingState = null;
            if (_pushTimer) { clearTimeout(_pushTimer); _pushTimer = null; }
            try {
                fetch(API_URL + '/progress/' + encodeURIComponent(bookId), {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: body,
                    keepalive: !!useKeepalive
                }).catch(() => {});
            } catch (_) {}
        }

        // Pull server-side progress and reconcile with localStorage BEFORE
        // calculatePages runs its first paint. Last-writer-wins by ts vs
        // updated. The reader then reads localStorage as usual.
        async function syncReadingStateFromServer() {
            if (!bookId) return;
            try {
                const r = await fetch(API_URL + '/progress/' + encodeURIComponent(bookId));
                if (!r.ok) return;
                const remote = await r.json();
                const remoteTs = remote && remote.updated;
                if (!remoteTs) return;
                let localTs = 0;
                try {
                    const raw = localStorage.getItem(STATE_KEY);
                    if (raw) localTs = (JSON.parse(raw) || {}).ts || 0;
                } catch (_) {}
                if (remoteTs > localTs) {
                    // Server wins — adopt remote position. Shape matches
                    // loadReadingState()'s expectations.
                    localStorage.setItem(STATE_KEY, JSON.stringify({
                        page:     remote.page,
                        total:    remote.total,
                        progress: remote.progress,
                        anchor:   remote.anchor,
                        fontSize: remote.fontSize,
                        ts:       remote.updated
                    }));
                    console.log('☁️  Restored reading position from server:', remote);
                }
            } catch (_) {}
        }

        // Force a flush whenever the WebView is about to drop us (user backs
        // out, app force-stops, screen off). keepalive: true lets the request
        // outlive the page.
        function _flushOnExit() {
            if (_pendingState) flushReadingState(true);
        }
        window.addEventListener('pagehide', _flushOnExit);
        window.addEventListener('beforeunload', _flushOnExit);
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') _flushOnExit();
        });

        function loadReadingState() {
            // A "jump" entry overrides the normal saved state for one open —
            // e.g. when the user taps a highlight from the library overlay we
            // need to land on THAT anchor, not wherever they last were.
            try {
                const jraw = localStorage.getItem('ereader.jump.' + bookId);
                if (jraw) {
                    localStorage.removeItem('ereader.jump.' + bookId);
                    const j = JSON.parse(jraw);
                    return {
                        anchor: (typeof j.anchor === 'number') ? j.anchor : null,
                        page: (typeof j.page === 'number') ? j.page : null,
                        progress: 0,
                        ts: j.ts
                    };
                }
            } catch (_) {}
            try {
                const raw = localStorage.getItem(STATE_KEY);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        // ---------- Bookmark the current page ----------
        // Posts a {type:'bookmark', anchor, page, ...} entry to the backend so
        // the library-wide highlights overlay can show it. The anchor pins the
        // exact source-DOM block; the page is informational only.
        async function bookmarkCurrentPage() {
            const anchor = captureFirstVisibleAnchor();
            const body = {
                type: 'bookmark',
                bookId: bookId,
                bookTitle: title,
                anchor: anchor,
                page: currentEpubPage,
                total: totalPages,
                text: '',
                note: ''
            };
            try {
                const r = await fetch(`${API_URL}/highlights`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                flashToast('🔖 Bookmarked page ' + (currentEpubPage + 1));
            } catch (e) {
                flashToast('⚠️ Bookmark failed: ' + e.message);
            }
        }

        function flashToast(msg) {
            let t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = 'position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:rgba(0,0,0,0.85);color:#fff;padding:10px 16px;border-radius:8px;z-index:100002;font-size:14px;pointer-events:none;transition:opacity 0.3s;';
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.opacity = '1';
            clearTimeout(flashToast._h);
            flashToast._h = setTimeout(() => { t.style.opacity = '0'; }, 1800);
        }
        // ---------- Highlights ----------
        // Selecting text in #epub-content auto-saves a highlight (no popup
        // on create). Tapping an existing highlight opens a small popup
        // with three actions: delete / dictionary lookup / wiki lookup.
        // Lookup URLs are user-configurable (settings modal in the reader
        // controls menu); both default to sensible public services.
        //
        // Position is pinned to (anchor, offset, length) where:
        //   anchor = data-anchor index of the containing paragraph
        //   offset = char offset into that paragraph's textContent
        //   length = char count of the selected text
        // This survives font-size + viewport changes because anchors are
        // keyed to source-DOM nodes, and offset/length are computed on
        // the same textContent the EPUB always exposes.
        const HL_DICT_KEY = 'ereader.lookup.dict';
        const HL_WIKI_KEY = 'ereader.lookup.wiki';
        const HL_DICT_DEFAULT = 'https://www.merriam-webster.com/dictionary/{word}';
        const HL_WIKI_DEFAULT = 'https://en.wikipedia.org/wiki/Special:Search?search={word}';
        let _activeHLId = null;
        let _activeHLText = '';
        let _hlInited = false;

        function getLookupURL(kind) {
            const key = kind === 'dict' ? HL_DICT_KEY : HL_WIKI_KEY;
            const def = kind === 'dict' ? HL_DICT_DEFAULT : HL_WIKI_DEFAULT;
            try { return localStorage.getItem(key) || def; } catch (_) { return def; }
        }

        function findAnchorAncestor(node) {
            let el = node && (node.nodeType === 1 ? node : node.parentNode);
            while (el && el.id !== 'epub-content') {
                if (el.dataset && el.dataset.anchor != null) return el;
                el = el.parentNode;
            }
            return null;
        }

        // Walk text nodes inside `root`, accumulating char count until we
        // hit (targetNode, targetOffset). Returns the accumulated offset
        // or -1 if the target wasn't encountered.
        function charOffsetWithin(root, targetNode, targetOffset) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            let count = 0; let n;
            while ((n = walker.nextNode())) {
                if (n === targetNode) return count + targetOffset;
                count += n.nodeValue.length;
            }
            return -1;
        }

        // Inverse of charOffsetWithin: given a char position, return the
        // {node, offset} that lands on that character.
        function findTextPosition(root, charOffset) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
            let count = 0; let last = null; let n;
            while ((n = walker.nextNode())) {
                const len = n.nodeValue.length;
                if (charOffset <= count + len) return { node: n, offset: charOffset - count };
                count += len; last = n;
            }
            if (last) return { node: last, offset: last.nodeValue.length };
            return null;
        }

        // Wrap every text-node fragment intersected by `range` in
        // <span class="ereader-hl" data-hl-id="…">. Splits text nodes at
        // the range boundaries. Handles selections that cross inline tags
        // (e.g. through an <em>) — each crossed text node becomes its own
        // wrap, all sharing the same hlId so delete removes them together.
        function wrapRangeAsHighlight(range, hlId) {
            const rootEl = range.commonAncestorContainer.nodeType === 1
                ? range.commonAncestorContainer
                : range.commonAncestorContainer.parentNode;
            const walker = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
                acceptNode(node) {
                    const r = document.createRange();
                    r.selectNodeContents(node);
                    // intersects(range) without using the unsupported helper.
                    const after  = range.compareBoundaryPoints(Range.END_TO_START, r) > 0;
                    const before = range.compareBoundaryPoints(Range.START_TO_END, r) < 0;
                    return (after || before) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
                }
            });
            const nodes = []; let n;
            while ((n = walker.nextNode())) nodes.push(n);
            nodes.forEach(node => {
                let start = 0, end = node.nodeValue.length;
                if (node === range.startContainer) start = range.startOffset;
                if (node === range.endContainer)   end   = range.endOffset;
                if (start >= end) return;
                let target = node;
                if (start > 0) target = target.splitText(start);
                if (end - start < target.nodeValue.length) target.splitText(end - start);
                const span = document.createElement('span');
                span.className = 'ereader-hl';
                span.dataset.hlId = hlId;
                target.parentNode.insertBefore(span, target);
                span.appendChild(target);
            });
        }

        function unwrapHL(span) {
            const parent = span.parentNode;
            if (!parent) return;
            while (span.firstChild) parent.insertBefore(span.firstChild, span);
            parent.removeChild(span);
            parent.normalize();
        }
        function saveFontSizePref() {
            try { localStorage.setItem(FONT_KEY, String(fontSize)); } catch (e) {}
        }
        function loadFontSizePref() {
            try {
                const v = parseInt(localStorage.getItem(FONT_KEY) || '0', 10);
                if (v >= 12 && v <= 32) return v;
            } catch (e) {}
            return null;
        }

        // Pull the current selection if it lies entirely inside #epub-content.
        function getEpubSelectionRange() {
            const sel = window.getSelection();
            if (!sel || sel.isCollapsed || sel.rangeCount === 0) return null;
            const range = sel.getRangeAt(0);
            if (range.collapsed) return null;
            const content = document.getElementById('epub-content');
            if (!content || !content.contains(range.startContainer) || !content.contains(range.endContainer)) return null;
            return range;
        }

        // Called on touchend/mouseup. If the user selected text → save as
        // highlight (optimistic wrap, then POST). Otherwise no-op; the
        // existing page-turn handler runs separately.
        async function handleSelectionMaybe() {
            const range = getEpubSelectionRange();
            if (!range) return false;
            const text = range.toString().trim();
            if (!text) return false;
            const startAnchor = findAnchorAncestor(range.startContainer);
            const endAnchor   = findAnchorAncestor(range.endContainer);
            if (!startAnchor || startAnchor !== endAnchor) {
                flashToast('⚠️ Highlight within a single paragraph only');
                window.getSelection().removeAllRanges();
                return true;
            }
            const offset    = charOffsetWithin(startAnchor, range.startContainer, range.startOffset);
            const endOffset = charOffsetWithin(startAnchor, range.endContainer,   range.endOffset);
            if (offset < 0 || endOffset < 0 || endOffset <= offset) return true;
            const length    = endOffset - offset;
            const anchorIdx = parseInt(startAnchor.dataset.anchor, 10);

            const tmpId = 'tmp-' + Date.now();
            try { wrapRangeAsHighlight(range, tmpId); } catch (e) { console.warn('wrap failed', e); }
            window.getSelection().removeAllRanges();

            try {
                const r = await fetch(`${API_URL}/highlights`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type: 'highlight', bookId, bookTitle: title,
                        anchor: anchorIdx, offset, length,
                        page: currentEpubPage, total: totalPages,
                        text, color: 'yellow'
                    })
                });
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const saved = await r.json();
                document.querySelectorAll(`[data-hl-id="${tmpId}"]`).forEach(s => {
                    s.dataset.hlId = saved.id;
                });
                flashToast('✏️ Highlight saved');
            } catch (e) {
                document.querySelectorAll(`[data-hl-id="${tmpId}"]`).forEach(unwrapHL);
                flashToast('⚠️ Save failed: ' + e.message);
            }
            return true;
        }

        // ---------- Highlight action popup ----------
        function showHLPopup(hl) {
            _activeHLId = hl.dataset.hlId;
            _activeHLText = hl.textContent.trim();
            const popup = document.getElementById('hl-popup');
            popup.style.display = 'flex';
            // Measure after display.
            const rect = hl.getBoundingClientRect();
            const popW = popup.offsetWidth  || 168;
            const popH = popup.offsetHeight || 52;
            let left = rect.left + rect.width / 2 - popW / 2;
            let top  = rect.top - popH - 8;
            if (top < 8) top = rect.bottom + 8;
            left = Math.max(8, Math.min(left, window.innerWidth  - popW - 8));
            top  = Math.max(8, Math.min(top,  window.innerHeight - popH - 8));
            popup.style.left = left + 'px';
            popup.style.top  = top + 'px';
        }
        function hideHLPopup() {
            const popup = document.getElementById('hl-popup');
            if (popup) popup.style.display = 'none';
            _activeHLId = null; _activeHLText = '';
        }
        async function deleteHL() {
            if (!_activeHLId) return;
            const id = _activeHLId;
            hideHLPopup();
            try {
                const r = await fetch(`${API_URL}/highlights/${id}`, { method: 'DELETE' });
                if (!r.ok && r.status !== 404) throw new Error('HTTP ' + r.status);
                document.querySelectorAll(`[data-hl-id="${id}"]`).forEach(unwrapHL);
                flashToast('🗑️ Deleted');
            } catch (e) {
                flashToast('⚠️ Delete failed');
            }
        }
        function lookupHL(kind) {
            if (!_activeHLText) return;
            const url = getLookupURL(kind);
            const target = url.replace('{word}', encodeURIComponent(_activeHLText));
            hideHLPopup();
            window.open(target, '_blank');
        }

        // ---------- Apply server-side highlights on load ----------
        async function loadHighlightsForBook() {
            if (!bookId) return;
            try {
                const r = await fetch(`${API_URL}/highlights?bookId=${encodeURIComponent(bookId)}&type=highlight`);
                if (!r.ok) return;
                const data = await r.json();
                const content = document.getElementById('epub-content');
                if (!content) return;
                for (const it of (data.items || [])) {
                    if (typeof it.anchor !== 'number' || typeof it.offset !== 'number' || typeof it.length !== 'number') continue;
                    const el = content.querySelector(`[data-anchor="${it.anchor}"]`);
                    if (!el) continue;
                    const start = findTextPosition(el, it.offset);
                    const end   = findTextPosition(el, it.offset + it.length);
                    if (!start || !end) continue;
                    try {
                        const range = document.createRange();
                        range.setStart(start.node, start.offset);
                        range.setEnd(end.node, end.offset);
                        wrapRangeAsHighlight(range, it.id);
                    } catch (e) { console.warn('apply highlight failed', it.id, e); }
                }
            } catch (e) { console.warn('loadHighlightsForBook', e); }
        }

        // ---------- Lookup-URL settings modal ----------
        function openLookupSettings() {
            document.getElementById('dict-url').value = getLookupURL('dict');
            document.getElementById('wiki-url').value = getLookupURL('wiki');
            document.getElementById('hl-settings').classList.add('open');
        }
        function closeLookupSettings() {
            document.getElementById('hl-settings').classList.remove('open');
        }
        function saveLookupSettings() {
            const d = document.getElementById('dict-url').value.trim() || HL_DICT_DEFAULT;
            const w = document.getElementById('wiki-url').value.trim() || HL_WIKI_DEFAULT;
            try {
                localStorage.setItem(HL_DICT_KEY, d);
                localStorage.setItem(HL_WIKI_KEY, w);
            } catch (_) {}
            closeLookupSettings();
            flashToast('✅ Lookup URLs saved');
        }

        // Wire selection + popup once per page load. The popup closes on
        // any click that isn't inside the popup itself or on a highlight.
        function initHighlights() {
            if (_hlInited) return;
            _hlInited = true;
            document.addEventListener('click', (e) => {
                const hl = e.target.closest && e.target.closest('.ereader-hl');
                const inPopup = e.target.closest && e.target.closest('#hl-popup');
                if (hl) { showHLPopup(hl); return; }
                if (!inPopup) hideHLPopup();
            }, true);
        }

        // ---------- IndexedDB book cache (shared with index.html) ----------
        // Books are stored by id in object store "books" of database "EreaderDB".
        // Once a book is downloaded it stays available offline forever (until
        // the user clears app storage). Schema MUST match web/index.html.
        let bookDB = null;
        function openBookDB() {
            return new Promise((resolve) => {
                const req = indexedDB.open('EreaderDB', 1);
                req.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('books')) {
                        db.createObjectStore('books', { keyPath: 'id' });
                    }
                };
                req.onsuccess = (e) => { bookDB = e.target.result; resolve(bookDB); };
                req.onerror = () => resolve(null);
            });
        }
        function getCachedBookBlob(id) {
            return new Promise((resolve) => {
                if (!bookDB) { resolve(null); return; }
                try {
                    const tx = bookDB.transaction(['books'], 'readonly');
                    const req = tx.objectStore('books').get(id);
                    req.onsuccess = () => resolve(req.result || null);
                    req.onerror = () => resolve(null);
                } catch (e) { resolve(null); }
            });
        }
        function putCachedBookBlob(id, fmt, blob) {
            return new Promise((resolve) => {
                if (!bookDB) { resolve(false); return; }
                try {
                    const tx = bookDB.transaction(['books'], 'readwrite');
                    tx.objectStore('books').put({ id, format: fmt, blob, cached: new Date() });
                    tx.oncomplete = () => resolve(true);
                    tx.onerror = () => resolve(false);
                } catch (e) { resolve(false); }
            });
        }

        function toggleDualPage() {
            isDualPage = !isDualPage;
            document.body.classList.toggle('dual-page', isDualPage);
            // Re-paginate: column geometry actually changed.
            calculatePages(true);
        }

        // Auto dual page detection for foldables (Pixel Fold opens to ~2076px wide).
        function checkDualPageMode() {
            const w = (window.visualViewport && window.visualViewport.width) || window.innerWidth;
            const h = (window.visualViewport && window.visualViewport.height) || window.innerHeight;
            const shouldBeDual = w >= 900 && w > h;
            if (shouldBeDual !== isDualPage) {
                isDualPage = shouldBeDual;
                document.body.classList.toggle('dual-page', isDualPage);
                return true;
            }
            return false;
        }

        // Debounced re-pagination on viewport change. Foldables fire resize twice
        // (posture change + final size) so we wait for things to settle.
        let _resizeTimer = null;
        function scheduleRepaginate() {
            clearTimeout(_resizeTimer);
            _resizeTimer = setTimeout(() => {
                if (format.toLowerCase() !== 'epub') return;
                checkDualPageMode();
                // Always recalc: width may have changed even if dual-page state didn't.
                if (document.getElementById('epub-content')) {
                    calculatePages(true);
                }
            }, 200);
        }
        window.addEventListener('resize', scheduleRepaginate);
        window.addEventListener('orientationchange', scheduleRepaginate);
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', scheduleRepaginate);
        }

        // Override prevPage for EPUB
        function prevPage() {
            console.log('⏪ prevPage called, current:', currentEpubPage, 'total:', totalPages);

            if (format.toLowerCase() === 'epub' && totalPages > 0) {
                if (currentEpubPage > 0) {
                    currentEpubPage--;
                    console.log('📄 Going to page:', currentEpubPage + 1);
                    renderEpubPage();
                } else {
                    console.log('📗 Already at first page');
                }
            } else if (currentPage > 1 && format.toLowerCase() === 'pdf') {
                renderPage(currentPage - 1);
            }
        }

        function nextPage() {
            console.log('⏩ nextPage called, current:', currentEpubPage, 'total:', totalPages);

            if (format.toLowerCase() === 'epub' && totalPages > 0) {
                if (currentEpubPage < totalPages - 1) {
                    currentEpubPage++;
                    console.log('📄 Going to page:', currentEpubPage + 1);
                    renderEpubPage();
                } else {
                    console.log('📕 Already at last page');
                }
            } else if (currentPage < totalPages && format.toLowerCase() === 'pdf') {
                renderPage(currentPage + 1);
            }
        }

        function toggleMenu() {
            const controls = document.getElementById('reader-controls');
            controls.classList.toggle('visible');
        }

        function toggleTOC() {
            const tocOverlay = document.getElementById('toc-overlay');
            const tocList = document.getElementById('toc-list');

            if (tocOverlay.style.display === 'none') {
                // Show TOC
                tocList.innerHTML = '';
                if (tocItems.length === 0) {
                    tocList.innerHTML = '<div style="color: #aaa; padding: 20px; text-align: center; font-size: 16px;">No table of contents available</div>';
                } else {
                    tocItems.forEach(item => {
                        const tocItem = document.createElement('div');
                        tocItem.style.cssText = `
                            padding: 15px 20px;
                            padding-left: ${20 + (item.level - 1) * 30}px;
                            color: #fff;
                            cursor: pointer;
                            border-radius: 8px;
                            margin-bottom: 8px;
                            font-size: 16px;
                            transition: background 0.2s;
                        `;
                        tocItem.textContent = item.title;
                        tocItem.onclick = () => {
                            // Resolve the heading's anchor to its CURRENT
                            // page (re-paginated layouts have moved it). Fall
                            // back to legacy item.page if present.
                            let page = null;
                            if (typeof item.anchor === 'number' && !isNaN(item.anchor)) {
                                page = findPageForAnchor(item.anchor);
                            }
                            if (page == null && typeof item.page === 'number') {
                                page = item.page;
                            }
                            if (page != null) {
                                currentEpubPage = Math.min(totalPages - 1, Math.max(0, page));
                                renderEpubPage();
                            } else {
                                console.warn('TOC: could not resolve page for', item);
                            }
                            toggleTOC();
                            toggleMenu();
                        };
                        tocItem.onmouseover = () => tocItem.style.background = '#444';
                        tocItem.onmouseout = () => tocItem.style.background = 'transparent';
                        tocList.appendChild(tocItem);
                    });
                }
                tocOverlay.style.display = 'block';
            } else {
                tocOverlay.style.display = 'none';
            }
        }

        // Setup navigation - called after EPUB loads
        function setupNavigation() {
            console.log('Setting up navigation, pages:', epubPages.length);

            // Touch/swipe navigation
            let touchStartX = 0;
            let touchStartY = 0;
            let touchEndX = 0;
            let touchEndY = 0;

            const viewport = document.getElementById('epub-viewport') || document.getElementById('reader-container');

            viewport.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            viewport.addEventListener('touchend', async (e) => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                // If the user finished a text selection, save it as a
                // highlight and skip page-turn handling. Same for taps
                // that landed on an existing highlight (the click
                // listener installed by initHighlights opens the popup).
                if (await handleSelectionMaybe()) return;
                const tgt = e.target;
                if (tgt && tgt.closest && (tgt.closest('.ereader-hl') || tgt.closest('#hl-popup'))) return;
                const popup = document.getElementById('hl-popup');
                if (popup && popup.style.display !== 'none') { hideHLPopup(); return; }
                handleSwipe();
            }, { passive: true });
            // Mouse selection for desktop debugging — same code path.
            document.addEventListener('mouseup', () => { handleSelectionMaybe(); });

            function handleSwipe() {
                const diffX = touchStartX - touchEndX;
                const diffY = touchStartY - touchEndY;

                console.log('Touch detected:', diffX, diffY);

                // Swipe for page navigation
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                    if (diffX > 0) {
                        // Swipe left - next page
                        console.log('Next page (swipe)');
                        nextPage();
                    } else {
                        // Swipe right - previous page
                        console.log('Prev page (swipe)');
                        prevPage();
                    }
                }
                // Tap navigation like Kindle
                else if (Math.abs(diffX) < 30 && Math.abs(diffY) < 30) {
                    const tapX = touchEndX;
                    const screenWidth = window.innerWidth;
                    const leftZone = screenWidth * 0.25;  // Left 25% = previous
                    const rightZone = screenWidth * 0.75; // Right 25% = next

                    if (tapX < leftZone) {
                        // Tap left side - previous page
                        console.log('Prev page (tap left)');
                        prevPage();
                    } else if (tapX > rightZone) {
                        // Tap right side - next page
                        console.log('Next page (tap right)');
                        nextPage();
                    } else {
                        // Tap center - toggle menu
                        console.log('Toggle menu');
                        toggleMenu();
                    }
                }
            }

            // Volume key navigation
            document.addEventListener('keydown', (e) => {
                console.log('Key pressed:', e.key);
                if (e.key === 'ArrowUp' || e.key === 'VolumeUp') {
                    e.preventDefault();
                    prevPage();
                } else if (e.key === 'ArrowDown' || e.key === 'VolumeDown') {
                    e.preventDefault();
                    nextPage();
                } else if (e.key === 'ArrowLeft') {
                    e.preventDefault();
                    prevPage();
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    nextPage();
                }
            });

            checkDualPageMode();
        }

        // DEBUG: Show dimensions
        function updateDebugInfo() {
            const debugOverlay = document.getElementById('debug-overlay');
            if (!debugOverlay) return;

            document.getElementById('debug-screen').textContent = `${screen.width}x${screen.height}`;
            document.getElementById('debug-window').textContent = `${window.innerWidth}x${window.innerHeight}`;
            document.getElementById('debug-body').textContent = `${document.body.offsetWidth}x${document.body.offsetHeight}`;

            const readerContainer = document.getElementById('reader-container');
            if (readerContainer) {
                const rect = readerContainer.getBoundingClientRect();
                document.getElementById('debug-reader').textContent = `top=${rect.top}, h=${rect.height}`;
            }

            // Check for safe area insets
            const style = getComputedStyle(document.documentElement);
            const insetTop = style.getPropertyValue('padding-top') || '0';
            document.getElementById('debug-insets').textContent = `pad=${insetTop}`;

            // Show page info
            document.getElementById('debug-pages').textContent = `${epubPages.length} total`;
            document.getElementById('debug-current').textContent = `page ${currentEpubPage + 1}`;
        }

        setInterval(updateDebugInfo, 1000);
        setTimeout(updateDebugInfo, 500);

        // Apply persisted font-size pref before loading content so first paint
        // reflects the user's last choice (no flash from default 18).
        {
            const pref = loadFontSizePref();
            if (pref) fontSize = pref;
            const slider = document.getElementById('font-slider');
            if (slider) slider.value = fontSize;
            const lbl = document.getElementById('font-size-label');
            if (lbl) lbl.textContent = fontSize;
        }

        // Load the book
        if (format.toLowerCase() === 'pdf') {
            loadPDF();
        } else if (format.toLowerCase() === 'epub') {
            loadEPUB();
        } else {
            document.querySelector('.loading').textContent = `${format.toUpperCase()} format not supported yet. Download to read in another app.`;
        }
    </script>
</body>
</html>
