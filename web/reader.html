<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- Disable WebView HTTP cache so reader edits show up after navigation -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GreatReads — Reader</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            width: 100%;
            height: 100vh; /* Use viewport height */
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
            width: 100%;
            height: 100vh; /* Use viewport height to match screen */
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
        }
        /* Support safe area insets on notched devices */
        @supports (padding: max(0px)) {
            body {
                padding-top: env(safe-area-inset-top, 0px);
                padding-bottom: env(safe-area-inset-bottom, 0px);
            }
        }
        .header {
            display: none !important;
            height: 0 !important;
            visibility: hidden !important;
        }
        .back-btn {
            background: #2196F3;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
        }
        .book-title {
            flex: 1;
            margin: 0 20px;
            font-size: 16px;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .page-info {
            font-size: 14px;
            color: #888;
        }
        #reader-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #fff;
        }
        #pdf-canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
        }
        #epub-reader {
            width: 100%;
            height: 100%;
            background: #fefefe;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        #epub-viewport {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: relative;
        }
        #epub-viewport {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background: #fefefe;
            padding: 0;
            margin: 0;
        }
        #epub-content {
            /* Padding and column-gap are set in JS (calculatePages) so the
               column stride matches transform shift exactly. Do not set
               padding-left/right or column-gap/column-width here. */
            padding-top: 40px;
            padding-bottom: 60px;
            margin: 0;
            line-height: 1.6;
            color: #000;
            column-fill: auto;
            height: 100vh;
            box-sizing: border-box;
            position: relative;
            transition: transform 0.3s ease;
            /* Avoid orphans/widows splitting awkwardly across columns */
            orphans: 2;
            widows: 2;
            /* Explicit so Android WebView allows long-press selection. */
            -webkit-user-select: text;
            user-select: text;
            -webkit-touch-callout: default;
        }
        #epub-content p {
            margin-bottom: 1em;
            margin-left: 0;
            margin-right: 0;
        }
        #epub-content h1, #epub-content h2, #epub-content h3 {
            margin-top: 1.5em;
            margin-bottom: 0.5em;
            margin-left: 0;
            margin-right: 0;
            break-after: avoid;
            page-break-after: avoid;
        }
        /* Force every chapter (h1) and major section (h2) onto a fresh column.
           In single-column mode this == new page. In dual-page mode it lands
           at the top of either the left or right column; better than getting
           jammed mid-page. */
        #epub-content h1, #epub-content h2 {
            break-before: column;
            page-break-before: always;
            -webkit-column-break-before: always;
        }
        /* Images must:
           - Never exceed the column width (so wide images don't bleed into the
             next column on square-aspect unfolded screens).
           - Never exceed the available vertical space (full viewport minus our
             40px top + 60px bottom padding) so portrait images don't get
             clipped off the bottom.
           - Stay together as a unit — never split across a column boundary. */
        #epub-content img, #epub-content svg, #epub-content image {
            max-width: 100% !important;
            max-height: calc(100vh - 100px) !important;
            width: auto !important;
            height: auto !important;
            object-fit: contain;
            display: block;
            margin: 1em auto;
            break-inside: avoid;
            page-break-inside: avoid;
        }
        /* Figures (image + caption) also stay as a unit. */
        #epub-content figure, #epub-content picture {
            break-inside: avoid;
            page-break-inside: avoid;
            max-width: 100%;
            margin: 1em auto;
            text-align: center;
        }
        .epub-page-content img {
            max-width: 100%;
            height: auto;
            max-height: 80vh; /* Prevent images from being too tall */
        }
        .epub-page-content p {
            margin-bottom: 1em;
        }
        /* Dual page view for landscape/foldables */
        @media (min-width: 900px) and (orientation: landscape) {
            .epub-page {
                flex: 0 0 50%;
            }
        }
        body.dual-page .epub-page {
            flex: 0 0 50% !important;
        }
        .reader-controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .reader-controls.visible {
            display: flex;
        }
        .control-row {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
        }
        .control-btn {
            background: #2196F3;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            flex: 1;
            min-width: 120px;
        }
        .font-slider {
            flex: 1;
            min-width: 150px;
            height: 40px;
        }
        .progress-text {
            color: #fff;
            font-size: 16px;
            text-align: center;
            width: 100%;
        }
        .menu-close {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #888;
        }
        .controls {
            display: none;
        }
        /* STATUS_BAR_HEIGHT: kept in sync with .status-bar height + epub-content
           padding-top in JS. Don't change one without the others. */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: rgba(0, 0, 0, 0.55);
            background: transparent;
            z-index: 99999;
            pointer-events: none;
            letter-spacing: 0.3px;
        }
        .status-bar .clock { text-align: left; }
        .status-bar .build { text-align: right; }
        /* Notched font-size slider with visible tick marks */
        .font-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            height: 6px;
            background: #444;
            border-radius: 3px;
            outline: none;
            margin: 8px 0;
        }
        .font-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #2196F3;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .font-slider::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: #2196F3;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .slider-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
            width: 100%;
            padding: 0 10px;
        }
        .slider-ticks {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #888;
            font-family: ui-monospace, monospace;
        }
        .slider-ticks span { width: 1px; }

        /* ---------- Highlights ---------- */
        /* Visually wrap selected text. Translucent so the underlying
           prose stays legible; rounded so adjacent highlights touching
           don't look like one big bar. cursor:pointer because tapping
           reveals the action popup. */
        .ereader-hl {
            background: rgba(255, 213, 79, 0.45);
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .ereader-hl:hover { background: rgba(255, 213, 79, 0.7); }

        /* Floating popup that appears when an existing highlight is
           tapped. Position is set inline by JS (top/left in viewport
           coordinates). Three icon buttons: delete / dictionary / wiki. */
        .hl-popup {
            position: fixed;
            z-index: 12000;
            background: #1f1f1f;
            border: 1px solid #444;
            border-radius: 10px;
            padding: 6px;
            display: flex;
            gap: 4px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
        }
        .hl-popup button {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
        }
        .hl-popup button:hover { background: #333; }
        .hl-popup button.danger:hover { background: #5a1e1e; }

        /* Lookup-URL settings modal (reached from reader-controls). */
        .hl-settings-modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 11000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .hl-settings-modal.open { display: flex; }
        .hl-settings-modal .card {
            background: #1f1f1f;
            border-radius: 12px;
            padding: 20px;
            max-width: 520px;
            width: 100%;
            color: #fff;
        }
        .hl-settings-modal h3 { margin: 0 0 12px 0; }
        .hl-settings-modal label {
            display: block;
            color: #bbb;
            font-size: 13px;
            margin: 12px 0 4px 0;
        }
        .hl-settings-modal input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #111;
            color: #fff;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            font-family: ui-monospace, monospace;
        }
        .hl-settings-modal .hint { color: #888; font-size: 12px; margin-top: 4px; }
        .hl-settings-modal .row {
            display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px;
        }
        .hl-settings-modal button {
            padding: 10px 16px; border-radius: 8px; border: none; font-size: 14px;
            cursor: pointer;
        }
        .hl-settings-modal .save { background: #2196F3; color: #fff; }
        .hl-settings-modal .cancel { background: #333; color: #ccc; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="goBack()">← Back</button>
        <div class="book-title" id="book-title">Loading...</div>
        <div class="page-info" id="page-info"></div>
    </div>

    <div id="reader-container">
        <div class="loading">Loading book...</div>
        <canvas id="pdf-canvas" style="display:none;"></canvas>
        <div id="epub-reader" style="display:none;">
            <div id="epub-viewport">
                <div id="epub-content" class="epub-content"></div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span class="clock" id="status-clock"></span>
        <span class="build" id="build-stamp"></span>
    </div>

    <div class="reader-controls" id="reader-controls">
        <button class="menu-close" onclick="toggleMenu()">✕</button>
        <h3 style="color: #fff; margin: 0 0 10px 0;">Reading Options</h3>

        <div class="control-row">
            <span style="color: #aaa; width: 100%; text-align: center;">Font Size: <span id="font-size-label">18</span>px</span>
        </div>
        <div class="control-row">
            <div class="slider-row">
                <input type="range" class="font-slider" id="font-slider"
                       min="12" max="32" step="2" value="18"
                       list="font-size-ticks"
                       oninput="setFontSize(this.value)">
                <datalist id="font-size-ticks">
                    <option value="12"></option><option value="14"></option>
                    <option value="16"></option><option value="18"></option>
                    <option value="20"></option><option value="22"></option>
                    <option value="24"></option><option value="26"></option>
                    <option value="28"></option><option value="30"></option>
                    <option value="32"></option>
                </datalist>
                <div class="slider-ticks">
                    <span>12</span><span>14</span><span>16</span><span>18</span>
                    <span>20</span><span>22</span><span>24</span><span>26</span>
                    <span>28</span><span>30</span><span>32</span>
                </div>
            </div>
        </div>

        <div class="control-row">
            <button class="control-btn" onclick="toggleDualPage()">📖 Dual Page Mode</button>
            <button class="control-btn" onclick="toggleTOC()">📑 Table of Contents</button>
        </div>

        <div class="control-row">
            <button class="control-btn" onclick="bookmarkCurrentPage()">🔖 Bookmark this page</button>
        </div>

        <div class="control-row">
            <button class="control-btn" onclick="openLookupSettings()">🔧 Lookup URLs (dictionary / wiki)</button>
        </div>

        <div class="control-row">
            <span class="progress-text" id="progress-text">0%</span>
        </div>

    </div>

    <div class="controls">
        <button id="prev-btn" onclick="prevPage()">◄ Previous</button>
        <button id="next-btn" onclick="nextPage()">Next ►</button>
    </div>

    <!-- Transparent page progress indicator at bottom -->
    <div id="page-progress" style="position: fixed; bottom: 0; left: 0; right: 0; background: transparent; color: rgba(0,0,0,0.55); padding: 6px 12px; font-size: 11px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; text-align: center; z-index: 9000; display: none; pointer-events: none;">
        <span id="progress-display"></span>
    </div>

    <!-- Full-screen TOC overlay -->
    <div id="toc-overlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 10000; overflow-y: auto; padding: 20px;">
        <div style="max-width: 800px; margin: 0 auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="color: #fff; margin: 0;">Table of Contents</h2>
                <button onclick="toggleTOC()" style="background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 18px; cursor: pointer;">✕ Close</button>
            </div>
            <div id="toc-list" style="background: #222; border-radius: 12px; padding: 20px;"></div>
        </div>
    </div>

    <!-- Highlight-action popup. JS positions it next to the tapped highlight. -->
    <div id="hl-popup" class="hl-popup" style="display:none;">
        <button title="Look up in dictionary" onclick="lookupHL('dict')">📖</button>
        <button title="Look up in wiki"       onclick="lookupHL('wiki')">🌐</button>
        <button class="danger" title="Delete highlight" onclick="deleteHL()">🗑️</button>
    </div>

    <!-- Lookup-URL settings modal -->
    <div id="hl-settings" class="hl-settings-modal">
        <div class="card">
            <h3>Lookup URLs</h3>
            <label for="dict-url">Dictionary URL pattern</label>
            <input type="text" id="dict-url" placeholder="https://www.merriam-webster.com/dictionary/{word}">
            <div class="hint">Use <code>{word}</code> where the highlighted text goes.</div>

            <label for="wiki-url">Wiki URL pattern</label>
            <input type="text" id="wiki-url" placeholder="https://en.wikipedia.org/wiki/Special:Search?search={word}">
            <div class="hint">Same — use <code>{word}</code> as the placeholder. Per-fandom wikis work: e.g. <code>https://redrising.fandom.com/wiki/Special:Search?query={word}</code></div>

            <div class="row">
                <button class="cancel" onclick="closeLookupSettings()">Cancel</button>
                <button class="save" onclick="saveLookupSettings()">Save</button>
            </div>
        </div>
    </div>

    <script>
        // BUILD is a short cache-bust / HTML-version tag I bump on every
        // web edit so I can verify the WebView picked up the new HTML.
        // The semantic app version comes from /api/version (read live from
        // version.txt by the Flask backend); that's the one `gvc` bumps.
        // The pill shows both: "v<semver> · b<BUILD>".
        const BUILD = '2026-05-29.14-PROGRESSSYNC';
        const buildStamp = document.getElementById('build-stamp');
        buildStamp.textContent = 'b' + BUILD;
        fetch('http://100.69.184.113:8091/api/version').then(r => r.json()).then(d => {
            if (d && d.version) buildStamp.textContent = 'v' + d.version + ' · b' + BUILD;
        }).catch(() => {});

        // Status-bar clock (HH:MM, 24h). Updates each minute.
        function tickClock() {
            const d = new Date();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            const el = document.getElementById('status-clock');
            if (el) el.textContent = hh + ':' + mm;
        }
        tickClock();
        setInterval(tickClock, 30000);

        const urlParams = new URLSearchParams(window.location.search);
        const bookId = urlParams.get('id');
        const format = urlParams.get('format') || 'epub';
        const title = urlParams.get('title') || 'Book';
        const API_URL = 'http://100.69.184.113:8091/api';

        document.getElementById('book-title').textContent = title;

        let currentPage = 1;
        let totalPages = 1;
        let pdfDoc = null;
        let epubBook = null;

        // EPUB pagination state
        let epubPages = [];
        let currentEpubPage = 0;
        // fontSize is initialised from localStorage further down (after
        // loadFontSizePref is declared); 18 is the fallback default.
        let fontSize = 18;
        let isDualPage = false;

        function goBack() {
            window.location.href = 'index.html';
        }

        function updatePageInfo() {
            document.getElementById('page-info').textContent = `${currentPage}/${totalPages}`;
            document.getElementById('prev-btn').disabled = currentPage <= 1;
            document.getElementById('next-btn').disabled = currentPage >= totalPages;
        }

        async function loadPDF() {
            const url = `${API_URL}/books/${bookId}/download?format=pdf`;

            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            pdfDoc = await pdfjsLib.getDocument(url).promise;
            totalPages = pdfDoc.numPages;

            document.querySelector('.loading').style.display = 'none';
            document.getElementById('pdf-canvas').style.display = 'block';

            renderPage(1);
        }

        async function renderPage(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const canvas = document.getElementById('pdf-canvas');
            const context = canvas.getContext('2d');

            const viewport = page.getViewport({ scale: 1.5 });
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            currentPage = pageNum;
            updatePageInfo();
        }

        function prevPage() {
            if (currentPage > 1) {
                if (format.toLowerCase() === 'pdf') {
                    renderPage(currentPage - 1);
                }
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                if (format.toLowerCase() === 'pdf') {
                    renderPage(currentPage + 1);
                } else if (epubBook && epubBook.rendition) {
                    epubBook.rendition.next();
                }
            }
        }

        function prevPageEpub() {
            if (epubBook && epubBook.rendition) {
                epubBook.rendition.prev();
            }
        }

        async function loadEPUB() {
            try {
                console.log('🚀 ========== LOADING EPUB ==========');
                console.log('📚 Book ID:', bookId);
                console.log('📖 Title:', title);

                // Try IndexedDB first so we don't re-download books we've already got.
                // Falls through to a network fetch on cache miss, then stores the
                // blob for next time.
                await openBookDB();
                let arrayBuffer = null;
                const cached = await getCachedBookBlob(bookId);
                if (cached && cached.blob) {
                    console.log('📦 Using cached blob, size:', cached.blob.size);
                    arrayBuffer = await cached.blob.arrayBuffer();
                } else {
                    const url = `${API_URL}/books/${bookId}/download?format=epub`;
                    console.log('🌐 Download URL:', url);
                    const response = await fetch(url);
                    console.log('📡 Response status:', response.status);
                    console.log('📦 Content-Type:', response.headers.get('content-type'));
                    console.log('📦 Content-Length:', response.headers.get('content-length'));
                    const blob = await response.blob();
                    arrayBuffer = await blob.arrayBuffer();
                    console.log('📥 Downloaded', arrayBuffer.byteLength, 'bytes, caching\u2026');
                    putCachedBookBlob(bookId, 'epub', blob); // fire-and-forget
                }

                const zip = await JSZip.loadAsync(arrayBuffer);
                const fileList = Object.keys(zip.files);
                console.log('📂 ZIP loaded,', fileList.length, 'files inside');
                console.log('📂 First 10 files:', fileList.slice(0, 10));

                // Find content.opf to get reading order
                let contentOpf = null;
                let opfPath = '';

                // Check common locations
                for (let filename of Object.keys(zip.files)) {
                    if (filename.endsWith('.opf') || filename.endsWith('content.opf')) {
                        contentOpf = await zip.files[filename].async('text');
                        opfPath = filename.substring(0, filename.lastIndexOf('/') + 1);
                        break;
                    }
                }

                if (!contentOpf) {
                    throw new Error('Could not find content.opf');
                }

                // Parse OPF to get spine (reading order)
                const parser = new DOMParser();
                const opfDoc = parser.parseFromString(contentOpf, 'text/xml');
                const itemrefs = opfDoc.querySelectorAll('spine itemref');
                const manifest = {};

                opfDoc.querySelectorAll('manifest item').forEach(item => {
                    manifest[item.getAttribute('id')] = item.getAttribute('href');
                });

                // Extract all images and convert to data URLs
                const imageMap = {};
                for (let filename of Object.keys(zip.files)) {
                    if (!zip.files[filename].dir && /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(filename)) {
                        const blob = await zip.files[filename].async('blob');
                        imageMap[filename] = URL.createObjectURL(blob);
                        // Also store with just the basename for relative references
                        const basename = filename.split('/').pop();
                        imageMap[basename] = URL.createObjectURL(blob);
                    }
                }

                let htmlContent = '';
                for (let itemref of itemrefs) {
                    const idref = itemref.getAttribute('idref');
                    const href = manifest[idref];
                    if (href && (href.endsWith('.html') || href.endsWith('.xhtml'))) {
                        const fullPath = opfPath + href;
                        if (zip.files[fullPath]) {
                            let html = await zip.files[fullPath].async('text');

                            // Replace image paths with data URLs
                            html = html.replace(/src=["']([^"']+)["']/g, (match, imgPath) => {
                                const cleanPath = imgPath.split('?')[0];
                                // Try full path, relative to OPF path, and basename
                                const possiblePaths = [
                                    cleanPath,
                                    opfPath + cleanPath,
                                    opfPath + cleanPath.replace('../', ''),
                                    cleanPath.split('/').pop()
                                ];

                                for (let path of possiblePaths) {
                                    if (imageMap[path]) {
                                        return `src="${imageMap[path]}"`;
                                    }
                                }
                                return match;
                            });

                        }

                document.querySelector('.loading').style.display = 'none';
                document.getElementById('epub-reader').style.display = 'block';

                setTimeout(() => {
                    renderEpubContent(htmlContent, imageMap);

                console.error('❌ Error type:', error.name);
                console.error('❌ Error message:', error.message);
                console.error('❌ Error stack:', error.stack);

        }

        // NEW COLUMN-BASED PAGINATION
        let tocItems = [];
        let contentWidth = 0;
        let pageWidth = 0;        // viewport width = column stride
        let columnStride = 0;     // columnWidth + columnGap (must equal pageWidth)
        const SIDE_PADDING = 40;  // visual gutter on each side of the visible column

        function renderEpubContent(htmlContent, imageMap) {
            // Get all content
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = htmlContent;

            const bodies = tempDiv.querySelectorAll('body');
            let allContent = '';
            if (bodies.length > 0) {
                bodies.forEach(body => allContent += body.innerHTML);
            } else {
                allContent = tempDiv.innerHTML;
            }

            // Clean content
            const parser = new DOMParser();
            const doc = parser.parseFromString('<div>' + allContent + '</div>', 'text/html');
            const contentDiv = doc.body.firstChild;
            contentDiv.querySelectorAll('script, style').forEach(el => el.remove());

            // Insert cleaned content
            const epubContent = document.getElementById('epub-content');
            epubContent.innerHTML = contentDiv.innerHTML;
            epubContent.style.fontSize = fontSize + 'px';

            // Tag every leaf block element with a stable data-anchor="N".
            // Done on the live DOM (not the parsed tree) so the queries below
            // can reuse the same nodes.
            annotateAnchors(epubContent);

            // Build TOC from the live, anchored DOM so each entry carries the
            // anchor id of its heading. Tapping a TOC entry will look up the
            // page that anchor currently lives on (works regardless of font
            // size / dual-page / fold state).
            tocItems = [];
            epubContent.querySelectorAll('h1, h2, h3').forEach(heading => {
                tocItems.push({
                    title: heading.textContent.trim(),
                    level: parseInt(heading.tagName.substring(1)),
                    anchor: parseInt(heading.dataset.anchor, 10)
                });
            });

            // Load + visually apply server-side highlights AND pull the
            // latest reading position from the backend BEFORE pagination.
            // Highlights have to wrap text nodes before calculatePages
            // measures geometry; the progress sync has to land in
            // localStorage before calculatePages reads it on first paint.
            initHighlights();
            Promise.all([
                loadHighlightsForBook(),
                syncReadingStateFromServer()
            ]).finally(() => {
                setTimeout(calculatePages, 100);
            });
        }

        // ---------- Word-anchored reading position ----------
        // We tag every leaf block element (paragraph, heading, list item,
        // image, etc.) with a monotonically increasing data-anchor="N". The
        // anchor index survives every kind of re-pagination (font-size,
        // unfold, dual-page, resize) because it's keyed to the SOURCE DOM,
        // not the visual page number.
        //
        // Direct children of #epub-content is NOT enough: many EPUBs wrap an
        // entire chapter in a single <div class="chapter">, which would give
        // us exactly one anchor that's always "visible" at column 0 → font
        // changes always snap to page 1. Walking leaf blocks gives us one
        // anchor per paragraph, which is the granularity the user actually
        // experiences as "the words at the top of the page".
        const ANCHOR_SELECTOR = 'p, h1, h2, h3, h4, h5, h6, li, blockquote, pre, figure, img, table, hr, dd, dt';
        function annotateAnchors(rootEl) {
            let i = 0;
            rootEl.querySelectorAll(ANCHOR_SELECTOR).forEach(el => {
                el.dataset.anchor = String(i++);
            });
        }

        // Find the anchor whose left edge sits inside the currently visible
        // page band. Returns the anchor index (int) or null if none found.
        //
        // el.rect.left - content.rect.left gives the element's UNSHIFTED
        // offset within content (the translateX cancels in the subtraction).
        // The visible page covers unshifted-x in
        //     [currentEpubPage * columnStride, currentEpubPage * columnStride + pageWidth)
        // — NOT [0, pageWidth). Filtering on [0, pageWidth) only worked on
        // page 0, which is why every font-size change was teleporting the
        // user to the front cover.
        function captureFirstVisibleAnchor() {
            const content = document.getElementById('epub-content');
            if (!content || !columnStride) return null;
            const anchors = content.querySelectorAll('[data-anchor]');
            if (!anchors.length) return null;
            const contentLeft = content.getBoundingClientRect().left;
            const pageStart = currentEpubPage * columnStride;
            const pageEnd   = pageStart + pageWidth;
            //
            // Pass 1: prefer the anchor whose FIRST fragment (rects[0]) lies
            // in the current page band — i.e. the first paragraph that
            // BEGINS on this page. findPageForAnchor() snaps to where each
            // anchor starts, so capturing a paragraph that begins here is
            // self-consistent: at any font, "begins here" → page that
            // contains its start.
            //
            // Why this matters: column-split paragraphs (one that started
            // pages earlier and continues into the current page) have a
            // continuation rect at exactly .left == pageStart, which is the
            // numerically smallest "visible" left. A naive leftmost-rect
            // capture would pick that continuation; restore would then snap
            // to where THAT paragraph starts (way earlier), and the user
            // would visibly shift backward every time they shrank the font.
            // Filtering on rects[0] avoids that bias entirely.
            //
            let bestIdx = null;
            let bestLeft = Infinity;
            for (const el of anchors) {
                const rects = el.getClientRects();
                if (!rects.length) continue;
                const firstLeft = rects[0].left - contentLeft;
                if (firstLeft >= pageStart - 2 && firstLeft < pageEnd && firstLeft < bestLeft) {
                    bestLeft = firstLeft;
                    const n = parseInt(el.dataset.anchor, 10);
                    if (!isNaN(n)) bestIdx = n;
                }
            }
            if (bestIdx != null) return bestIdx;
            //
            // Pass 2 (fallback): no paragraph begins on this page — the
            // entire page is occupied by the continuation of one (or a few)
            // long paragraphs. Capture the element whose continuation is
            // leftmost on this page. Restore will snap to where that
            // paragraph starts (which IS on an earlier page), but that's
            // still the right paragraph and better than capturing the next
            // one (which would jump the user forward).
            //
            for (const el of anchors) {
                const rects = el.getClientRects();
                for (let i = 0; i < rects.length; i++) {
                    const left = rects[i].left - contentLeft;
                    if (left >= pageStart - 2 && left < pageEnd && left < bestLeft) {
                        bestLeft = left;
                        const n = parseInt(el.dataset.anchor, 10);
                        if (!isNaN(n)) bestIdx = n;
                    }
                }
            }
            return bestIdx;
        }

        // Map an anchor index back to the page that now contains it after
        // re-pagination. Uses the raw column position (element offset within
        // content) divided by columnStride.
        function findPageForAnchor(idx) {
            const content = document.getElementById('epub-content');
            if (!content || idx == null || !columnStride) return null;
            const el = content.querySelector('[data-anchor="' + idx + '"]');
            if (!el) return null;
            const rawLeft = el.getBoundingClientRect().left - content.getBoundingClientRect().left;
            return Math.max(0, Math.floor(rawLeft / columnStride));
        }

        // calculatePages(preserveProgress, presetAnchor)
        //   preserveProgress  — true on resize/font-change/dual-toggle; false
        //                       on first paint (where we restore from disk).
        //   presetAnchor      — caller-supplied anchor captured BEFORE a
        //                       reflow that would have invalidated our own
        //                       captureFirstVisibleAnchor() (e.g. font-size
        //                       change). When supplied, we trust it over a
        //                       fresh capture.
        function calculatePages(preserveProgress = false, presetAnchor) {
            const content = document.getElementById('epub-content');
            const viewport = document.getElementById('epub-viewport');
            if (!content) return;

            // Capture the user's current position BEFORE we change any layout
            // styles. Two strategies, in priority order:
            //   1. anchorIdx  — the data-anchor of the first paragraph/heading
            //      visible on the current page. Survives font-size and viewport
            //      changes exactly because anchors are keyed to source DOM
            //      nodes, not column positions. This is the "same first words"
            //      guarantee the user asked for.
            //   2. prevProgress — bare 0..1 fraction, fallback when no anchor
            //      is available (e.g. first paint with only a legacy saved
            //      state from an older build).
            let anchorIdx = null;
            let prevProgress = 0;
            let directPage = null;  // used by "jump to bookmark" when no anchor
            if (preserveProgress && totalPages > 0) {
                // presetAnchor wins if provided (caller already captured before
                // their own reflow-causing change).
                anchorIdx = (presetAnchor !== undefined && presetAnchor !== null)
                    ? presetAnchor
                    : captureFirstVisibleAnchor();
                prevProgress = currentEpubPage / totalPages;
            } else {
                const saved = loadReadingState();
                if (saved) {
                    if (typeof saved.anchor === 'number') anchorIdx = saved.anchor;
                    if (typeof saved.page === 'number')   directPage = saved.page;
                    if (typeof saved.progress === 'number') prevProgress = saved.progress;
                    console.log('📌 Restoring reading position:', saved);
                }
            }

            // Use visualViewport when available (more accurate on foldables and when
            // the on-screen keyboard or browser chrome is in play). Fall back to
            // window.innerWidth / clientWidth.
            const vv = window.visualViewport;
            pageWidth = Math.round((vv && vv.width) || window.innerWidth || document.documentElement.clientWidth);
            const vpHeight = Math.round((vv && vv.height) || window.innerHeight || document.documentElement.clientHeight);

            // Make the viewport and content exactly one viewport wide so transforms
            // align pixel-for-pixel with the column stride.
            if (viewport) {
                viewport.style.width = pageWidth + 'px';
                viewport.style.height = vpHeight + 'px';
            }
            content.style.width = pageWidth + 'px';
            content.style.height = vpHeight + 'px';

            // Dual-page mode: when the foldable is open (wide + landscape) we
            // show two columns per visible page. Stride is still one viewport.
            const dual = isDualPage || (pageWidth >= 900 && pageWidth > vpHeight);
            const columnCount = dual ? 2 : 1;

            // PAGINATION INVARIANT (the only thing that matters):
            //   columnWidth + columnGap == pageWidth / columnCount
            // If this holds, then translateX(-pageWidth) advances by exactly
            // columnCount whole columns and the visible band lands at the
            // identical on-screen position every page. If it does NOT hold,
            // each page turn drifts by the mismatch, exposing more of the
            // next column on the right side — the "leaking next page" bug.
            //
            // We pick columnGap = 2 * SIDE_PADDING (so half a gap lives on
            // each side of every column as its gutter) and derive columnWidth
            // from the invariant. Container padding-left/right = SIDE_PADDING
            // gives the FIRST page its left/right gutters; for every other
            // page the gutters come from the column-gap on either side.
            const columnGap = 2 * SIDE_PADDING;
            const columnWidth = Math.floor(pageWidth / columnCount) - columnGap;

            content.style.paddingLeft = SIDE_PADDING + 'px';
            content.style.paddingRight = SIDE_PADDING + 'px';
            content.style.columnGap = columnGap + 'px';
            content.style.columnWidth = columnWidth + 'px';
            content.style.columnCount = columnCount;
            content.style.columnFill = 'auto';

            // Stride between visible "pages" == one full viewport.
            columnStride = pageWidth;

            // Force reflow before measuring.
            // eslint-disable-next-line no-unused-expressions
            content.offsetHeight;

            setTimeout(() => {
                contentWidth = content.scrollWidth;
                // Number of viewport-sized pages. Use ceil so trailing content isn't clipped.
                totalPages = Math.max(1, Math.ceil(contentWidth / columnStride));

                // Prefer the anchor — it gives us "same first words on the page"
                // even though totalPages may have changed. Fall back to the
                // saved progress fraction if the anchor isn't available (e.g.
                // legacy state from before this build).
                let targetPage = null;
                if (anchorIdx != null) {
                    targetPage = findPageForAnchor(anchorIdx);
                }
                if (targetPage == null && directPage != null) {
                    targetPage = directPage;
                }
                if (targetPage == null) {
                    targetPage = Math.round(prevProgress * totalPages);
                }
                currentEpubPage = Math.min(totalPages - 1, Math.max(0, targetPage));

                console.log('📊 Page calc:', {
                    pageWidth, vpHeight, dual, columnCount,
                    columnWidth, columnGap,
                    contentScrollWidth: contentWidth,
                    totalPages, currentEpubPage,
                    anchorIdx, viaAnchor: anchorIdx != null
                });

                renderEpubPage();
                document.getElementById('page-progress').style.display = 'block';
            }, 50);
        }

        function OLD_paginateEpubContent_DEPRECATED(htmlContent, imageMap) {

            tocItems = [];

                        lineCount = 0;

                    epubPages.push(elem.outerHTML);
                    currentPageHTML = '';
                    lineCount = 0;
                }
                else if (lineCount + approxLines > MAX_PAGE_HEIGHT && currentPageHTML) {

                    epubPages.push(currentPageHTML);
                    currentPageHTML = elem.outerHTML;
                    lineCount = approxLines;
                } else {

                    currentPageHTML += elem.outerHTML;
                    lineCount += approxLines;
                }

            if (currentPageHTML.trim()) {
                epubPages.push(currentPageHTML);
            }

            // Ensure at least one page
            if (epubPages.length === 0) {
                epubPages.push(allContent);
            }

            totalPages = epubPages.length;
            console.log('Created', epubPages.length, 'pages and', tocItems.length, 'TOC items');
            console.log('Page sizes:', epubPages.map((p, i) => `Page ${i+1}: ${p.length} chars`).join(', '));

            if (epubPages.length <= 3) {
                console.warn('⚠️ VERY FEW PAGES! Debugging info:');
                console.log('Total elements:', elements.length);
                console.log('Content div children:', contentDiv.children.length);
                console.log('Raw content length:', allContent.length);
                epubPages.forEach((page, idx) => {
                    console.log(`Page ${idx + 1} HTML:`, page.substring(0, 200));
                });
            }
        }

        function renderEpubPage() {
            const content = document.getElementById('epub-content');
            if (!content || !columnStride) return;

            // Shift by exactly one viewport-width per page so the column we land
            // on sits in the same centered band as page 1.
            const offset = -(currentEpubPage * columnStride);
            content.style.transform = `translateX(${offset}px)`;

            console.log('📄 Page', currentEpubPage + 1, '/', totalPages,
                        '| offset:', offset, '| stride:', columnStride);
            updateProgress();
        }

        function updateProgress() {
            const progress = ((currentEpubPage + 1) / totalPages * 100).toFixed(1);
            const display = `Page ${currentEpubPage + 1} of ${totalPages} (${progress}%)`;
            document.getElementById('progress-display').textContent = display;
            saveReadingState();
        }

        // ---------- Font-size changes (slider + +/- buttons) ----------
        //
        // The slider fires `oninput` on EVERY intermediate tick during a
        // drag (20 → 22 → 24 → 26 fires four events). If we captured the
        // anchor and reflowed on each event, the second-and-later captures
        // would run against a DOM whose fontSize had already been mutated
        // by the first event but whose currentEpubPage / columnStride were
        // still from the OLD layout — the page-band math goes inconsistent
        // and we capture the wrong anchor. The end result: 20→24 in one
        // drag drifts; 20→22 then 22→24 in two separate touches doesn't.
        //
        // Fix: capture the anchor exactly ONCE at the start of any change
        // burst, debounce the reflow, and feed that original anchor into
        // calculatePages when the burst settles. Intermediate ticks only
        // update the visible label.
        let fontChangeAnchor = null;
        let fontChangeTimer  = null;
        const FONT_SETTLE_MS = 120;

        function scheduleFontReflow() {
            if (fontChangeTimer) clearTimeout(fontChangeTimer);
            fontChangeTimer = setTimeout(() => {
                fontChangeTimer = null;
                const anchor = fontChangeAnchor;
                fontChangeAnchor = null;
                const content = document.getElementById('epub-content');
                if (!content) return;
                content.style.fontSize = fontSize + 'px';
                // Two RAFs so the browser commits the style + reflow before
                // calculatePages measures geometry. setTimeout-0 has been
                // unreliable on WebView during pinch/scroll.
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    calculatePages(true, anchor);
                }));
            }, FONT_SETTLE_MS);
        }

        function changeFontSize(delta) {
            // Button-driven (single discrete step) — capture immediately,
            // then route through the debouncer so rapid taps still coalesce.
            if (fontChangeAnchor == null) {
                fontChangeAnchor = captureFirstVisibleAnchor();
            }
            fontSize = Math.max(12, Math.min(32, fontSize + delta));
            document.getElementById('font-slider').value = fontSize;
            const label = document.getElementById('font-size-label');
            if (label) label.textContent = fontSize;
            saveFontSizePref();
            scheduleFontReflow();
        }

        function setFontSize(size) {
            // Slider-driven (oninput fires every tick during a drag).
            // Capture anchor ONCE on the first tick of the burst — every
            // subsequent tick reuses that captured anchor so the user's
            // visible position survives the whole drag.
            if (fontChangeAnchor == null) {
                fontChangeAnchor = captureFirstVisibleAnchor();
            }
            fontSize = parseInt(size);
            const label = document.getElementById('font-size-label');
            if (label) label.textContent = fontSize;
            saveFontSizePref();
            scheduleFontReflow();
        }

        // ---------- Reading-state persistence ----------
        // localStorage key shape: ereader.state.<bookId> -> { page, total, progress, ts }
        // Saved on every page turn and on calculatePages() once we know total.
        // Restored by calculatePages() on first paint (preserveProgress === false).
        const STATE_KEY = 'ereader.state.' + bookId;
        const FONT_KEY  = 'ereader.fontSize';

        function saveReadingState() {
            if (!bookId || !totalPages) return;

                // font/viewport changes) AND the bare progress fraction
                // (fallback for legacy state or content with no anchors).
                const anchor = captureFirstVisibleAnchor();
                const state = {
                    page: currentEpubPage,
                    total: totalPages,
                    progress: currentEpubPage / totalPages,
                    anchor: anchor,
                    fontSize: fontSize,
                    ts: Date.now()
                };
                localStorage.setItem(STATE_KEY, JSON.stringify(state));
                // Mirror to the backend (debounced) so the position survives
                // APK reinstalls and follows the reader to other devices.
                schedulePushReadingState(state);

        // saveReadingState() runs on every page turn; we don't want to PUT
