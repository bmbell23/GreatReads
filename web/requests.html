<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Requests · GreatReads</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            overflow-x: hidden;
            padding-top: 56px;   /* room for fixed top bar */
            padding-bottom: 80px;
        }
        /* Top bar — back arrow + title + new-request button. Mirrors the
           status-bar pattern in index.html but single-row and simpler. */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 56px;
            z-index: 99999;
            background: rgba(18, 18, 18, 0.92);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            padding: 0 12px;
            gap: 8px;
        }
        .top-bar .icon-btn {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 22px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
        }
        .top-bar .icon-btn:active { background: #2a2a2a; }
        /* "+ New" pill — labelled so it's unmistakable on first run. */
        .top-bar .new-btn {
            background: #4067ef;
            border: none;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
        }
        .top-bar .new-btn:active { filter: brightness(1.2); }
        .top-bar .title {
            flex: 1;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 0.2px;
        }
        .container { padding: 12px 12px 0 12px; }
        .group-header {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
            padding: 14px 4px 6px 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .group-header .count {
            background: #2a2a2a;
            color: #bbb;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .req-card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .req-card:active { background: #262626; }
        .req-card.status-Backlog    { border-left-color: #6b7280; }
        .req-card.status-Requested  { border-left-color: #c940b0; }
        .req-card.status-InProgress { border-left-color: #4067ef; }
        .req-card.status-Done       { border-left-color: #4ade80; opacity: 0.75; }
        .req-title { font-size: 15px; font-weight: 600; }
        .req-meta {
            margin-top: 4px;
            font-size: 11px;
            color: #888;
            display: flex;
            gap: 10px;
        }
        .empty {
            color: #666;
            font-size: 13px;
            text-align: center;
            padding: 40px 20px;
        }
        /* Detail overlay (single-item view) */
        .overlay {
            position: fixed;
            inset: 0;
            background: #121212;
            z-index: 100000;
            display: none;
            flex-direction: column;
        }
        .overlay.open { display: flex; }
        .overlay .top-bar { position: relative; }
        .overlay-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px 14px 80px 14px;
        }
        .field-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: #888;
            margin: 14px 0 6px 0;
        }
        .field-input, .field-textarea, .field-select {
            width: 100%;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            padding: 10px 12px;
            font-family: inherit;
        }
        .field-textarea { min-height: 120px; resize: vertical; line-height: 1.4; }
        .field-input:focus, .field-textarea:focus, .field-select:focus {
            outline: none;
            border-color: #4067ef;
        }
        .row-buttons { display: flex; gap: 8px; margin-top: 16px; }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
        }
        .btn-primary { background: #4067ef; }
        .btn-secondary { background: #2a2a2a; }
        .btn-danger { background: #7a2222; }
        .btn:active { filter: brightness(1.2); }
        .comment {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }
        .comment .c-meta {
            font-size: 11px;
            color: #888;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .comment .c-text { font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .comment-composer { display: flex; gap: 8px; align-items: flex-end; }
        .comment-composer .field-textarea { min-height: 60px; }
        .comment-composer .btn { flex: 0 0 auto; padding: 10px 14px; }

        /* ----- Tabbed sections for the detail view -----
           Horizontal scroller so an arbitrary number of tabs still fits on
           the foldable's cover screen. The "+" pill at the end adds a new
           tab; long-press a tab to rename/delete (handled in JS). */
        .tabs-bar {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 4px 0 8px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 10px;
            scrollbar-width: none;
        }
        .tabs-bar::-webkit-scrollbar { display: none; }
        .tab {
            flex: 0 0 auto;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            color: #ccc;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            -webkit-user-select: none;
            user-select: none;
        }
        .tab.active {
            background: #4067ef;
            border-color: #4067ef;
            color: #fff;
        }
        .tab.add-tab { color: #888; font-weight: 700; padding: 8px 14px; }
        /* Rich-text toolbar — sticky to the top of the editor area so it
           stays in reach as the user scrolls a long section body. */
        .rt-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            padding: 6px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .rt-toolbar button {
            background: #2a2a2a;
            border: none;
            color: #ddd;
            min-width: 32px;
            height: 32px;
            padding: 0 8px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            font-family: inherit;
        }
        .rt-toolbar button:active { background: #3a3a3a; }
        .rt-toolbar .sep { width: 1px; background: #333; margin: 4px 2px; }
        /* contenteditable surface. Visually mirrors .field-textarea but
           renders HTML — used for section bodies. */
        .rt-editor {
            min-height: 200px;
            max-height: 60vh;
            overflow-y: auto;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 0 0 8px 8px;
            padding: 12px 14px;
            font-size: 14px;
            line-height: 1.55;
            color: #fff;
            outline: none;
        }
        .rt-editor:focus { border-color: #4067ef; }
        .rt-editor h1 { font-size: 20px; margin: 12px 0 8px; }
        .rt-editor h2 { font-size: 17px; margin: 10px 0 6px; }
        .rt-editor h3 { font-size: 15px; margin: 8px 0 4px; color: #bbb; }
        .rt-editor p  { margin: 6px 0; }
        .rt-editor ul, .rt-editor ol { margin: 6px 0 6px 22px; }
        .rt-editor li { margin: 2px 0; }
        .rt-editor a  { color: #6b8eff; text-decoration: underline; }
        .rt-editor code {
            background: #2a2a2a;
            padding: 1px 5px;
            border-radius: 4px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            font-size: 12.5px;
        }
        .rt-editor pre {
            background: #0e0e0e;
            border: 1px solid #2a2a2a;
            padding: 10px 12px;
            border-radius: 6px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .rt-editor pre code { background: transparent; padding: 0; }
        .rt-editor blockquote {
            border-left: 3px solid #4067ef;
            padding: 2px 0 2px 12px;
            margin: 8px 0;
            color: #bbb;
        }
        .rt-editor:empty::before {
            content: attr(data-placeholder);
            color: #555;
            pointer-events: none;
        }
        /* Section action row — rename / delete buttons under the editor. */
        .section-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .section-actions .mini-btn {
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #aaa;
            font-size: 12px;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
        }
        .section-actions .mini-btn:active { background: #2a2a2a; }
        .section-actions .mini-btn.danger { color: #ff7676; border-color: #5a2222; }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="icon-btn" id="back-btn" aria-label="Back">←</button>
        <div class="title">Requests</div>
        <button class="new-btn" id="new-btn" aria-label="New request">+ New</button>
    </div>

    <div class="container" id="container"></div>

    <!-- Detail overlay: shown when a request is tapped, or when creating new. -->
    <div class="overlay" id="detail-overlay">
        <div class="top-bar">
            <button class="icon-btn" id="detail-back" aria-label="Back">←</button>
            <div class="title" id="detail-title">Request</div>
            <button class="icon-btn" id="detail-delete" aria-label="Delete" style="color:#ff7676; font-size: 18px;">🗑️</button>
        </div>
        <div class="overlay-body" id="detail-body"></div>
    </div>

    <script src="requests.js"></script>
</body>
</html>
