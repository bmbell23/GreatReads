<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GreatReads — Player</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png?v=4">
    <style>
        /* Bi-pride / brand palette — blue → purple → pink, sampled from the
           GreatReads wordmark so the player matches the rest of the app.
           Light surface + brand accents to match the GreatReads site chrome. */
        :root {
            --brand-blue: #4067EF;
            --brand-purple: #8640C0;
            --brand-pink: #C940B0;
            --brand-grad: linear-gradient(90deg, #4067EF 0%, #8640C0 50%, #C940B0 100%);
            --bg: #f8f9fa;
            --surface: #ffffff;
            --track: #e3e6ea;
            --text: #212529;
            --muted: #6c757d;
            --border: #e9ecef;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background:
                radial-gradient(120% 60% at 50% -10%, rgba(134,64,192,0.12), transparent 60%),
                var(--bg);
            color: var(--text); overflow: hidden;
            height: 100vh; display: flex; flex-direction: column;
            padding: env(safe-area-inset-top) env(safe-area-inset-right)
                     env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .top-bar { display: flex; align-items: center; gap: 8px; padding: 12px 14px; }
        .icon-btn {
            background: none; border: none; color: var(--text); font-size: 22px;
            cursor: pointer; padding: 6px; line-height: 1; border-radius: 8px;
        }
        .icon-btn:active { background: var(--border); }
        .icon-btn.hidden { display: none; }
        /* Minimize affordance (Audible-style): a clean, centred down-chevron.
           Behaviour is still back/Home until the persistent mini-player lands. */
        #back-btn { font-size: 30px; line-height: 0.7; padding: 2px 8px 8px; }
        .top-bar .now { font-size: 13px; color: var(--muted); overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap; flex: 1; text-align: center; }
        .stage { flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 8px 24px 4px; gap: 16px; min-height: 0; }
        /* Portrait: the wrapper is transparent so meta/bars/controls remain
           direct flex children of .stage (unchanged layout). Landscape (below)
           turns it into a real column beside the cover. */
        .stage-main { display: contents; }
        /* Cover is HEIGHT-driven with aspect-ratio computing the width (#224/#226):
           constraining both axes plus aspect-ratio lets a max-* clamp distort the
           ratio (the "2.5:3" bug). Only height is capped; max-width is a generous
           safety that won't bind in normal cases, so the 2:3 shape always holds.
           Height kept modest so the portrait stack doesn't overflow into the top bar. */
        .cover {
            height: min(40vh, 320px); width: auto; aspect-ratio: 2/3; max-width: 82vw;
            border-radius: 16px;
            object-fit: cover; box-shadow: 0 12px 40px rgba(134,64,192,0.20),
                0 0 0 1px rgba(0,0,0,0.06);
            background: var(--brand-grad);
        }
        .meta { text-align: center; max-width: 92%; }
        .meta .title { font-size: 20px; font-weight: 700; line-height: 1.3; }
        .meta .author { font-size: 14px; color: var(--muted); margin-top: 4px; }
        .chapter { font-size: 13px; color: var(--brand-pink); margin-top: 6px; min-height: 18px;
            font-weight: 600;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90vw; }

        /* ---- Progress bars (book + chapter) ---- */
        .bars { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 14px; }
        .bar-block { display: flex; flex-direction: column; gap: 4px; }
        .bar-head { display: flex; justify-content: space-between; align-items: baseline;
            font-size: 11px; letter-spacing: 0.3px; }
        .bar-head .lbl { color: var(--muted); text-transform: uppercase; font-weight: 700; font-size: 10px; }
        .bar-head .pct { color: var(--brand-pink); font-weight: 700; }
        .seek {
            -webkit-appearance: none; appearance: none; width: 100%; height: 8px;
            border-radius: 99px; outline: none; cursor: pointer;
            background: var(--track);
        }
        /* The filled portion is painted via a JS-set background gradient stop. */
        .seek::-webkit-slider-thumb {
            -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: var(--brand-purple); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.25);
            border: 2px solid #fff;
        }
        .seek::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%; background: var(--brand-purple);
            border: 2px solid #fff; cursor: pointer;
        }
        .seek.chapter { height: 6px; }
        .times { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }

        /* ---- Transport ---- */
        .controls { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 2px;
            position: relative; width: 100%; max-width: 560px; }
        /* Bookmark-add sits outside the symmetric group so play stays centred.
           .controls spans the bar width, so right:0 reaches the far right edge. */
        #bm-add { position: absolute; right: 0; top: 50%; transform: translateY(-50%); }
        .controls .icon-btn { font-size: 26px; position: relative; }
        /* PNG icons for search / bookmark — brightness(0) forces the glyph dark
           regardless of the source PNG's colour, so they read on the light bar. */
        .icon-png { width: 24px; height: 24px; display: block; filter: brightness(0); opacity: 0.72; }
        /* Bookmark-add: same png + a small "+" badge so it reads as "add" */
        .bm-add-wrap { position: relative; display: inline-block; }
        .bm-add-plus { position: absolute; bottom: -4px; right: -5px;
            font-size: 12px; font-weight: 900; line-height: 1; color: var(--brand-pink);
            text-shadow: 0 0 3px rgba(255,255,255,0.9); pointer-events: none; }
        .play-btn {
            width: 74px; height: 74px; border-radius: 50%;
            background: var(--brand-grad);
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; padding: 0;
            box-shadow: 0 6px 20px rgba(134,64,192,0.45);
        }
        .play-btn img { width: 34px; height: 34px; display: block; pointer-events: none;
            /* PNGs are dark glyphs; invert to white so they read on the gradient. */
            filter: invert(1) brightness(1.6); }
        .play-btn:active { transform: scale(0.95); }
        .skip-label { font-size: 12px; color: var(--muted); display: block; margin-top: 2px; font-weight: 600; }

        /* ---- Bottom bar: speed slider ---- */
        .bottom-bar { display: flex; align-items: center; gap: 14px;
            padding: 12px 20px 12px;
            margin-bottom: calc(60px + env(safe-area-inset-bottom, 0px)); }
        .speed-wrap { flex: 1; display: flex; align-items: center; gap: 10px; }
        .speed-pill { flex-shrink: 0; min-width: 52px; text-align: center; font-size: 13px;
            font-weight: 700; color: var(--brand-purple); background: rgba(134,64,192,0.12);
            border: 1px solid rgba(134,64,192,0.30); border-radius: 99px; padding: 4px 8px; }
        #speed {
            -webkit-appearance: none; appearance: none; flex: 1; height: 6px;
            border-radius: 99px; outline: none; cursor: pointer; background: var(--track);
        }
        #speed::-webkit-slider-thumb {
            -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%;
            background: var(--brand-pink); cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.25); }
        #speed::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%; background: var(--brand-pink);
            border: none; cursor: pointer; }
        .text-btn { background: var(--surface); border: 1px solid var(--border); color: var(--brand-purple);
            font-weight: 600; border-radius: 8px;
            padding: 8px 14px; font-size: 14px; cursor: pointer; flex-shrink: 0; }
        .text-btn:active { background: var(--border); }

        /* Chapter drawer */
        .drawer-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; z-index: 50; align-items: flex-end; }
        .drawer-backdrop.open { display: flex; }
        .drawer { width: 100%; max-height: 70vh; background: var(--surface);
            border-radius: 16px 16px 0 0; display: flex; flex-direction: column;
            box-shadow: 0 -8px 30px rgba(0,0,0,0.15); }
        .drawer h3 { padding: 16px; font-size: 15px; border-bottom: 1px solid var(--border); }
        .drawer-list { overflow-y: auto; padding: 8px 0 calc(8px + env(safe-area-inset-bottom,0px)); }
        .ch-row { padding: 12px 16px; font-size: 14px; cursor: pointer; display: flex;
            justify-content: space-between; gap: 12px; }
        .ch-row:active { background: var(--bg); }
        .ch-row.active { color: var(--brand-pink); font-weight: 600; }
        .ch-row .ch-time { color: var(--muted); font-size: 12px; flex-shrink: 0; }

        /* Bookmark rows */
        .bm-row { padding: 6px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .bm-row:active { background: var(--bg); }
        /* One line: label (chapter) + sub (% · time) side-by-side (#80). */
        .bm-row .bm-main { flex: 1; min-width: 0; display: flex; align-items: baseline; gap: 8px; }
        .bm-row .bm-label { font-size: 14px; overflow: hidden; text-overflow: ellipsis;
            white-space: nowrap; flex: 1; min-width: 0; }
        .bm-row .bm-sub { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
        .bm-row .bm-del { flex-shrink: 0; background: none; border: none; color: #adb5bd;
            font-size: 20px; line-height: 1; padding: 4px 6px; cursor: pointer; border-radius: 6px; }
        .bm-row .bm-del:active { background: #f8d7da; color: #dc3545; }
        .bm-empty { color: var(--muted); padding: 20px 16px; text-align: center; font-size: 14px; }
        .bm-sec { padding: 12px 16px 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
            text-transform: uppercase; color: #8640C0; }

        /* Reader overlay (in-book search / read while audio keeps playing) */
        .reader-overlay { position: fixed; inset: 0; z-index: 90; background: var(--bg);
            display: none; flex-direction: column; }
        .reader-overlay.open { display: flex; }
        .reader-overlay .ro-bar { display: flex; align-items: center; gap: 10px;
            padding: calc(env(safe-area-inset-top,0px) + 8px) 12px 8px; background: var(--surface);
            border-bottom: 1px solid var(--border); }
        .reader-overlay .ro-bar .ro-title { flex: 1; font-size: 13px; color: var(--muted);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .reader-overlay .ro-mini { display: flex; align-items: center; gap: 8px; font-size: 12px;
            color: var(--brand-pink); }
        .reader-overlay iframe { flex: 1; width: 100%; border: none; background: var(--bg); }

        .overlay-msg {
            position: fixed; inset: 0; display: flex; align-items: center;
            justify-content: center; text-align: center; padding: 32px; color: var(--muted);
            font-size: 15px; background: var(--bg); z-index: 80;
        }
        .overlay-msg.hidden { display: none; }

        /* ---- Landscape on a phone-height viewport ----
           A short, wide viewport can't fit the portrait stack (cover + meta +
           two bars + controls) — it overflows and, with body{overflow:hidden},
           the lower controls get clipped and the middle squishes. Lay the cover
           beside the controls instead so everything fits without scrolling.
           Gated on max-height so tablets / large landscape (where the portrait
           stack fits fine) are unaffected.

           The second clause also fires this side-by-side layout on a foldable
           unfolded in landscape (Pixel 10 Fold Pro, #60): those are wide but
           NOT short (height ~800px), so max-height:600 misses them and the tall
           portrait stack overflows into a square box (controls overlap the
           bars). The near-square aspect ratio (5/6–6/5) catches foldables
           without hitting 4:3 tablets (1.33) or tall phones (~0.46). */
        @media (orientation: landscape) and (max-height: 600px),
               (orientation: landscape) and (min-aspect-ratio: 5/6) and (max-aspect-ratio: 6/5) {
            .stage {
                flex-direction: row;
                align-items: center;
                justify-content: center;
                gap: 28px;
                padding: 6px 28px;
            }
            .cover {
                /* Height-driven; aspect-ratio (2:3) sets width. Cap height only —
                   max-width stays generous so the ratio can't be clamped (#226). */
                height: min(80vh, 300px);
                max-width: 42vw;
            }
            .stage-main {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                flex: 1 1 auto;
                min-width: 0;
                max-width: 560px;
            }
            .meta .title { font-size: 17px; }
            .bars { gap: 8px; }
            /* Drop the reserved portrait nav-bar gap so the speed bar isn't
               pushed off the short viewport. */
            .bottom-bar {
                padding: 6px 20px;
                margin-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
            }
        }

        /* ---- Foldable held upright (near-square portrait, #60) ----
           A foldable unfolded in portrait is ~1:1, so the full portrait stack
           (cover + meta + two bars + controls) is roughly the entire viewport
           height and overflows — squishing the controls into the bars. Shrink
           the cover, tighten the gaps, and drop the reserved nav-bar margin so
           it fits. Gated on the near-square aspect ratio: min 5/6 (0.83)
           excludes tall phones (~0.46) and 3:4 tablets (0.75). */
        @media (orientation: portrait) and (min-aspect-ratio: 5/6) {
            .stage { gap: 10px; padding: 6px 24px; }
            /* Height-driven so the near-square foldable keeps an EXACT 2:3 (the old
               width + max-height clamp produced ~2.5:3). Smaller so the full stack
               fits the ~1:1 viewport. (#226) */
            .cover { height: min(38vh, 300px); max-width: 44vw; }
            .meta .title { font-size: 18px; }
            .bars { gap: 8px; }
            .bottom-bar {
                padding: 8px 20px;
                margin-bottom: calc(8px + env(safe-area-inset-bottom, 0px));
            }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <button class="icon-btn" id="back-btn" title="Minimize" aria-label="Minimize">⌄</button>
        <span class="now" id="chapter-title"></span>
        <button class="icon-btn hidden" id="search-btn" title="Search the book"><img src="assets/search.png" alt="Search" class="icon-png"></button>
        <button class="icon-btn" id="bm-list-btn" title="Bookmarks"><img src="assets/bookmark.png" alt="Bookmarks" class="icon-png"></button>
    </div>

    <div class="stage">
        <img class="cover" id="cover" alt="">
        <!-- Wrapper is display:contents in portrait (transparent — meta/bars/
             controls stay direct flex children of .stage). In landscape it
             becomes a real flex column so the cover can sit beside it. -->
        <div class="stage-main">
        <div class="meta">
            <div class="title" id="title"></div>
            <div class="author" id="author"></div>
        </div>

        <div class="bars">
            <!-- Book progress: seeks the whole book. -->
            <div class="bar-block">
                <div class="bar-head"><span class="lbl">Book</span><span class="pct" id="book-pct">0%</span></div>
                <input type="range" class="seek" id="scrubber" min="0" max="1000" value="0" step="1">
                <div class="times"><span id="elapsed">0:00</span><span id="remaining">-0:00</span></div>
            </div>
            <!-- Chapter progress: seeks within the current chapter. -->
            <div class="bar-block">
                <div class="bar-head"><span class="lbl">Chapter</span><span class="pct" id="ch-pct">0%</span></div>
                <input type="range" class="seek chapter" id="ch-scrubber" min="0" max="1000" value="0" step="1">
                <div class="times"><span id="ch-elapsed">0:00</span><span id="ch-remaining">-0:00</span></div>
            </div>
        </div>

        <div class="controls">
            <button class="icon-btn" id="prev-ch" title="Previous chapter">⏮</button>
            <button class="icon-btn" id="back30" title="Back 30s">↺<span class="skip-label">30</span></button>
            <button class="play-btn" id="play" title="Play/Pause"><img id="play-img" src="assets/play.png" alt="Play"></button>
            <button class="icon-btn" id="fwd30" title="Forward 30s">↻<span class="skip-label">30</span></button>
            <button class="icon-btn" id="next-ch" title="Next chapter">⏭</button>
            <!-- Absolutely positioned so it doesn't shift the centred group -->
            <button class="icon-btn" id="bm-add" title="Bookmark this spot" aria-label="Bookmark this spot">
                <span class="bm-add-wrap">
                    <img src="assets/bookmark.png" alt="" class="icon-png">
                    <span class="bm-add-plus" aria-hidden="true">+</span>
                </span>
            </button>
        </div>
        </div><!-- /.stage-main -->
    </div>

    <div class="bottom-bar">
        <div class="speed-wrap">
            <input type="range" id="speed" min="1" max="3" step="0.1" value="1">
            <span class="speed-pill" id="speed-pill">1.0×</span>
        </div>
        <button class="text-btn" id="chapters-btn2">Chapters</button>
    </div>

    <div class="drawer-backdrop" id="drawer-backdrop">
        <div class="drawer">
            <h3>Chapters</h3>
            <div class="drawer-list" id="chapter-list"></div>
        </div>
    </div>

    <!-- Bookmarks drawer. Lists this audiobook's bookmarks plus any made in the
         matching ebook (synced by percentage). Tapping a row seeks there. -->
    <div class="drawer-backdrop" id="bm-backdrop">
        <div class="drawer">
            <h3>Bookmarks</h3>
            <div class="drawer-list" id="bm-list"></div>
        </div>
    </div>

    <!-- In-book reader/search overlay. Hosts reader.html in an iframe so the
         <audio> element in THIS document keeps playing while the user reads or
         searches the matching ebook. -->
    <div class="reader-overlay" id="reader-overlay">
        <div class="ro-bar">
            <button class="icon-btn" id="ro-back" title="Back to player">‹</button>
            <span class="ro-title" id="ro-title">Book</span>
            <span class="ro-mini" id="ro-mini">🎧 playing</span>
        </div>
        <iframe id="reader-frame" title="Reader"></iframe>
    </div>

    <div class="overlay-msg" id="overlay-msg"></div>

    <audio id="audio" preload="auto"></audio>
    <script src="quotes.js?v=1"></script>
    <script src="active-book.js?v=1"></script>
    <script>
        // Start the loading-quote screen immediately — before the (CDN) hls.js
        // and player.js load — so there's no blank/"Starting playback…" flash
        // before the quote appears (#55). player.js's init() re-starts it
        // idempotently. API base matches player.js's API_URL.
        try { GreatReadsQuotes.start(document.getElementById('overlay-msg'), 'http://100.69.184.113:8092/api'); } catch (e) {}
    </script>
    <!-- Vendored locally (#23) so audiobook playback works offline + bundles into the APK shell. -->
    <script src="vendor/hls.min.js"></script>
    <script src="player.js?v=47"></script>
</body>
</html>
