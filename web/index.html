        // When returning from the reader, the cached set and reading state may
        // have changed \u2014 refresh on visibility-change. Also re-pull progress
        // so an updated mtime from the reader bubbles into the recent sort.
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                refreshCachedIds();
                ensureProgressBooksLoaded();
            }
        });

        // Fallback scroll listener: catches cases where the IntersectionObserver
        // fires before layout is fully settled (rare on desktop, harmless on mobile).
        window.addEventListener('scroll', () => {
            if (!searchQuery && window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
                loadBooks();
            }
        }, { passive: true });

        // ---------- Per-book context menu ----------
        // Triggered by right-click (desktop) or long-press (touch). Currently
        // only "Clear Reading Progress" but designed to grow (metadata edit,
        // cover edit, etc.). The menu is positioned at the pointer/touch
        // point and clamped to the viewport.
        const bookCtxMenu = document.getElementById('book-ctx-menu');
        const bookCtxBackdrop = document.getElementById('book-ctx-backdrop');
        const bookCtxTitle = document.getElementById('book-ctx-title');
        let _ctxBookId = null;
        let _ctxBookTitle = null;
        let _longPressTimer = null;
        // Timestamp of the most recent menu dismiss.  onBookOpen ignores clicks
        // that arrive within 300 ms — that's enough to swallow the synthesized
        // click that the dismiss-tap itself generates (~50–150 ms) while being
        // short enough to never block a genuinely separate, intentional tap.
        // A boolean flag (_suppressNextClick) got permanently stuck true when
        // the dismiss tap landed on the backdrop (display:none by the time the
        // click fires), so the click never reached onBookOpen to clear the flag.
        let _menuDismissedAt = 0;
        let _longPressStart = null;

        function showBookCtxMenu(x, y, bookEl) {
            _ctxBookId = bookEl.dataset.bookId;
            _ctxBookTitle = bookEl.dataset.bookTitle || '';
            bookCtxTitle.textContent = _ctxBookTitle;
            // Position then clamp to viewport (right/bottom edges).
            bookCtxMenu.style.left = x + 'px';
            bookCtxMenu.style.top = y + 'px';
            bookCtxBackdrop.classList.add('open');
            bookCtxMenu.classList.add('open');
            const r = bookCtxMenu.getBoundingClientRect();
            const vw = window.innerWidth, vh = window.innerHeight;
            if (r.right > vw - 8) bookCtxMenu.style.left = (vw - r.width - 8) + 'px';
            if (r.bottom > vh - 8) bookCtxMenu.style.top  = (vh - r.height - 8) + 'px';
        }
        function hideBookCtxMenu() {
            bookCtxMenu.classList.remove('open');
            bookCtxBackdrop.classList.remove('open');
            _ctxBookId = null;
            _ctxBookTitle = null;
            // Cancel any pending long-press timer so it can't reopen the menu
            // on a stale touch sequence after the user has dismissed it.
            clearTimeout(_longPressTimer);
            _longPressTimer = null;
            _longPressStart = null;
        }
        // Dismiss on any pointer-down outside the menu. Bound at the document
        // level in the CAPTURE phase so it runs no matter which element is hit
        // (independent of the backdrop's stacking) and before the book's own
        // click. A pointer-down can never leave a full-screen element covering
        // the grid, so — unlike the old backdrop click/touchstart juggling —
        // this design cannot wedge the UI into a locked, non-clickable state.
        document.addEventListener('pointerdown', (e) => {
            if (!bookCtxMenu.classList.contains('open')) return;
            if (bookCtxMenu.contains(e.target)) return; // tap inside the menu → let the button handle it
            hideBookCtxMenu();
            // Record when we dismissed so onBookOpen can ignore the synthesized
            // click this same touch will generate (typically fires 50–150 ms
            // later).  A timestamp can't get permanently stuck the way a boolean
            // flag can — it naturally expires after 300 ms regardless of whether
            // the click event fires or not.
            _menuDismissedAt = Date.now();
        }, true);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideBookCtxMenu();
        });
        window.addEventListener('scroll', hideBookCtxMenu, true);

        // Right-click (desktop / mouse).
        document.getElementById('content').addEventListener('contextmenu', (e) => {
            const bookEl = e.target.closest('.book');
            if (!bookEl) return;
            e.preventDefault();
            showBookCtxMenu(e.clientX, e.clientY, bookEl);
        });

        // Long-press (touch) opens the menu. The book-open click that the same
        // touch synthesizes is ignored by onBookOpen while the menu is open.
        const contentEl = document.getElementById('content');
        contentEl.addEventListener('touchstart', (e) => {
            const bookEl = e.target.closest('.book');
            if (!bookEl) return;
            const t = e.touches[0];
            _longPressStart = { x: t.clientX, y: t.clientY };
            clearTimeout(_longPressTimer);
            _longPressTimer = setTimeout(() => {
                showBookCtxMenu(_longPressStart.x, _longPressStart.y, bookEl);
            }, 500);
        }, { passive: true });
        contentEl.addEventListener('touchmove', (e) => {
            // If the finger drifts more than ~10px, cancel the long-press
            // (it's a scroll, not a press).
            if (!_longPressStart) return;
            const t = e.touches[0];
            const dx = t.clientX - _longPressStart.x;
            const dy = t.clientY - _longPressStart.y;
            if (dx*dx + dy*dy > 100) {
                clearTimeout(_longPressTimer);
                _longPressTimer = null;
            }
        }, { passive: true });
        contentEl.addEventListener('touchend', () => {
            clearTimeout(_longPressTimer);
            _longPressTimer = null;
            _longPressStart = null;
        }, { passive: true });

        // In-app confirmation modal. Returns a Promise<bool>. Replaces the
        // native confirm(): on the Android WebView a native JS dialog leaves
        // the view dropping synthesized `click` events afterward (long-press
        // still fires, taps don't), which locked the grid after a menu action.
        function appConfirm(message, okLabel) {
            return new Promise((resolve) => {
                const backdrop = document.getElementById('confirm-backdrop');
                const confirmBox = backdrop.querySelector('.confirm-box');
                const okBtn = document.getElementById('confirm-ok');
                const cancelBtn = document.getElementById('confirm-cancel');
                document.getElementById('confirm-msg').textContent = message;
                okBtn.textContent = okLabel || 'OK';
                let done = false;
                const cleanup = (val) => {
                    if (done) return;
                    done = true;
                    backdrop.classList.remove('open');
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                    backdrop.removeEventListener('click', onBackdrop);
                    backdrop.removeEventListener('touchstart', onBackdropTouch);
                    resolve(val);
                };
                const onOk = () => cleanup(true);
                const onCancel = () => cleanup(false);
                // Use !contains instead of target===backdrop: on mobile a tap near
                // the box edge can report a child element as the target even though
                // the visual hit is outside the box, causing ev.target===backdrop to
                // be false and the modal to get permanently stuck open.
                const onBackdrop = (ev) => { if (!confirmBox.contains(ev.target)) cleanup(false); };
                // touchstart fires before the 300ms click synthesis — use it for a
                // fast, reliable dismiss on Android WebView.
                const onBackdropTouch = (ev) => { if (!confirmBox.contains(ev.target)) cleanup(false); };
                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
                backdrop.addEventListener('click', onBackdrop);
                backdrop.addEventListener('touchstart', onBackdropTouch, { passive: true });
                backdrop.classList.add('open');
            });
        }

        // Menu actions. Capture the id/title BEFORE hiding the menu, then run
        // the (now in-app) confirmation. We use appConfirm() rather than the
        // native confirm() because the latter poisons synthesized click
        // delivery on the Android WebView, freezing taps until reload.

        // Mark as Finished
        let _finishBookId = null;
        let _finishBookData = null;
        let _finishReadingId = null;  // GreatReads reading ID (for re-reads)

        document.getElementById('ctx-mark-finished').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!_ctxBookId) { hideBookCtxMenu(); return; }
            const id = _ctxBookId;
            const book = findBookById(id);
            hideBookCtxMenu();
            if (!book) {
                alert('Could not find book data');
                return;
            }
            await openFinishDialog(id, book);
        });

        async function openFinishDialog(bookId, book) {
            _finishBookId = bookId;
            _finishBookData = book;

            // Populate book info
            document.getElementById('finish-book-title').textContent = book.title || 'Unknown';
            document.getElementById('finish-book-author').textContent = book.author || 'Unknown';

            // Set default date to today
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('finish-date').value = today;

            // Fetch format from GreatReads if available
            let defaultMedia = 'Ebook';
            try {
                const formatResp = await fetch(`${API_URL}/greatreads/format/${encodeURIComponent(bookId)}`);
                if (formatResp.ok) {
                    const formatData = await formatResp.json();
                    if (formatData.media) {
                        // GreatReads knows the format - use it
                        defaultMedia = formatData.media;
                        // Store the readingId so we can update the exact reading (handles re-reads)
                        _finishReadingId = formatData.readingId;
                    } else {
                        // GreatReads doesn't have this book yet - infer from mediaTypes
                        _finishReadingId = null;
                        const mediaTypes = book.mediaTypes || [];
                        if (mediaTypes.includes('audiobook') && !mediaTypes.includes('ebook')) {
                            defaultMedia = 'Audio';
                        } else if (mediaTypes.includes('ebook')) {
                            defaultMedia = 'Ebook';
                        }
                    }
                }
            } catch (error) {
                console.warn('Failed to fetch GreatReads format, using fallback:', error);
                // Fallback to inferring from mediaTypes
                _finishReadingId = null;
                const mediaTypes = book.mediaTypes || [];
                if (mediaTypes.includes('audiobook') && !mediaTypes.includes('ebook')) {
                    defaultMedia = 'Audio';
                } else if (mediaTypes.includes('ebook')) {
                    defaultMedia = 'Ebook';
                }
            }
            document.getElementById('finish-media').value = defaultMedia;

            // Reset all detailed ratings to 0
            ['enjoyment', 'readability', 'characters', 'writing', 'world-building', 'spice', 'horror'].forEach(key => {
                document.getElementById(`rating-${key}`).value = '0';
                document.getElementById(`rating-${key}-value`).textContent = '0';
            });

            document.getElementById('finish-overlay').classList.add('open');
        }

        function closeFinishDialog() {
            document.getElementById('finish-overlay').classList.remove('open');
            _finishBookId = null;
            _finishBookData = null;
            _finishReadingId = null;
        }

        async function submitFinishBook() {
            if (!_finishBookId || !_finishBookData) return;

            const submitBtn = document.getElementById('finish-submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';

            // Capture book data before we might close the dialog
            const bookTitle = _finishBookData.title;
            const bookAuthor = _finishBookData.author;

            try {
                const finishDate = document.getElementById('finish-date').value;
                const media = document.getElementById('finish-media').value;

                // Collect all detailed ratings (all are required, send all values)
                const detailedRatings = {};
                ['enjoyment', 'readability', 'characters', 'writing', 'world_building', 'spice', 'horror'].forEach(key => {
                    const inputKey = key.replace('_', '-');
                    const val = parseFloat(document.getElementById(`rating-${inputKey}`).value);
                    detailedRatings[key] = val;
                });

                // Calculate overall rating as average of the detailed ratings
                const ratingValues = Object.values(detailedRatings);
                const overallRating = ratingValues.reduce((sum, val) => sum + val, 0) / ratingValues.length;

                const response = await fetch(`${API_URL}/greatreads/finish`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bookId: _finishBookId,
                        title: bookTitle,
                        author: bookAuthor,
                        media: media,
                        finishDate: finishDate,
                        rating: overallRating,
                        ratings: detailedRatings,
                        readingId: _finishReadingId  // Exact GreatReads reading to update (handles re-reads)
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.message || error.error || 'Failed to mark as finished');
                }

                const result = await response.json();

                // Clear local state for the finished book
                try {
                    localStorage.removeItem('ereader.state.' + _finishBookId);
                } catch (_) {}

                // Remove from in-memory progress maps
                progressMap.delete(String(_finishBookId));
                mergedProgressIds.delete(String(_finishBookId));

                // Also clear audiobook progress if this book has an absId
                const finishedBook = homeBooks.find(b => String(b.id) === String(_finishBookId));
                if (finishedBook && finishedBook.absId) {
                    audioProgressByAbsId.delete(String(finishedBook.absId));
                    try {
                        localStorage.removeItem('ereader.state.abs:' + finishedBook.absId);
                    } catch (_) {}
                }

                closeFinishDialog();

                // Show success and offer to start next book. The backend
                // /finish endpoint deliberately does NOT auto-start the next
                // reading — that's our job here, only on user confirm, via
                // POST /api/greatreads/start-next. On Cancel we touch nothing.
                if (result.nextBook) {
                    const nextTitle = result.nextBook.title;
                    const ok = await appConfirm(
                        `✓ Marked "${bookTitle}" as finished!\n\n` +
                        `Start reading "${nextTitle}" (next in your GreatReads TBR)?`,
                        'Start Reading'
                    );
                    if (ok) {
                        if (result.nextBook.readingId && !result.nextBook.alreadyStarted) {
                            try {
                                // Day after the finish date keeps the chronology sane.
                                let startDate = finishDate;
                                try {
                                    const d = new Date(finishDate + 'T00:00:00');
                                    d.setDate(d.getDate() + 1);
                                    startDate = d.toISOString().slice(0, 10);
                                } catch (_) {}
                                await fetch(`${API_URL}/greatreads/start-next`, {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        readingId: result.nextBook.readingId,
                                        startDate
                                    })
                                });
                            } catch (e) {
                                console.warn('Failed to start next GreatReads reading:', e);
                            }
                        }
                        // Open the next book in the local library (if we matched one)
                        if (result.nextBook.id) {
                            const nextBookEl = document.querySelector(`[data-book-id="${result.nextBook.id}"]`);
                            if (nextBookEl) {
                                onBookOpen(nextBookEl);
                            }
                        }
                    }
                } else {
                    alert(`✓ Marked "${bookTitle}" as finished in GreatReads!`);
                }

                // Reload progress from server to reflect the cleared progress
                await ensureProgressBooksLoaded();
            } catch (error) {
                console.error('Failed to mark as finished:', error);
                alert(`Failed to mark as finished: ${error.message}`);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        }

        // Wire up rating sliders to update their value displays
        ['rating-enjoyment', 'rating-readability', 'rating-characters',
         'rating-writing', 'rating-world-building', 'rating-spice', 'rating-horror'].forEach(id => {
            const slider = document.getElementById(id);
            const valueSpan = document.getElementById(`${id}-value`);
            if (slider && valueSpan) {
                slider.addEventListener('input', () => {
                    valueSpan.textContent = slider.value;
                });
            }
        });

        document.getElementById('ctx-clear-progress').addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!_ctxBookId) { hideBookCtxMenu(); return; }
            const id = _ctxBookId;
            const title = _ctxBookTitle;
            hideBookCtxMenu();
            const ok = await appConfirm(`Clear reading progress for "${title}"?\n\nThis removes your saved page and any per-book state. Highlights and bookmarks are NOT affected.`, 'Clear');
            if (!ok) return;
            try { localStorage.removeItem('ereader.state.' + id); } catch (_) {}
            try {
                await fetch(`${API_URL}/progress/${encodeURIComponent(id)}`, { method: 'DELETE' });
            } catch (_) { /* offline / server down — local clear still happened */ }
            // Drop it from the recent-sort map so it stops floating to the top.
            progressMap.delete(String(id));
            mergedProgressIds.delete(String(id));
            reRender();
        });

        // ---------- Hamburger menu ----------
        const menuBtn = document.getElementById('menu-btn');
        const menuPopup = document.getElementById('menu-popup');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuPopup.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!menuPopup.contains(e.target) && e.target !== menuBtn) {
                menuPopup.classList.remove('open');
            }
        });

        // ---------- Unified menu wiring ----------
        // Highlights/Bookmarks open in-page overlays; everything else navigates.
        // The GreatReads pages are served same-origin under /greatreads/ via the
        // proxy, so plain location.href works in both the browser and the WebView.
        document.getElementById('menu-highlights').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openOverlay('highlight');
        });
        document.getElementById('menu-bookmarks').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openOverlay('bookmark');
        });
        const MENU_NAV = {
            'menu-home':     '/',
            'menu-tbr':      '/greatreads/tbr',
            'menu-journal':  '/greatreads/journal',
            'menu-library':  '/greatreads/library',
            'menu-books':    '/greatreads/books',
            'menu-stats':    '/greatreads/stats',
            'menu-settings': '/greatreads/settings',
        };
        Object.entries(MENU_NAV).forEach(([id, href]) => {
            document.getElementById(id).addEventListener('click', () => {
                menuPopup.classList.remove('open');
                window.location.href = href;
            });
        });

        // ---------- Keep-awake setting ----------
        // Reader settings (keep-awake, page-time thresholds, lookup URLs) now live
        // on the consolidated GreatReads Settings page, which persists them to these
        // same localStorage keys (same origin via the /greatreads/ proxy). The
        // library page only needs to READ keep-awake to honour it while browsing.
        const KEEP_AWAKE_KEY = 'ereader.settings.keepAwake';

        // ---------- Screen wake lock ----------
        // Mirrors the logic in reader.html so the library page also honours the
        // "Keep screen awake" toggle — otherwise the screen sleeps while the
        // user is browsing for their next book, even with the setting on. See
        // reader.html for the longer comment on why the Android bridge is the
        // only reliable path inside the WebView.
        let _wakeLock = null;
        async function applyWakeLock() {
            const want = localStorage.getItem(KEEP_AWAKE_KEY) === '1';
            if (!want) { releaseWakeLock(); return; }
            if (window.Android && typeof window.Android.keepScreenOn === 'function') {
                try { window.Android.keepScreenOn(true); return; } catch (_) {}
            }
            if ('wakeLock' in navigator) {
                try {
                    if (!_wakeLock || _wakeLock.released) {
                        _wakeLock = await navigator.wakeLock.request('screen');
                    }
                } catch (_) {}
            }
        }
        function releaseWakeLock() {
            if (_wakeLock && !_wakeLock.released) { try { _wakeLock.release(); } catch (_) {} }
            _wakeLock = null;
            if (window.Android && typeof window.Android.keepScreenOn === 'function') {
                try { window.Android.keepScreenOn(false); } catch (_) {}
            }
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') applyWakeLock();
        });
        document.addEventListener('touchstart', () => { applyWakeLock(); }, { passive: true });
        applyWakeLock();

        // ---------- Highlights & Bookmarks open/close ----------
        // Two entry points drive the same overlay, grouped by book, searchable.
        function openOverlay(type) {
            const ov = document.getElementById('hl-overlay');
            ov.dataset.type = type;
            const isBM = (type === 'bookmark');
            document.getElementById('hl-title').textContent = isBM ? 'Bookmarks' : 'Highlights';
            document.getElementById('hl-search').placeholder =
                isBM ? 'Search bookmarks, books, authors…'
                     : 'Search highlights, books, authors…';
            document.getElementById('hl-search').value = '';
            ov.classList.add('open');
            loadHighlights();
        }
        function closeHighlights() {
            document.getElementById('hl-overlay').classList.remove('open');
        }
        let _hlDebounce = null;
        document.getElementById('hl-search').addEventListener('input', () => {
            clearTimeout(_hlDebounce);
            _hlDebounce = setTimeout(loadHighlights, 200);
        });

        async function loadHighlights() {
            const type = document.getElementById('hl-overlay').dataset.type || 'highlight';
            const q = document.getElementById('hl-search').value.trim();
            const list = document.getElementById('hl-list');
            list.innerHTML = '<div class="loading">Loading…</div>';
            const params = new URLSearchParams();
            params.set('type', type);
            if (q) params.set('q', q);
            try {
                const r = await fetch(`${API_URL}/highlights?` + params.toString());
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const data = await r.json();
                renderHighlights(data.items || [], type);
            } catch (e) {
                list.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
            }
        }
        function renderHighlights(items, type) {
            const list = document.getElementById('hl-list');
            if (!items.length) {
                const noun = type === 'bookmark' ? 'bookmarks' : 'highlights';
                const verb = type === 'bookmark' ? 'Bookmark a page' : 'Highlight some text';
                list.innerHTML = `<div class="loading">No ${noun} yet. ${verb} in a book to get started.</div>`;
                return;
            }
            // Group by bookId; newest item inside each group bubbles up first.
            const groups = new Map();  // bookId -> { title, author, items: [] }
            for (const it of items) {
                const bid = String(it.bookId);
                if (!groups.has(bid)) {
                    groups.set(bid, {
                        bookId: bid,
                        title:  it.bookTitle || '?',
                        author: it.bookAuthor || '',
                        items: [],
                    });
                }
                groups.get(bid).items.push(it);
            }
            // Order the book groups using the same sort as the main library.
            // applySort needs objects shaped like books — synthesize the
            // minimum it touches and fall through with .bookId so id-based
            // helpers (readingStateFor, etc.) keep working.
            const synthBooks = Array.from(groups.values()).map(g => ({
                id: g.bookId, title: g.title, author: g.author,
            }));
            // Books that aren't in allBooks (deleted from library, etc.)
            // are still synthesized above, so they always render — they
            // just sort by title/recent the same way.
            const ordered = applySort(synthBooks);
            list.innerHTML = ordered.map(b => {
                const g = groups.get(String(b.id));
                if (!g) return '';
                const itemsHTML = g.items.map(it => {
                    const when = new Date(it.created).toLocaleString();
                    const meta = `page ${it.page != null ? it.page + 1 : '?'}${it.total ? '/' + it.total : ''} · ${when}`;
                    const body = it.text || it.note || (it.type === 'bookmark' ? '🔖 Bookmark' : '');
                    return `<div class="hl-item ${it.type}">
                        <div class="hl-meta">${meta}</div>
                        <div class="hl-text">${escapeHTML(body)}</div>
                        <div class="hl-actions">
                            <button onclick="jumpToHighlight('${it.id}', '${it.bookId}', ${it.anchor != null ? it.anchor : 'null'}, ${it.page != null ? it.page : 'null'})">Open in book</button>
                            <button class="danger" onclick="deleteHighlight('${it.id}')">Delete</button>
                        </div>
                    </div>`;
                }).join('');
                return `<div class="hl-group">
                    <div class="hl-group-head">
                        <div class="hl-group-title">${escapeHTML(g.title)}<span class="hl-group-author">${g.author ? ' — ' + escapeHTML(g.author) : ''}</span></div>
                        <div class="hl-group-count">${g.items.length}</div>
                    </div>
                    ${itemsHTML}
                </div>`;
            }).join('');
        }
        window.jumpToHighlight = function(_id, bookId, anchor, page) {
            // Hand off to reader.html. It already reads localStorage state on
            // open; we stash a one-shot jump target so the reader knows to
            // override the saved position with this specific anchor/page.
            try {
                localStorage.setItem('ereader.jump.' + bookId,
                    JSON.stringify({ anchor, page, ts: Date.now() }));
            } catch (_) {}
            // Best-effort lookup of format from loaded books; fall back to epub.
            const b = allBooks.find(x => String(x.id) === String(bookId));
            const fmt = (b && (b.formats || [])[0]) || 'epub';
            const title = (b && b.title) || '';
            location.href = `reader.html?id=${encodeURIComponent(bookId)}&format=${encodeURIComponent(fmt)}&title=${encodeURIComponent(title)}`;
        };
        window.deleteHighlight = async function(id) {
            if (!await appConfirm('Delete this item?', 'Delete')) return;
            try {
                await fetch(`${API_URL}/highlights/${id}`, { method: 'DELETE' });
                loadHighlights();
            } catch (_) {}
        };

        initDB();
        loadBooks();
        // Pull /api/progress in parallel with the first page of books so that
        // any in-progress book that wouldn't be in the first page yet gets
        // prepended to the grid (and progress bars update) right away.
        ensureProgressBooksLoaded();

        // Deep-link entry for the unified menu: open the Highlights/Bookmarks
        // overlay directly when arriving from a GreatReads navbar link
        // (e.g. /?view=highlights). Lets those menu items work from any
        // GreatReads page, not just the home grid.
        (function () {
            const view = new URLSearchParams(location.search).get('view');
            if (view === 'highlights') openOverlay('highlight');
            else if (view === 'bookmarks') openOverlay('bookmark');
        })();
    </script>
</body>
</html>
