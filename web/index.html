<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Tell the WebView not to use its HTTP cache for this page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GreatReads</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        /* GreatReads format palette */
        :root {
            --fmt-ebook: #0066CC;
            --fmt-audio: #FF6600;
            --fmt-physical: #6B4BA3;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            padding: 0;
            overflow-x: hidden;
            /* Reserve room for the fixed .status-bar so the first row of book
               covers isn't clipped under it. 112px = bar's own height
               (row1 24 + row2 ~53 + row3 ~35);
               env(safe-area-inset-top) accounts for the Android status bar. */
            padding-top: calc(112px + env(safe-area-inset-top, 0px));
        }
        /* Top transparent status/toolbar.
           Row 1: clock (left) + version (right) — 24px tall
           Row 2: search input + hamburger — ~53px tall
           Row 3: sort pills (Author|Title) + format filter pills — ~32px tall */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99999;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            /* Push content below the Android system status bar. */
            padding-top: env(safe-area-inset-top, 0px);
        }
        .status-bar-row1 {
            position: relative;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;   /* brand is centred in the row */
            padding: 0 44px;           /* inset from curved-screen edges */
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.3px;
        }
        /* Clock — pinned to the left with the same inset as the padding. */
        #status-clock {
            position: absolute;
            left: 44px;
            pointer-events: none;
        }
        /* Build stamp — pinned to the right; tappable to download update. */
        #build-stamp {
            position: absolute;
            right: 44px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }
        /* Brand wordmark — purple→pink→blue gradient sampled from the
           GreatReads launcher icon. Perfectly centred between the two pins. */
        .brand {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.4px;
            background: linear-gradient(90deg, #4067EF 0%, #8640C0 50%, #C940B0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }
        .status-bar-row2 {
            display: flex;
            gap: 8px;
            padding: 6px 10px 10px 10px;
            align-items: center;
        }
        .search-wrap {
            flex: 1;
            position: relative;
            min-width: 0;
        }
        .search {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 32px 10px 12px; /* right room for the X */
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        .search-clear {
            display: none;
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 32px;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            padding: 0;
            cursor: pointer;
            color: #666;
            -webkit-tap-highlight-color: transparent;
        }
        .search-wrap.has-text .search-clear { display: flex; }
        .filter-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 10px 8px 10px;
            gap: 8px;
        }
        .pill-group {
            display: flex;
            gap: 4px;
        }
        .pill {
            background: #2a2a2a;
            border: none;
            border-radius: 20px;
            color: #888;
            font-size: 12px;
            padding: 5px 11px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            white-space: nowrap;
            transition: background 0.12s, color 0.12s;
        }
        .pill.active {
            background: #4067EF;
            color: #fff;
        }
        .icon-btn {
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            padding: 8px 12px;
            cursor: pointer;
            line-height: 1;
        }
        .menu-popup {
            position: fixed;
            top: calc(84px + env(safe-area-inset-top, 0px));
            right: 8px;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            z-index: 100000;
            min-width: 180px;
            display: none;
        }
        .menu-popup.open { display: block; }
        .menu-popup button {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        .menu-popup button:active { background: #3a3a3a; }
        /* Per-book context menu — shown on right-click (desktop) or long-press
           (touch). Position is set inline in JS based on cursor / touch point.
           A full-screen transparent backdrop sits behind it to catch outside
           taps reliably (more robust than document-level click listeners,
           which can be missed when other capture-phase handlers stopPropagation
           or when touch sequences get interrupted by native dialogs). */
        .book-context-menu-backdrop {
            position: fixed;
            inset: 0;
            background: transparent;
            z-index: 100001;
            display: none;
        }
        .book-context-menu-backdrop.open { display: block; }
        .book-context-menu {
            position: fixed;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
            z-index: 100002;
            min-width: 200px;
            display: none;
            overflow: hidden;
        }
        .book-context-menu.open { display: block; }
        .book-context-menu .ctx-header {
            padding: 10px 14px;
            font-size: 12px;
            color: #888;
            border-bottom: 1px solid #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }
        .book-context-menu button {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        .book-context-menu button:active { background: #3a3a3a; }
        .book-context-menu button.danger { color: #ff7676; }
        /* Full-screen overlay for the highlights/bookmarks browser. */
        .overlay {
            position: fixed;
            inset: 0;
            background: #121212;
            z-index: 100001;
            display: none;
            flex-direction: column;
            /* Matches the fixed .overlay-header (title row + search row). */
            padding-top: 112px;
        }
        .overlay.open { display: flex; }
        .overlay-header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(18,18,18,0.95);
            display: flex; flex-direction: column; align-items: stretch;
            gap: 8px;
            padding: 8px 10px 10px 10px;
        }
        .overlay-header-row {
            display: flex; align-items: center; gap: 8px;
        }
        .overlay-title {
            flex: 1; font-size: 18px; font-weight: 600; color: #fff;
            padding: 0 4px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .overlay-header input {
            flex: 1; padding: 10px 12px; background: #2a2a2a;
            border: none; border-radius: 8px; color: #fff; font-size: 14px;
        }
        .overlay-list {
            flex: 1; overflow-y: auto; padding: 12px;
        }
        /* Per-book group: bold heading, items stacked under it. */
        .hl-group { margin-bottom: 18px; }
        .hl-group-head {
            position: sticky; top: 0;
            background: rgba(18,18,18,0.95);
            padding: 8px 4px 6px 4px;
            margin-bottom: 6px;
            display: flex; align-items: baseline; gap: 8px;
            border-bottom: 1px solid #333;
            z-index: 1;
        }
        .hl-group-title {
            font-size: 15px; font-weight: 700; color: #fff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1;
        }
        .hl-group-author { color: #999; font-size: 12px; font-weight: 400; }
        .hl-group-count {
            color: #888; font-size: 11px;
            background: #2a2a2a; padding: 2px 8px; border-radius: 10px;
        }
        .hl-item {
            background: #1e1e1e; border-radius: 8px; padding: 12px;
            margin-bottom: 10px; border-left: 4px solid #4caf50;
        }
        .hl-item.bookmark { border-left-color: #2196f3; }
        .hl-meta { color: #888; font-size: 11px; margin-bottom: 4px; }
        .hl-text { color: #ddd; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .hl-actions { margin-top: 8px; display: flex; gap: 8px; }
        .hl-actions button {
            background: #2a2a2a; border: none; border-radius: 6px;
            color: #fff; padding: 6px 10px; font-size: 12px; cursor: pointer;
        }
        .hl-actions button.danger { background: #5a2222; }
        .books {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }
        .book {
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
            /* THE lockup fix: without this, a long-press on the title/author text
               puts the Android WebView into text-selection mode, which then eats
               every subsequent tap (books stop opening) until selection clears.
               Disabling selection + the long-press callout keeps our own JS
               long-press menu working and leaves normal taps unaffected. */
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
        }
        .book:active {
            transform: scale(0.95);
        }
        .book-cover-wrap {
            position: relative;
            margin-bottom: 8px;
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: block;
        }
        /* Per-format progress bars stacked at the bottom of the cover.
           Ebook (blue) sits at the very bottom; audio (orange) sits above it.
           Only bars with progress > 0 are rendered. */
        .book-progress-wrap {
            position: absolute;
            left: 4px;
            right: 4px;
            bottom: 4px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .book-pbar {
            height: 3px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 2px;
            overflow: hidden;
        }
        .book-pbar-fill {
            height: 100%;
            border-radius: 2px;
        }
        /* Format dots — top-right, one per available format (blue=ebook, orange=audio). */
        .book-fmt-dots {
            position: absolute;
            top: 4px;
            right: 4px;
            display: flex;
            gap: 3px;
        }
        .book-fmt-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }
        .book-fmt-dot.ebook { background: var(--fmt-ebook); }
        .book-fmt-dot.audio { background: var(--fmt-audio); }
        /* Media-type badges — SVG icon tiles, top-left, all books. */
        .book-badges {
            position: absolute;
            top: 4px;
            left: 4px;
            display: flex;
            gap: 3px;
            line-height: 0;
        }
        .book-badge {
            border-radius: 2px;
            overflow: hidden;
            display: flex;
        }
        /* Read/Listen action sheet for dual-format works. */
        .sheet-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 1200;
            align-items: flex-end;
        }
        .sheet-backdrop.open { display: flex; }
        .sheet {
            width: 100%;
            background: #1e1e1e;
            border-radius: 16px 16px 0 0;
            padding: 16px 16px calc(20px + env(safe-area-inset-bottom, 0px));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.5);
        }
        .sheet-title {
            font-size: 14px;
            color: #aaa;
            text-align: center;
            margin-bottom: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .sheet-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            background: #2a2a2a;
            border: none;
            border-radius: 10px;
            color: #fff;
            padding: 16px;
            font-size: 16px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .sheet-btn:active { background: #383838; }
        .sheet-btn .sheet-icon { font-size: 22px; }
        .sheet-btn .sheet-sub { color: #888; font-weight: 400; font-size: 13px; }
        /* In-app confirmation dialog. Replaces the native confirm(): on the
           Android WebView a native JS dialog leaves the view dropping
           synthesized `click` events afterward (long-press still fires, taps
           don't), which locked the grid after "Clear progress". */
        .confirm-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            z-index: 100100;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .confirm-backdrop.open { display: flex; }
        .confirm-box {
            background: #1e1e1e;
            border-radius: 14px;
            max-width: 360px;
            width: 100%;
            padding: 20px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }
        .confirm-msg {
            color: #eee;
            font-size: 15px;
            line-height: 1.45;
            white-space: pre-wrap;
            margin-bottom: 18px;
        }
        .confirm-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .confirm-btn {
            border: none;
            border-radius: 8px;
            padding: 10px 18px;
            font-size: 14px;
            cursor: pointer;
        }
        .confirm-btn.cancel { background: #333; color: #eee; }
        .confirm-btn.cancel:active { background: #444; }
        .confirm-btn.ok { background: #c0392b; color: #fff; }
        .confirm-btn.ok:active { background: #d04437; }
        .book-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.3;
        }
        .book-author {
            color: #aaa;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading-more {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            background: #ff5252;
            color: #fff;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
        }
        /* Single-row-header overlays (series detail) need less top pad. */
        #series-overlay { padding-top: 60px; }
        /* Series card: book-count chip bottom-left of the cover. */
        .series-count {
            position: absolute;
            bottom: 4px;
            left: 4px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            font-size: 11px;
            font-weight: 600;
            line-height: 1;
            padding: 3px 6px;
            border-radius: 8px;
        }
        /* Series sequence number on a book card (series detail overlay only).
           bottom is set inline so it clears any progress bars below it. */
        .book-seriesnum {
            position: absolute;
            left: 4px;
            background: rgba(0,0,0,0.78);
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
            padding: 3px 7px;
            border-radius: 8px;
            pointer-events: none;
        }
        .setting-section {
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: #888;
            padding: 20px 4px 8px 4px;
        }
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 4px; border-bottom: 1px solid #222;
            gap: 12px;
        }
        .setting-row-label { color: #ddd; font-size: 15px; flex: 1; }
        .setting-url-row {
            padding: 12px 4px; border-bottom: 1px solid #222;
        }
        .setting-url-label { display: block; color: #888; font-size: 12px; margin-bottom: 6px; }
        .setting-url-row input {
            width: 100%; padding: 10px 12px;
            background: #2a2a2a; border: none; border-radius: 8px;
            color: #fff; font-size: 13px; box-sizing: border-box;
        }
        .setting-hint { color: #555; font-size: 11px; margin-top: 4px; line-height: 1.4; }
        .setting-save-btn {
            display: block; width: 100%; margin-top: 20px;
            padding: 14px; background: #4067EF; border: none; border-radius: 10px;
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        /* Toggle switch */
        .toggle-switch {
            position: relative; display: inline-block;
            width: 50px; height: 28px; flex-shrink: 0;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #444; border-radius: 14px; transition: background 0.2s;
        }
        .toggle-switch input:checked + .toggle-track { background: #4067EF; }
        .toggle-thumb {
            position: absolute; top: 4px; left: 4px;
            width: 20px; height: 20px; background: #fff;
            border-radius: 50%; transition: transform 0.2s;
        }
        .toggle-switch input:checked + .toggle-track .toggle-thumb { transform: translateX(22px); }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar-row1">
            <span id="status-clock"></span>
            <span class="brand">GreatReads</span>
            <span id="build-stamp"></span>
        </div>
        <div class="status-bar-row2">
            <div class="search-wrap" id="search-wrap">
                <input type="text" class="search" id="search" placeholder="Search books…">
                <button class="search-clear" id="search-clear" aria-label="Clear search" tabindex="-1">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                    </svg>
                </button>
            </div>
            <button class="icon-btn" id="menu-btn" title="Menu" aria-label="Menu">☰</button>
        </div>
        <div class="filter-bar">
            <div class="pill-group" id="sort-pills">
                <button class="pill active" data-sort="author">Author</button>
                <button class="pill" data-sort="title">Title</button>
                <button class="pill" data-sort="series">Series</button>
                <button class="pill" data-sort="saga">Saga</button>
            </div>
            <div class="pill-group" id="fmt-pills">
                <button class="pill active" data-fmt="all">All</button>
                <button class="pill" data-fmt="ebook">Ebook</button>
                <button class="pill" data-fmt="audiobook">Audio</button>
                <button class="pill" data-fmt="dual">Dual</button>
            </div>
        </div>
    </div>

    <!-- Unified menu: same destination set + order as the GreatReads navbar
         (base.html). Reader-side items first (Home / Highlights / Bookmarks),
         then the GreatReads library-management pages, then Settings. -->
    <div class="menu-popup" id="menu-popup">
        <button id="menu-home">🏠 Home</button>
        <button id="menu-highlights">✏️ Highlights</button>
        <button id="menu-bookmarks">🔖 Bookmarks</button>
        <button id="menu-tbr">📋 TBR</button>
        <button id="menu-journal">📖 Journal</button>
        <button id="menu-library">📚 Library</button>
        <button id="menu-books">📕 Books</button>
        <button id="menu-stats">📊 Stats</button>
        <button id="menu-settings">⚙️ Settings</button>
    </div>

    <!-- Per-book context menu (right-click on desktop, long-press on touch).
         The backdrop catches outside taps to dismiss the menu. -->
    <div class="book-context-menu-backdrop" id="book-ctx-backdrop"></div>
    <div class="book-context-menu" id="book-ctx-menu">
        <div class="ctx-header" id="book-ctx-title"></div>
        <button id="ctx-mark-finished">✓ Mark as Finished</button>
        <button id="ctx-clear-progress" class="danger">🗑️ Clear Reading Progress</button>
    </div>

    <!-- In-app confirmation dialog (replaces the native confirm() — see the
         .confirm-backdrop CSS note). Driven by the appConfirm() helper. -->
    <div class="confirm-backdrop" id="confirm-backdrop">
        <div class="confirm-box">
            <div class="confirm-msg" id="confirm-msg"></div>
            <div class="confirm-actions">
                <button class="confirm-btn cancel" id="confirm-cancel">Cancel</button>
                <button class="confirm-btn ok" id="confirm-ok">OK</button>
            </div>
        </div>
    </div>

    <!-- Read/Listen action sheet (shown for any work with multiple openable
         formats: an ebook plus one-or-more audio editions, e.g. a standard
         Audiobook and a Dramatized Audiobook). Buttons are built per-work in
         showFormatSheet(). Tapping outside the sheet dismisses it. -->
    <div class="sheet-backdrop" id="format-sheet-backdrop" onclick="if(event.target===this)hideFormatSheet()">
        <div class="sheet">
            <div class="sheet-title" id="format-sheet-title"></div>
            <div id="format-sheet-btns"></div>
        </div>
    </div>

    <!-- Mark as Finished dialog -->
    <div class="overlay" id="finish-overlay">
        <div class="overlay-header">
            <div class="overlay-header-row">
                <button class="icon-btn" onclick="closeFinishDialog()" title="Cancel">←</button>
                <div class="overlay-title">Mark as Finished</div>
            </div>
        </div>
        <div class="overlay-content" style="padding: 20px;">
            <div id="finish-book-info" style="margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 8px;">

            <!-- Hidden media field - auto-detected from GreatReads, not user-editable -->
            <input type="hidden" id="finish-media" value="Ebook">

            <div style="margin-bottom: 16px; padding: 12px 0;">
                <div class="setting-row" style="margin-bottom: 12px;">

                    <div style="display: flex; align-items: center; gap: 12px;">
                        <input type="range" id="rating-horror" min="0" max="10" step="1" value="0" style="flex: 1;">
                        <span id="rating-horror-value" style="min-width: 32px; font-weight: 600;">0</span>

            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button onclick="closeFinishDialog()" style="flex: 1; padding: 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: white; font-size: 16px; cursor: pointer;">
                    Cancel
                </button>
                <button id="finish-submit-btn" onclick="submitFinishBook()" style="flex: 1; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; border-radius: 8px; color: white; font-size: 16px; font-weight: 600; cursor: pointer;">

    </div>

    <!-- Highlights/Bookmarks overlay. The header title and search
         placeholder are updated by openOverlay() based on the type. -->
    <div class="overlay" id="hl-overlay" data-type="">
        <div class="overlay-header">
            <div class="overlay-header-row">
                <button class="icon-btn" onclick="closeHighlights()" title="Back">←</button>
                <div class="overlay-title" id="hl-title">Highlights</div>
            </div>
            <input type="text" id="hl-search" placeholder="Search…">
        </div>
        <div class="overlay-list" id="hl-list">
            <div class="loading">Loading…</div>
        </div>
    </div>

    <!-- Series detail overlay — lists every book in a tapped series, in order. -->
    <div class="overlay" id="series-overlay">
        <div class="overlay-header">
            <div class="overlay-header-row">
                <button class="icon-btn" onclick="closeSeriesDetail()" title="Back">←</button>
                <div class="overlay-title" id="series-detail-title">Series</div>
            </div>
        </div>
        <div class="overlay-list" id="series-detail-list"></div>
    </div>

    <div id="content">
        <div class="loading">Loading your library...</div>
    </div>

    <script>
        // Build stamp: YYMMDD-HH:MM, generated fresh each page load so it
        // always reflects when the user last refreshed (also serves as a
        // lightweight cache-bust token). Tapping it navigates to the APK.
        const APK_URL = 'http://100.69.184.113:8090/ereader.apk';
        const buildStamp = document.getElementById('build-stamp');
        function fmtStamp() {
            const n = new Date();
            const yy = String(n.getFullYear()).slice(2);
            const mm = String(n.getMonth() + 1).padStart(2, '0');
            const dd = String(n.getDate()).padStart(2, '0');
            const hh = String(n.getHours()).padStart(2, '0');
            const mi = String(n.getMinutes()).padStart(2, '0');
            return `${yy}${mm}${dd}-${hh}:${mi}`;
        }
        // BUILD is used only as a per-load cache-bust token (passed to
        // reader.html via ?v=…). The pill itself shows the *build* time —
        // the mtime of the web assets, fetched from the backend — so the
        // user can tell at a glance whether the code is fresh after an
        // edit on the server, instead of just seeing when they opened
        // the app.
        const BUILD = fmtStamp();   // reused as cache-bust token in openBook()
        buildStamp.textContent = '…';
        buildStamp.title = 'Tap to download latest APK';
        fetch('http://100.69.184.113:8091/api/build-stamp')
            .then(r => r.json())
            .then(d => { if (d && d.stamp) buildStamp.textContent = d.stamp; })
            .catch(() => { buildStamp.textContent = BUILD; });
        buildStamp.addEventListener('click', () => {
            // Use a hidden <a download> so Android's DownloadListener fires
            // instead of navigating the WebView away from the page.
            const a = document.createElement('a');
            a.href = APK_URL;
            a.download = 'ereader.apk';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // Status-bar clock (HH:MM, 24h)
        function tickClock() {
            const d = new Date();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            document.getElementById('status-clock').textContent = hh + ':' + mm;
        }
        tickClock();
        setInterval(tickClock, 30000);

        const API_URL = 'http://100.69.184.113:8091/api';
        let allBooks = [];
        let displayedBooks = [];
        let currentOffset = 0;
        const BATCH_SIZE = 50;
        let isLoading = false;
        let searchQuery = '';
        let sortMode = 'author';      // 'author' | 'title' | 'series' | 'saga'
        let formatFilter = 'all';   // 'all' | 'ebook' | 'audiobook' | 'dual'
        // Series view: full grouped library, fetched once from /api/series and
        // cached. null until the user first switches to Series mode.
        let seriesData = null;
        let seriesLoading = false;
        // Saga view: same shape as series, fetched from /api/saga (Calibre
        // #universe grouping). null until the user first switches to Saga mode.
        let sagaData = null;
        let sagaLoading = false;
        // Snapshot of the non-search ("home") library + scroll position so we
        // can restore them when the user clears the search box. Without this,
        // clearing search would lose everything we'd lazily paged in.
        let homeBooks = [];
        let homeOffset = 0;
        let homeIsComplete = false;
        let searchAbortCtl = null;
        let searchSeq = 0;

        // Reading-state lookup (mirrors reader.html STATE_KEY format)
        function readingStateFor(id) {
            try {
                const raw = localStorage.getItem('ereader.state.' + id);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        async function loadBooks() {
            // Don't lazy-page while a search is active \u2014 search owns the result
            // set and infinite scroll would corrupt it.
            if (isLoading || searchQuery) return;
            isLoading = true;

            try {
                // /api/library = Calibre ebooks merged with Audiobookshelf
                // audiobooks. Matched works keep their Calibre id; audio-only
                // items use id "abs:<id>" and are appended ONCE on the first
                // page (offset 0). Falls back to the Calibre-only list when ABS
                // is off, so this is safe even without audiobooks configured.
                const url = `${API_URL}/library?limit=${BATCH_SIZE}&offset=${currentOffset}`;
                console.log('Fetching books from:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const newBooks = data.books || [];

                // Deduplicate against books already in homeBooks (e.g. ones
                // prepended by ensureProgressBooksLoaded() on startup).
                const existingIds = new Set(homeBooks.map(b => String(b.id)));
                const uniqueNew = newBooks.filter(b => !existingIds.has(String(b.id)));
                homeBooks = homeBooks.concat(uniqueNew);
                // Advance the Calibre offset by the EBOOK count only — audio-only
                // rows (appended on page 0) aren't part of Calibre's paged set,
                // so counting them would skip real books on the next page.
                const ebookCount = newBooks.filter(
                    b => (b.mediaTypes || ['ebook']).includes('ebook')).length;
                homeOffset += ebookCount;
                homeIsComplete = ebookCount < BATCH_SIZE;
                allBooks = homeBooks;
                currentOffset = homeOffset;

                displayBooks(allBooks, homeIsComplete);
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        Failed to load books: ${error.message}<br>
                        Check console for details.
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        // Server-side search across the WHOLE Calibre library, not just what's
        // currently loaded. Builds a Calibre-style query that matches title OR
        // author. Debounced + sequence-checked so a slow earlier response
        // can't clobber a faster later one.
        async function runServerSearch(q) {
            const mySeq = ++searchSeq;
            if (searchAbortCtl) searchAbortCtl.abort();
            searchAbortCtl = new AbortController();

            // Calibre query language: `title:"foo" or author:"foo" or series:"foo"`.
            // Quoting keeps multi-word phrases intact and escapes user input.
            // Including series lets users find all books in a series by name.
            const safe = q.replace(/"/g, '\\"');
            const calibreQuery = `title:"${safe}" or authors:"${safe}" or series:"${safe}"`;
            // Route through /api/library (not /api/books) so results keep their
            // ABS enrichment (dual-format badges) AND so audio-only audiobooks
            // can be matched: `query` drives the Calibre ebook search, `q` is
            // the raw term the backend uses to filter the audio-only list.
            const url = `${API_URL}/library?limit=200&offset=0`
                + `&query=${encodeURIComponent(calibreQuery)}`
                + `&q=${encodeURIComponent(q)}`;

            try {
                const response = await fetch(url, { signal: searchAbortCtl.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (mySeq !== searchSeq) return; // a newer search supersedes us
                const results = data.books || [];
                allBooks = results;
                displayBooks(results, true);
            } catch (e) {
                if (e.name === 'AbortError') return;
                console.error('Search failed:', e);
            }
        }

        function escapeHTML(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        // bookId -> backend progress record (most importantly: `updated` ms).
        // Populated by ensureProgressBooksLoaded(); drives progress bars and
        // the "prepend in-progress books" behaviour for ALL in-progress books — including ones the user
        // hasn't yet paged into view via infinite scroll, and ones whose
        // progress was set on another device (no localStorage entry here).
        const progressMap = new Map();
        // Audiobook progress is keyed "abs:<absId>" in the backend; dual-format
        // rows are keyed by their Calibre id, so we also index audio records by
        // their raw absId to surface audiobook listening on those rows.
        const audioProgressByAbsId = new Map();
        // Track ids we've already inserted so reRenders don't refetch.
        const mergedProgressIds = new Set();
        let progressLoadedAt = 0;

        // Raw ABS id for a book row (audio-only rows carry it in the id itself).
        function rawAbsIdFor(book) {
            if (book && book.absId) return String(book.absId);
            const id = String((book && book.id) != null ? book.id : book || '');
            return id.startsWith('abs:') ? id.slice(4) : '';
        }
        // Backend audio-progress fraction (0..100) for a row, if any. Prefers
        // the backend-synced record (cross-device) but falls back to
        // localStorage for an instant local-only update after leaving the player.
        function audioPctFor(book) {
            const rec = audioProgressByAbsId.get(rawAbsIdFor(book));
            let pct = (rec && typeof rec.progress === 'number') ? Math.round(rec.progress * 100) : 0;
            const absId = rawAbsIdFor(book);
            if (absId) {
                const local = readingStateFor('abs:' + absId);
                if (local && typeof local.progress === 'number' && (!rec || (local.ts || 0) > (rec.updated || 0))) {
                    pct = Math.round(local.progress * 100);
                }
            }
            return pct;
        }
        // Backend ebook-progress fraction (0..100) for a row. Prefers the
        // backend store but falls back to localStorage for instant local updates.
        function ebookPctFor(book) {
            const rec = progressMap.get(String(book.id));
            let pct = (rec && rec.mediaType !== 'audiobook' && typeof rec.progress === 'number') ? Math.round(rec.progress * 100) : 0;
            const local = readingStateFor(book.id);
            if (local && typeof local.progress === 'number' && (!rec || (local.ts || 0) > (rec.updated || 0))) {
                pct = Math.round(local.progress * 100);
            }
            return pct;
        }

        function applyFilter(list) {
            if (formatFilter === 'all') return list;
            return list.filter(b => {
                const types = b.mediaTypes || ['ebook'];
                const hasE = types.includes('ebook');
                const hasA = types.includes('audiobook');
                if (formatFilter === 'ebook')     return  hasE && !hasA;
                if (formatFilter === 'audiobook') return !hasE &&  hasA;
                if (formatFilter === 'dual')      return  hasE &&  hasA;
                return true;
            });
        }

        // Best-available "last read" timestamp — backend mtime wins over
        // localStorage; picks up audiobook listening on dual-format rows.
        function recentTsFor(book) {
            let t = 0;
            const p = progressMap.get(String(book.id));
            if (p && typeof p.updated === 'number') t = p.updated;
            const localE = readingStateFor(book.id);
            if (localE && typeof localE.ts === 'number') t = Math.max(t, localE.ts);

            const absId = rawAbsIdFor(book);
            if (absId) {
                const a = audioProgressByAbsId.get(absId);
                if (a && typeof a.updated === 'number') t = Math.max(t, a.updated);
                const localA = readingStateFor('abs:' + absId);
                if (localA && typeof localA.ts === 'number') t = Math.max(t, localA.ts);
            }
            return t;
        }

        function applySort(list) {
            const arr = list.slice();
            if (sortMode === 'title') {
                // Pure A→Z by title. "Author" sort surfaces recently-read books at
                // the top; Title sort is a clean alphabetical view with no floating.
                arr.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            } else if (sortMode === 'author') {
                // Author sort: in-progress books first (by newest update), then the
                // rest by author last name → series → series_index → published.
                // This matches the backend's sort_key() and keeps the list stable
                // even after ensureProgressBooksLoaded() prepends books.
                const inProgress = [];
                const rest = [];
                for (const b of arr) {
                    const prog = progressMap.get(String(b.id));
                    // Only float books with actual progress (0 < progress < 1).
                    // progress===0 means opened but not read; progress===1 or >1
                    // means finished (shouldn't float either).
                    const p = prog?.progress ?? 0;
                    const isActive = prog && p > 0 && p < 1;
                    (isActive ? inProgress : rest).push(b);
                }
                // In-progress: newest update first
                inProgress.sort((a, b) => {
                    const aUpd = progressMap.get(String(a.id))?.updated || 0;
                    const bUpd = progressMap.get(String(b.id))?.updated || 0;
                    return bUpd - aUpd;
                });
                // Rest: author last name, series, series_index, published
                rest.sort((a, b) => {
                    const aAuthor = a.author || 'Unknown';
                    const bAuthor = b.author || 'Unknown';
                    const aLast = aAuthor.includes(',')
                        ? aAuthor.split(',')[0]
                        : (aAuthor.split(' ').pop() || 'Unknown');
                    const bLast = bAuthor.includes(',')
                        ? bAuthor.split(',')[0]
                        : (bAuthor.split(' ').pop() || 'Unknown');
                    const lastCmp = aLast.toLowerCase().localeCompare(bLast.toLowerCase());
                    if (lastCmp !== 0) return lastCmp;
                    const seriesCmp = (a.series || '').toLowerCase().localeCompare((b.series || '').toLowerCase());
                    if (seriesCmp !== 0) return seriesCmp;
                    const aIdx = a.series_index ?? 0;
                    const bIdx = b.series_index ?? 0;
                    if (aIdx !== bIdx) return aIdx - bIdx;
                    return (a.published || '').localeCompare(b.published || '');
                });
                return inProgress.concat(rest);
            }
            // Series/Saga modes don't use this sort path (they call renderSeriesGrid/renderSagaGrid directly)
            return arr;
        }

        // Pull the full per-book progress list, then make sure every
        // in-progress book is actually present in `homeBooks` — fetching
        // metadata for any that haven't been paged in yet. This is what
        // ensures in-progress books surface at the top of the grid
        // WITHOUT needing to scroll the entire library. Backend already returns
        // records sorted newest-first; we just need their ids + mtimes.
        async function ensureProgressBooksLoaded() {
            try {
                const res = await fetch(`${API_URL}/progress`);
                if (!res.ok) return;
                const data = await res.json();
                const items = Array.isArray(data.items) ? data.items : [];
                progressMap.clear();
                audioProgressByAbsId.clear();
                for (const it of items) {
                    if (it && it.bookId) progressMap.set(String(it.bookId), it);
                    if (it && it.absId) audioProgressByAbsId.set(String(it.absId), it);
                }
                progressLoadedAt = Date.now();

                // Which in-progress books aren't in homeBooks yet?
                const have = new Set(homeBooks.map(b => String(b.id)));
                const missing = items
                    .map(it => String(it.bookId))
                    .filter(id => id && !have.has(id) && !mergedProgressIds.has(id));

                if (missing.length === 0) {
                    reRender();
                    return;
                }

                // Fetch missing metadata in parallel (small N — only the
                // books with progress, not the whole library). Tolerate
                // individual failures (book may have been removed from
                // Calibre since progress was last written).
                // Use the MERGED single-book endpoint (not Calibre-only
                // /api/books/<id>) so a dual-format work that floats up here via
                // its ebook progress keeps its audiobook editions/badges.
                const fetched = await Promise.all(missing.map(async id => {
                    try {
                        const r = await fetch(`${API_URL}/library/${encodeURIComponent(id)}`);
                        if (!r.ok) return null;
                        const b = await r.json();
                        return (b && b.id != null) ? b : null;
                    } catch (_) { return null; }
                }));

                // Prepend the new ones so they're visible at the top of the
                // grid immediately; applySort will then order them correctly.
                // Re-derive the dedup set from the CURRENT homeBooks: loadBooks()
                // may have appended a page (containing some of these same
                // in-progress books) while our metadata fetches were in flight.
                // The stale `have` (snapshotted before those fetches) would
                // double-insert them — the duplicate-card bug under Title sort.
                const current = new Set(homeBooks.map(b => String(b.id)));
                const merged = [];
                for (const b of fetched) {
                    if (b && !current.has(String(b.id))) {
                        merged.push(b);
                        current.add(String(b.id));
                        mergedProgressIds.add(String(b.id));
                    }
                }
                if (merged.length) {
                    homeBooks = merged.concat(homeBooks);
                    if (!searchQuery) allBooks = homeBooks;
                }
                reRender();
            } catch (e) {
                console.warn('progress fetch failed:', e);
            }
        }

        async function loadCover(img) {
            if (img.dataset.loading) return;
            img.dataset.loading = "true";
            const originalUrl = img.dataset.src;
            if (!originalUrl) return;
            // Cache key is the cover URL itself, so the small grid thumbnail and
            // any full-size cover are stored as separate entries (variant-aware).
            const cacheKey = originalUrl;
            if (!db) { img.src = originalUrl; return; }

            try {
                const tx = db.transaction(['covers'], 'readonly');
                const store = tx.objectStore('covers');
                const cached = await new Promise((resolve) => {
                    const req = store.get(cacheKey);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                });

                if (cached && cached.blob) {
                    img.src = URL.createObjectURL(cached.blob);
                    return;
                }

                // Not in cache, fetch and save
                const res = await fetch(originalUrl);
                if (!res.ok) throw new Error('Fetch failed');
                const blob = await res.blob();

                const saveTx = db.transaction(['covers'], 'readwrite');
                saveTx.objectStore('covers').put({ id: cacheKey, blob });

                img.src = URL.createObjectURL(blob);
            } catch (e) {
                img.src = originalUrl;
            }
        }

        // Lazy cover loading: only fetch a cover once its card nears the
        // viewport, so a freshly-rendered batch (BATCH_SIZE cards) doesn't fire
        // dozens of requests at once. One shared observer; replaced cards are
        // GC'd with their observations, so no manual cleanup is needed.
        let _coverObserver = null;
        function _lazyLoadCovers(root) {
            const imgs = (root || document).querySelectorAll('.book-cover[data-src]');
            if (!('IntersectionObserver' in window)) { imgs.forEach(loadCover); return; }
            if (!_coverObserver) {
                _coverObserver = new IntersectionObserver((entries, obs) => {
                    entries.forEach(e => {
                        if (e.isIntersecting) { obs.unobserve(e.target); loadCover(e.target); }
                    });
                }, { rootMargin: '300px' });
            }
            imgs.forEach(img => _coverObserver.observe(img));
        }

        // SVG format badges, shared by the grid and the series detail view.
        const ICON_EBOOK = '<svg width="11" height="11" viewBox="0 0 11 11" xmlns="http://www.w3.org/2000/svg"><rect width="11" height="11" rx="2" fill="#0066CC"/><rect x="2" y="2.5" width="7" height="1.2" rx="0.6" fill="white"/><rect x="2" y="4.9" width="7" height="1.2" rx="0.6" fill="white"/><rect x="2" y="7.3" width="5" height="1.2" rx="0.6" fill="white"/></svg>';
        const ICON_AUDIO = '<svg width="11" height="11" viewBox="0 0 11 11" xmlns="http://www.w3.org/2000/svg"><rect width="11" height="11" rx="2" fill="#FF6600"/><path d="M1.8 7 A3.7 4.5 0 0 1 9.2 7" stroke="white" stroke-width="1.3" fill="none" stroke-linecap="round"/><rect x="1.2" y="6.5" width="1.5" height="3" rx="0.5" fill="white"/><rect x="8.3" y="6.5" width="1.5" height="3" rx="0.5" fill="white"/></svg>';

        // One book card. Reused by the main grid and the series detail overlay.
        // opts.showSeriesNum renders the series sequence number (series view).
        function bookCardHTML(book, opts) {
            opts = opts || {};
            const format = ((book.formats || [])[0] || 'epub').toLowerCase();
            // Grid uses the lightweight thumbnail; the full cover is reserved
            // for the reader/player where it's shown large.
            const coverUrl = book.thumbnail || book.cover;
            const readPct = ebookPctFor(book);
            // Per-format progress bars: ebook (blue) at bottom, audio (orange) above.
            const audioPct = audioPctFor(book);
            const barParts = [];
            if (audioPct > 0) barParts.push(
                `<div class="book-pbar"><div class="book-pbar-fill" style="width:${audioPct}%;background:var(--fmt-audio)"></div></div>`);
            if (readPct > 0) barParts.push(
                `<div class="book-pbar"><div class="book-pbar-fill" style="width:${readPct}%;background:var(--fmt-ebook)"></div></div>`);
            const progressBar = barParts.length
                ? `<div class="book-progress-wrap" title="Ebook ${readPct}% · Audio ${audioPct}%">${barParts.join('')}</div>` : '';
            // mediaTypes drives the format badges + tap routing. Default to
            // ebook for plain Calibre rows that predate the unified library.
            const types = book.mediaTypes || ['ebook'];
            const hasAudio = types.includes('audiobook');
            const hasEbook = types.includes('ebook');
            const badges = `<div class="book-badges">${hasEbook ? `<span class="book-badge" title="Ebook">${ICON_EBOOK}</span>` : ''}${hasAudio ? `<span class="book-badge" title="Audiobook">${ICON_AUDIO}</span>` : ''}</div>`;
            // Format dots (top-right): one colored circle per available format,
            // side by side when dual — blue for ebook, orange for audio.
            const fmtDots = `<div class="book-fmt-dots">${hasEbook ? '<div class="book-fmt-dot ebook"></div>' : ''}${hasAudio ? '<div class="book-fmt-dot audio"></div>' : ''}</div>`;
            // Series sequence number, bottom-left, lifted above any progress bars.
            const sIdx = Number(book.series_index);
            let seriesNum = '';
            if (opts.showSeriesNum && sIdx > 0) {
                const barH = barParts.length ? (barParts.length * 3 + (barParts.length - 1) * 2) : 0;
                const bottom = barParts.length ? (4 + barH + 3) : 4;
                seriesNum = `<div class="book-seriesnum" style="bottom:${bottom}px">#${String(sIdx)}</div>`;
            }
            return `
                <div class="book" data-book-id="${book.id}"
                     data-book-title="${escapeHTML(book.title)}"
                     data-book-author="${escapeHTML(book.author || '')}"
                     data-book-format="${format}"
                     data-media-types="${types.join(',')}"
                     data-abs-id="${book.absId || ''}"
                     onclick="onBookOpen(this)">
                    <div class="book-cover-wrap">
                        <img data-src="${coverUrl}" class="book-cover"
                             src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                             onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                        ${badges}
                        ${fmtDots}
                        ${seriesNum}
                        ${progressBar}
                    </div>
                    <div class="book-title">${escapeHTML(book.title)}</div>
                    <div class="book-author">${escapeHTML(book.author)}</div>
                </div>`;
        }

        function displayBooks(books, isComplete) {
            // Series/Saga mode renders a grouped grid instead of the flat book
            // list; every existing call site (loadBooks, reRender, search)
            // routes here so this single guard keeps them all correct.
            if (sortMode === 'series') { renderSeriesGrid(); return; }
            if (sortMode === 'saga') { renderSagaGrid(); return; }

            const content = document.getElementById('content');

            console.log('Displaying books:', books.length, 'isComplete:', isComplete);

            if (books.length === 0 && currentOffset === 0) {
                content.innerHTML = '<div class="loading">No books found</div>';
                return;
            }

            // Defensive: collapse duplicate ids before rendering. A startup race
            // between loadBooks() and ensureProgressBooksLoaded() can leave the
            // same in-progress book in the array twice; keep the first occurrence
            // so prepended (recently-read) books stay on top.
            const seen = new Set();
            const deduped = books.filter(b => {
                const k = String(b.id);
                if (seen.has(k)) return false;
                seen.add(k);
                return true;
            });
            const sorted = applySort(applyFilter(deduped));
            const booksHTML = sorted.map(b => bookCardHTML(b)).join('');

            content.innerHTML = '<div class="books">' + booksHTML + '</div>' +
                (!isComplete ? '<div class="loading-more">Loading more...</div>' : '');

            // Trigger cover loading lazily as cards scroll into view.
            _lazyLoadCovers();

            // Attach an IntersectionObserver to the sentinel so the next batch
            // loads the moment it scrolls into view — works on desktop and mobile
            // regardless of how the scrollable container is set up.
            _observeSentinel();
        }

        // ---------- Series view ----------
        // A series matches the current format filter if any of its books do.
        function seriesMatchesFilter(s) {
            return applyFilter(s.books).length > 0;
        }
        // One series card: cover of the first book, name, book count, format dots.
        function seriesCardHTML(s) {
            const first = s.books[0] || {};
            const mts = s.mediaTypes || [];
            const hasE = mts.includes('ebook'), hasA = mts.includes('audiobook');
            const fmtDots = `<div class="book-fmt-dots">${hasE ? '<div class="book-fmt-dot ebook"></div>' : ''}${hasA ? '<div class="book-fmt-dot audio"></div>' : ''}</div>`;
            return `
                <div class="book series-card" data-book-id="${first.id}"
                     data-series="${escapeHTML(s.name)}"
                     onclick="openSeriesDetail(this.dataset.series)">
                    <div class="book-cover-wrap">
                        <img data-src="${first.thumbnail || first.cover || ''}" class="book-cover"
                             src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                             onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                        <div class="series-count">${s.count}</div>
                        ${fmtDots}
                    </div>
                    <div class="book-title">${escapeHTML(s.name)}</div>
                    <div class="book-author">${s.count} book${s.count === 1 ? '' : 's'}</div>
                </div>`;
        }
        function renderSeriesGrid() {
            const content = document.getElementById('content');
            if (seriesData === null) {
                if (!seriesLoading) loadSeries();
                content.innerHTML = '<div class="loading">Loading series…</div>';
                return;
            }
            const q = (searchEl.value || '').trim().toLowerCase();
            const list = seriesData
                .filter(seriesMatchesFilter)
                .filter(s => !q || s.name.toLowerCase().includes(q));
            if (!list.length) {
                content.innerHTML = '<div class="loading">No series found</div>';
                return;
            }
            content.innerHTML = '<div class="books">' + list.map(seriesCardHTML).join('') + '</div>';
            _lazyLoadCovers();
        }
        async function loadSeries() {
            seriesLoading = true;
            try {
                const r = await fetch(`${API_URL}/series`);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const d = await r.json();
                seriesData = Array.isArray(d.series) ? d.series : [];
            } catch (e) {
                console.error('series load failed:', e);
                seriesData = [];
            } finally {
                seriesLoading = false;
                if (sortMode === 'series') renderSeriesGrid();
            }
        }
        // Look a book up by id across the home/search set AND the series/saga
        // caches, so onBookOpen works for books rendered only inside a grouped
        // view.
        function findBookById(id) {
            let b = allBooks.find(x => String(x.id) === String(id));
            if (b) return b;
            for (const cache of [seriesData, sagaData]) {
                if (!cache) continue;
                for (const s of cache) {
                    const f = s.books.find(x => String(x.id) === String(id));
                    if (f) return f;
                }
            }
            return null;
        }
        function openSeriesDetail(name) {
            const s = (seriesData || []).find(x => x.name === name);
            if (!s) return;
            document.getElementById('series-detail-title').textContent = s.name;
            const books = applyFilter(s.books);
            document.getElementById('series-detail-list').innerHTML =
                '<div class="books">' + books.map(b => bookCardHTML(b, {showSeriesNum: true})).join('') + '</div>';
            document.getElementById('series-overlay').classList.add('open');
            _lazyLoadCovers(document.getElementById('series-detail-list'));
        }
        function closeSeriesDetail() {
            document.getElementById('series-overlay').classList.remove('open');
        }

        // ---------- Saga view ----------
        // Sagas (Calibre #universe) reuse the series card + detail overlay; only
        // the data source and click handler differ. A saga matches the format
        // filter if any of its books do.
        function sagaCardHTML(s) {
            const first = s.books[0] || {};
            const mts = s.mediaTypes || [];
            const hasE = mts.includes('ebook'), hasA = mts.includes('audiobook');
            const fmtDots = `<div class="book-fmt-dots">${hasE ? '<div class="book-fmt-dot ebook"></div>' : ''}${hasA ? '<div class="book-fmt-dot audio"></div>' : ''}</div>`;
            return `
                <div class="book series-card" data-book-id="${first.id}"
                     data-saga="${escapeHTML(s.name)}"
                     onclick="openSagaDetail(this.dataset.saga)">
                    <div class="book-cover-wrap">
                        <img data-src="${first.thumbnail || first.cover || ''}" class="book-cover"
                             src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"
                             onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                        <div class="series-count">${s.count}</div>
                        ${fmtDots}
                    </div>
                    <div class="book-title">${escapeHTML(s.name)}</div>
                    <div class="book-author">${s.count} book${s.count === 1 ? '' : 's'}</div>
                </div>`;
        }
        function renderSagaGrid() {
            const content = document.getElementById('content');
            if (sagaData === null) {
                if (!sagaLoading) loadSaga();
                content.innerHTML = '<div class="loading">Loading sagas…</div>';
                return;
            }
            const q = (searchEl.value || '').trim().toLowerCase();
            const list = sagaData
                .filter(seriesMatchesFilter)
                .filter(s => !q || s.name.toLowerCase().includes(q));
            if (!list.length) {
                content.innerHTML = '<div class="loading">No sagas found</div>';
                return;
            }
            content.innerHTML = '<div class="books">' + list.map(sagaCardHTML).join('') + '</div>';
            _lazyLoadCovers();
        }
        async function loadSaga() {
            sagaLoading = true;
            try {
                const r = await fetch(`${API_URL}/saga`);
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const d = await r.json();
                sagaData = Array.isArray(d.sagas) ? d.sagas : [];
            } catch (e) {
                console.error('saga load failed:', e);
                sagaData = [];
            } finally {
                sagaLoading = false;
                if (sortMode === 'saga') renderSagaGrid();
            }
        }
        function openSagaDetail(name) {
            const s = (sagaData || []).find(x => x.name === name);
            if (!s) return;
            document.getElementById('series-detail-title').textContent = s.name;
            const books = applyFilter(s.books);
            document.getElementById('series-detail-list').innerHTML =
                '<div class="books">' + books.map(b => bookCardHTML(b)).join('') + '</div>';
            document.getElementById('series-overlay').classList.add('open');
            _lazyLoadCovers(document.getElementById('series-detail-list'));
        }

        let _sentinelObserver = null;
        function _observeSentinel() {
            // Disconnect any previous observer so we don't double-fire.
            if (_sentinelObserver) { _sentinelObserver.disconnect(); _sentinelObserver = null; }
            const sentinel = document.querySelector('.loading-more');
            if (!sentinel || searchQuery) return;
            _sentinelObserver = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting) {
                    _sentinelObserver.disconnect();
                    _sentinelObserver = null;
                    loadBooks();
                }
            }, { rootMargin: '200px' }); // start loading 200px before it hits the fold
            _sentinelObserver.observe(sentinel);
        }

        async function openBook(id, format, title) {
            // Cache-bust reader.html via BUILD so HTML edits show up immediately.
            // The reader will pull the book blob from IndexedDB if we already
            // have it, or fetch + cache it on first open. We don't pre-fetch
            // here \u2014 the reader's own cache-then-network path handles it.
            window.location.href = `reader.html?v=${BUILD}&id=${id}&format=${format}&title=${title}`;
        }

        // Open the audiobook player for an ABS item. absId may be the raw ABS id
        // or the "abs:<id>" form audio-only rows carry as their id. For
        // dual-format works we also pass the Calibre ebook id + format so the
        // player can open the reader / in-book search while audio keeps playing.
        // editionId (optional) points at an edition stashed in localStorage so
        // the player can play a multi-part edition back-to-back.
        function openPlayer(absId, title, author, ebookId, ebookFormat, editionId) {
            const raw = String(absId || '').replace(/^abs:/, '');
            let url = `player.html?v=${BUILD}&absId=${encodeURIComponent(raw)}`
                + `&title=${encodeURIComponent(title || '')}`
                + `&author=${encodeURIComponent(author || '')}`;
            if (ebookId) {
                url += `&bookId=${encodeURIComponent(ebookId)}`
                    + `&format=${encodeURIComponent(ebookFormat || 'epub')}`
                    + `&hasEbook=1`;
            }
            if (editionId) url += `&edition=${encodeURIComponent(editionId)}`;
            window.location.href = url;
        }

        // First (lowercased) format for a book, defaulting to epub.
        function ebookFormatOf(book) {
            return ((book.formats || [])[0] || 'epub').toString().toLowerCase();
        }

        // Stash the chosen audio edition (so the player can read its ordered
        // parts) and navigate. Works for both dual-format and audio-only rows.
        function listenToEdition(edition, book) {
            const hasEbook = (book.mediaTypes || ['ebook']).includes('ebook');
            const ebookId = hasEbook ? book.id : '';
            const primary = (edition && edition.absId) || book.absId
                || String(book.id || '').replace(/^abs:/, '');
            let editionId = '';
            if (edition && edition.editionId && (edition.parts || []).length) {
                try {
                    localStorage.setItem('ereader.player.ed:' + edition.editionId,
                        JSON.stringify(edition));
                    editionId = edition.editionId;
                } catch (_) {}
            }
            openPlayer(primary, book.title, book.author,
                ebookId, ebookFormatOf(book), editionId);
        }

        // Tap router for a book card. Ebook-only -> reader; single audio edition
        // -> player; anything with a choice (ebook + audio, or multiple audio
        // editions) -> the format action sheet. Looks the full book up in
        // allBooks so it can read its audioEditions list.
        function onBookOpen(el) {
            // While the long-press menu is open, ignore taps on books — the menu
            // owns the interaction.
            if (bookCtxMenu.classList.contains('open')) return;
            // Swallow the synthesized click that fires right after a dismiss-tap.
            // _menuDismissedAt is 0 until a dismiss happens; after 300 ms it no
            // longer gates anything so genuine follow-on taps are never blocked.
            if (Date.now() - _menuDismissedAt < 300) return;
            const id = el.dataset.bookId;
            // findBookById also searches the series cache so books shown only
            // in the series view keep their audioEditions (format sheet) on tap.
            const book = findBookById(id) || {
                id,
                title: el.dataset.bookTitle || '',
                author: el.dataset.bookAuthor || '',
                formats: [el.dataset.bookFormat || 'epub'],
                mediaTypes: (el.dataset.mediaTypes || 'ebook').split(',').filter(Boolean),
                absId: el.dataset.absId || '',
            };
            const types = book.mediaTypes || ['ebook'];
            const hasAudio = types.includes('audiobook');
            const hasEbook = types.includes('ebook');
            const editions = book.audioEditions || [];
            if (hasEbook && hasAudio) {
                showFormatSheet(book);
            } else if (hasAudio) {
                // Audio-only: skip the sheet unless there's a real choice.
                if (editions.length > 1) showFormatSheet(book);
                else listenToEdition(editions[0] || null, book);
            } else {
                openBook(book.id, ebookFormatOf(book), encodeURIComponent(book.title));
            }
        }

        // ---------- Format action sheet (multi-format works) ----------
        // One "Read" button (when there's an ebook) plus one button per audio
        // edition (Audiobook / Dramatized Audiobook), each tagged with its part
        // count when it's a stitched multi-part set.
        function showFormatSheet(book) {
            const backdrop = document.getElementById('format-sheet-backdrop');
            document.getElementById('format-sheet-title').textContent = book.title;
            const wrap = document.getElementById('format-sheet-btns');
            wrap.innerHTML = '';
            const types = book.mediaTypes || ['ebook'];

            if (types.includes('ebook')) {
                const b = document.createElement('button');
                b.className = 'sheet-btn';
                b.innerHTML = '<span class="sheet-icon">📖</span> Read';
                b.onclick = () => {
                    hideFormatSheet();
                    openBook(book.id, ebookFormatOf(book), encodeURIComponent(book.title));
                };
                wrap.appendChild(b);
            }

            // Fall back to a synthetic single-part edition for legacy rows that
            // carry only a bare absId (no audioEditions list).
            const editions = (book.audioEditions && book.audioEditions.length)
                ? book.audioEditions
                : (book.absId ? [{
                    editionId: 'audiobook:' + book.absId, label: 'Audiobook',
                    absId: book.absId, parts: [{ absId: book.absId }],
                  }] : []);
            editions.forEach(ed => {
                const b = document.createElement('button');
                b.className = 'sheet-btn';
                const n = (ed.parts && ed.parts.length > 1)
                    ? ` <span class="sheet-sub">· ${ed.parts.length} parts</span>` : '';
                b.innerHTML = `<span class="sheet-icon">🎧</span> ${escapeHTML(ed.label || 'Listen')}${n}`;
                b.onclick = () => { hideFormatSheet(); listenToEdition(ed, book); };
                wrap.appendChild(b);
            });
            backdrop.classList.add('open');
        }
        function hideFormatSheet() {
            document.getElementById('format-sheet-backdrop').classList.remove('open');
        }

        // IndexedDB for offline storage (schema MUST match reader.html)
        let db;
        const cachedBookIds = new Set();
        function initDB() {
            const request = indexedDB.open('EreaderDB', 2);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('books')) {
                    db.createObjectStore('books', { keyPath: 'id' });
                }
                if (!db.objectStoreNames.contains('covers')) {
                    db.createObjectStore('covers', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                refreshCachedIds();
                // If books were already rendered before DB was ready,
                // trigger cover loading now.
                _lazyLoadCovers();
            };
        }

        // Populate cachedBookIds so book covers can show a "downloaded" dot.
        function refreshCachedIds() {
            if (!db) return;
            try {
                const tx = db.transaction(['books'], 'readonly');
                const req = tx.objectStore('books').getAllKeys();
                req.onsuccess = () => {
                    cachedBookIds.clear();
                    (req.result || []).forEach(k => cachedBookIds.add(k));
                    if (allBooks.length > 0) reRender();
                };
            } catch (e) { /* ignore */ }
        }

        function reRender() {
            // allBooks already holds either the homeBooks set or the server's
            // search results, so we just re-paint it. Sorting + cached-dot
            // overlay is applied in displayBooks(). Defensive: close any open
            // context menu so its position (pinned to the OLD book's location)
            // doesn't end up pointing at the wrong book after re-sort.
            if (typeof hideBookCtxMenu === 'function') hideBookCtxMenu();
            displayBooks(allBooks, !searchQuery ? homeIsComplete : true);
        }

        const searchEl = document.getElementById('search');
        const searchWrap = document.getElementById('search-wrap');

        function clearSearch() {
            searchEl.value = '';
            searchWrap.classList.remove('has-text');
            searchQuery = '';
            clearTimeout(_searchDebounce);
            if (sortMode === 'series') {
                renderSeriesGrid();
            } else if (sortMode === 'saga') {
                renderSagaGrid();
            } else {
                allBooks = homeBooks;
                currentOffset = homeOffset;
                displayBooks(allBooks, homeIsComplete);
            }
        }

        // X button — clear without stealing focus from the input.
        document.getElementById('search-clear').addEventListener('mousedown', e => {
            e.preventDefault(); // don't blur the input
        });
        document.getElementById('search-clear').addEventListener('click', () => {
            clearSearch();
            searchEl.focus();
        });

        // Tapping into the box after a previous search clears it so the user
        // doesn't have to manually select-all before typing a new query.
        searchEl.addEventListener('focus', () => {
            if (searchEl.value.trim()) clearSearch();
        });

        // Pressing Enter dismisses the keyboard — never let focus advance.
        searchEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); }
        });

        // Debounce input so we don't fire a Calibre query on every keystroke.
        let _searchDebounce = null;
        searchEl.addEventListener('input', (e) => {
            const v = e.target.value.trim();
            searchWrap.classList.toggle('has-text', v.length > 0);
            searchQuery = v.toLowerCase();
            clearTimeout(_searchDebounce);
            _searchDebounce = setTimeout(() => {
                if (sortMode === 'series') {
                    // Series mode: filter the already-loaded series list client-side.
                    renderSeriesGrid();
                } else if (sortMode === 'saga') {
                    // Saga mode: filter the already-loaded saga list client-side.
                    renderSagaGrid();
                } else if (!v) {
                    // Restore the home (lazy-paged) view exactly as it was.
                    allBooks = homeBooks;
                    currentOffset = homeOffset;
                    displayBooks(allBooks, homeIsComplete);
                } else {
                    runServerSearch(v);
                }
            }, 250);
        });
        // Sort pills (Author | Title) — mutually exclusive.
        document.getElementById('sort-pills').addEventListener('click', e => {
            const btn = e.target.closest('.pill[data-sort]');
            if (!btn) return;
            sortMode = btn.dataset.sort;
            document.querySelectorAll('#sort-pills .pill').forEach(p =>
                p.classList.toggle('active', p === btn));
            try { localStorage.setItem('ereader.sortMode', sortMode); } catch (_) {}
            reRender();
        });

        // Format filter pills (All | Ebook | Audio | Dual) — mutually exclusive.
        document.getElementById('fmt-pills').addEventListener('click', e => {
            const btn = e.target.closest('.pill[data-fmt]');
            if (!btn) return;
            formatFilter = btn.dataset.fmt;
            document.querySelectorAll('#fmt-pills .pill').forEach(p =>
                p.classList.toggle('active', p === btn));
            try { localStorage.setItem('ereader.formatFilter', formatFilter); } catch (_) {}
            reRender();
        });

        // Restore previously chosen sort + format filter on load.
        try {
            const savedSort = localStorage.getItem('ereader.sortMode');
            // 'recent' was a valid value in an old version — treat it as 'author'.
            if (savedSort === 'author' || savedSort === 'title' || savedSort === 'series' || savedSort === 'saga') {
                sortMode = savedSort;
                document.querySelectorAll('#sort-pills .pill').forEach(p =>
                    p.classList.toggle('active', p.dataset.sort === sortMode));
            }
            const savedFmt = localStorage.getItem('ereader.formatFilter');
            if (savedFmt && ['all','ebook','audiobook','dual'].includes(savedFmt)) {
                formatFilter = savedFmt;
                document.querySelectorAll('#fmt-pills .pill').forEach(p =>
                    p.classList.toggle('active', p.dataset.fmt === formatFilter));
            }
        } catch (_) {}
