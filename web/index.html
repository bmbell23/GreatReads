<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Tell the WebView not to use its HTTP cache for this page -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>GreatReads</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #121212;
            color: #fff;
            padding: 0;
            overflow-x: hidden;
            /* Reserve room for the fixed .status-bar so the first row of book
               covers isn't clipped under it. Must equal the bar's height. */
            padding-top: 84px;
        }
        /* Top transparent status/toolbar.
           Row 1: clock (left) + version (right) — 28px tall
           Row 2: search input + sort dropdown — 56px tall */
        .status-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99999;
            background: rgba(18, 18, 18, 0.85);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
        }
        .status-bar-row1 {
            position: relative;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;   /* brand is centred in the row */
            padding: 0 36px;           /* inset from curved-screen edges */
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 0.3px;
        }
        /* Clock — pinned to the left with the same inset as the padding. */
        #status-clock {
            position: absolute;
            left: 36px;
            pointer-events: none;
        }
        /* Build stamp — pinned to the right; tappable to download update. */
        #build-stamp {
            position: absolute;
            right: 36px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            text-decoration: none;
        }
        /* Brand wordmark — purple→pink→blue gradient sampled from the
           GreatReads launcher icon. Perfectly centred between the two pins. */
        .brand {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 0.4px;
            background: linear-gradient(90deg, #4067EF 0%, #8640C0 50%, #C940B0 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            pointer-events: none;
        }
        .status-bar-row2 {
            display: flex;
            gap: 8px;
            padding: 6px 10px 10px 10px;
            align-items: center;
        }
        .search {
            flex: 1;
            padding: 10px 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            min-width: 0;
        }
        .sort-select {
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            padding: 10px 8px;
            -webkit-appearance: none;
            appearance: none;
        }
        .icon-btn {
            background: #2a2a2a;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            padding: 8px 12px;
            cursor: pointer;
            line-height: 1;
        }
        .menu-popup {
            position: fixed;
            top: 84px;
            right: 8px;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.5);
            z-index: 100000;
            min-width: 180px;
            display: none;
        }
        .menu-popup.open { display: block; }
        .menu-popup button {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        .menu-popup button:active { background: #3a3a3a; }
        /* Per-book context menu — shown on right-click (desktop) or long-press
           (touch). Position is set inline in JS based on cursor / touch point. */
        .book-context-menu {
            position: fixed;
            background: #2a2a2a;
            border-radius: 8px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.6);
            z-index: 100002;
            min-width: 200px;
            display: none;
            overflow: hidden;
        }
        .book-context-menu.open { display: block; }
        .book-context-menu .ctx-header {
            padding: 10px 14px;
            font-size: 12px;
            color: #888;
            border-bottom: 1px solid #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 280px;
        }
        .book-context-menu button {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            text-align: left;
            padding: 12px 16px;
            font-size: 14px;
            cursor: pointer;
        }
        .book-context-menu button:active { background: #3a3a3a; }
        .book-context-menu button.danger { color: #ff7676; }
        /* Full-screen overlay for the highlights/bookmarks browser. */
        .overlay {
            position: fixed;
            inset: 0;
            background: #121212;
            z-index: 100001;
            display: none;
            flex-direction: column;
            /* Matches the fixed .overlay-header (title row + search row). */
            padding-top: 112px;
        }
        .overlay.open { display: flex; }
        .overlay-header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(18,18,18,0.95);
            display: flex; flex-direction: column; align-items: stretch;
            gap: 8px;
            padding: 8px 10px 10px 10px;
        }
        .overlay-header-row {
            display: flex; align-items: center; gap: 8px;
        }
        .overlay-title {
            flex: 1; font-size: 18px; font-weight: 600; color: #fff;
            padding: 0 4px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .overlay-header input {
            flex: 1; padding: 10px 12px; background: #2a2a2a;
            border: none; border-radius: 8px; color: #fff; font-size: 14px;
        }
        .overlay-list {
            flex: 1; overflow-y: auto; padding: 12px;
        }
        /* Per-book group: bold heading, items stacked under it. */
        .hl-group { margin-bottom: 18px; }
        .hl-group-head {
            position: sticky; top: 0;
            background: rgba(18,18,18,0.95);
            padding: 8px 4px 6px 4px;
            margin-bottom: 6px;
            display: flex; align-items: baseline; gap: 8px;
            border-bottom: 1px solid #333;
            z-index: 1;
        }
        .hl-group-title {
            font-size: 15px; font-weight: 700; color: #fff;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            flex: 1;
        }
        .hl-group-author { color: #999; font-size: 12px; font-weight: 400; }
        .hl-group-count {
            color: #888; font-size: 11px;
            background: #2a2a2a; padding: 2px 8px; border-radius: 10px;
        }
        .hl-item {
            background: #1e1e1e; border-radius: 8px; padding: 12px;
            margin-bottom: 10px; border-left: 4px solid #4caf50;
        }
        .hl-item.bookmark { border-left-color: #2196f3; }
        .hl-meta { color: #888; font-size: 11px; margin-bottom: 4px; }
        .hl-text { color: #ddd; font-size: 14px; line-height: 1.4; white-space: pre-wrap; }
        .hl-actions { margin-top: 8px; display: flex; gap: 8px; }
        .hl-actions button {
            background: #2a2a2a; border: none; border-radius: 6px;
            color: #fff; padding: 6px 10px; font-size: 12px; cursor: pointer;
        }
        .hl-actions button.danger { background: #5a2222; }
        .books {
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
        }
        .book {
            cursor: pointer;
            transition: transform 0.2s;
            position: relative;
        }
        .book:active {
            transform: scale(0.95);
        }
        .book-cover-wrap {
            position: relative;
            margin-bottom: 8px;
        }
        .book-cover {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            object-fit: cover;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: block;
        }
        /* Reading-progress bar over the bottom of a book cover */
        .book-progress {
            position: absolute;
            left: 4px;
            right: 4px;
            bottom: 4px;
            height: 4px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 2px;
            overflow: hidden;
        }
        .book-progress-fill {
            height: 100%;
            background: #4caf50;
        }
        .book-cached-dot {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            box-shadow: 0 0 4px rgba(0,0,0,0.6);
        }
        .book-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            line-height: 1.3;
        }
        .book-author {
            color: #aaa;
            font-size: 11px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .loading-more {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            background: #ff5252;
            color: #fff;
            padding: 15px;
            margin: 20px;
            border-radius: 8px;
        }
        /* Settings overlay — single-row header, so less top padding than hl overlay */
        .overlay.settings-overlay { padding-top: 60px; }
        .setting-section {
            font-size: 11px; font-weight: 700; letter-spacing: 1px;
            text-transform: uppercase; color: #888;
            padding: 20px 4px 8px 4px;
        }
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 4px; border-bottom: 1px solid #222;
            gap: 12px;
        }
        .setting-row-label { color: #ddd; font-size: 15px; flex: 1; }
        .setting-url-row {
            padding: 12px 4px; border-bottom: 1px solid #222;
        }
        .setting-url-label { display: block; color: #888; font-size: 12px; margin-bottom: 6px; }
        .setting-url-row input {
            width: 100%; padding: 10px 12px;
            background: #2a2a2a; border: none; border-radius: 8px;
            color: #fff; font-size: 13px; box-sizing: border-box;
        }
        .setting-hint { color: #555; font-size: 11px; margin-top: 4px; line-height: 1.4; }
        .setting-save-btn {
            display: block; width: 100%; margin-top: 20px;
            padding: 14px; background: #4067EF; border: none; border-radius: 10px;
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
        }
        /* Toggle switch */
        .toggle-switch {
            position: relative; display: inline-block;
            width: 50px; height: 28px; flex-shrink: 0;
        }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .toggle-track {
            position: absolute; inset: 0;
            background: #444; border-radius: 14px; transition: background 0.2s;
        }
        .toggle-switch input:checked + .toggle-track { background: #4067EF; }
        .toggle-thumb {
            position: absolute; top: 4px; left: 4px;
            width: 20px; height: 20px; background: #fff;
            border-radius: 50%; transition: transform 0.2s;
        }
        .toggle-switch input:checked + .toggle-track .toggle-thumb { transform: translateX(22px); }
    </style>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar-row1">
            <span id="status-clock"></span>
            <span class="brand">GreatReads</span>
            <span id="build-stamp"></span>
        </div>
        <div class="status-bar-row2">
            <input type="text" class="search" id="search" placeholder="Search books…">
            <select class="sort-select" id="sort-select" title="Sort">
                <option value="author">Author</option>
                <option value="title">Title</option>
                <option value="recent">Recently read</option>
            </select>
            <button class="icon-btn" id="menu-btn" title="Menu" aria-label="Menu">☰</button>
        </div>
    </div>

    <div class="menu-popup" id="menu-popup">
        <button id="menu-highlights">✏️ Highlights</button>
        <button id="menu-bookmarks">🔖 Bookmarks</button>
        <button id="menu-settings">⚙️ Settings</button>
    </div>

    <!-- Per-book context menu (right-click on desktop, long-press on touch). -->
    <div class="book-context-menu" id="book-ctx-menu">
        <div class="ctx-header" id="book-ctx-title"></div>
        <button id="ctx-clear-progress" class="danger">🗑️ Clear Reading Progress</button>
    </div>

    <!-- Settings overlay -->
    <div class="overlay settings-overlay" id="settings-overlay">
        <div class="overlay-header">
            <div class="overlay-header-row">
                <button class="icon-btn" onclick="closeSettings()" title="Back">←</button>
                <div class="overlay-title">Settings</div>
            </div>
        </div>
        <div class="overlay-list">
            <!-- Display section -->
            <div class="setting-section">Display</div>
            <div class="setting-row">
                <span class="setting-row-label">Keep screen awake while reading</span>
                <label class="toggle-switch" title="Keep screen on">
                    <input type="checkbox" id="setting-keep-awake">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
            </div>

            <!-- Lookup URLs section -->
            <div class="setting-section">Lookup URLs</div>
            <div class="setting-url-row">
                <label class="setting-url-label" for="setting-dict-url">Dictionary URL pattern</label>
                <input type="text" id="setting-dict-url"
                       placeholder="https://www.merriam-webster.com/dictionary/{word}">
                <div class="setting-hint">Use <code>{word}</code> where the highlighted text goes.</div>
            </div>
            <div class="setting-url-row">
                <label class="setting-url-label" for="setting-wiki-url">Wiki / fandom URL pattern</label>
                <input type="text" id="setting-wiki-url"
                       placeholder="https://en.wikipedia.org/wiki/Special:Search?search={word}">
                <div class="setting-hint">Use <code>{word}</code> as the placeholder. Per-fandom wikis work — e.g. <code>https://redrising.fandom.com/wiki/Special:Search?query={word}</code></div>
            </div>

            <button class="setting-save-btn" onclick="saveSettings()">Save Settings</button>
        </div>
    </div>

    <!-- Highlights/Bookmarks overlay. The header title and search
         placeholder are updated by openOverlay() based on the type. -->
    <div class="overlay" id="hl-overlay" data-type="">
        <div class="overlay-header">
            <div class="overlay-header-row">
                <button class="icon-btn" onclick="closeHighlights()" title="Back">←</button>
                <div class="overlay-title" id="hl-title">Highlights</div>
            </div>
            <input type="text" id="hl-search" placeholder="Search…">
        </div>
        <div class="overlay-list" id="hl-list">
            <div class="loading">Loading…</div>
        </div>
    </div>

    <div id="content">
        <div class="loading">Loading your library...</div>
    </div>

    <script>
        // Build stamp: YYMMDD-HH:MM, generated fresh each page load so it
        // always reflects when the user last refreshed (also serves as a
        // lightweight cache-bust token). Tapping it navigates to the APK.
        const APK_URL = 'http://100.69.184.113:8090/ereader.apk';
        const buildStamp = document.getElementById('build-stamp');
        function fmtStamp() {
            const n = new Date();
            const yy = String(n.getFullYear()).slice(2);
            const mm = String(n.getMonth() + 1).padStart(2, '0');
            const dd = String(n.getDate()).padStart(2, '0');
            const hh = String(n.getHours()).padStart(2, '0');
            const mi = String(n.getMinutes()).padStart(2, '0');
            return `${yy}${mm}${dd}-${hh}:${mi}`;
        }
        const BUILD = fmtStamp();   // reused as cache-bust token in openBook()
        buildStamp.textContent = BUILD;
        buildStamp.title = 'Tap to download latest APK';
        buildStamp.addEventListener('click', () => {
            // Use a hidden <a download> so Android's DownloadListener fires
            // instead of navigating the WebView away from the page.
            const a = document.createElement('a');
            a.href = APK_URL;
            a.download = 'ereader.apk';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });

        // Status-bar clock (HH:MM, 24h)
        function tickClock() {
            const d = new Date();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            document.getElementById('status-clock').textContent = hh + ':' + mm;
        }
        tickClock();
        setInterval(tickClock, 30000);

        const API_URL = 'http://100.69.184.113:8091/api';
        let allBooks = [];
        let displayedBooks = [];
        let currentOffset = 0;
        const BATCH_SIZE = 50;
        let isLoading = false;
        let searchQuery = '';
        let sortMode = 'author';  // 'author' | 'title' | 'recent'
        // Snapshot of the non-search ("home") library + scroll position so we
        // can restore them when the user clears the search box. Without this,
        // clearing search would lose everything we'd lazily paged in.
        let homeBooks = [];
        let homeOffset = 0;
        let homeIsComplete = false;
        let searchAbortCtl = null;
        let searchSeq = 0;

        // Reading-state lookup (mirrors reader.html STATE_KEY format)
        function readingStateFor(id) {
            try {
                const raw = localStorage.getItem('ereader.state.' + id);
                return raw ? JSON.parse(raw) : null;
            } catch (e) { return null; }
        }

        async function loadBooks() {
            // Don't lazy-page while a search is active \u2014 search owns the result
            // set and infinite scroll would corrupt it.
            if (isLoading || searchQuery) return;
            isLoading = true;

            try {
                const url = `${API_URL}/books?limit=${BATCH_SIZE}&offset=${currentOffset}`;
                console.log('Fetching books from:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                const newBooks = data.books || [];

                // Deduplicate against books already in homeBooks (e.g. ones
                // prepended by ensureProgressBooksLoaded() on startup).
                const existingIds = new Set(homeBooks.map(b => String(b.id)));
                const uniqueNew = newBooks.filter(b => !existingIds.has(String(b.id)));
                homeBooks = homeBooks.concat(uniqueNew);
                homeOffset += newBooks.length; // advance by server batch size, not deduped count
                homeIsComplete = newBooks.length < BATCH_SIZE;
                allBooks = homeBooks;
                currentOffset = homeOffset;

                displayBooks(allBooks, homeIsComplete);
            } catch (error) {
                console.error('Error loading books:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        Failed to load books: ${error.message}<br>
                        Check console for details.
                    </div>
                `;
            } finally {
                isLoading = false;
            }
        }

        // Server-side search across the WHOLE Calibre library, not just what's
        // currently loaded. Builds a Calibre-style query that matches title OR
        // author. Debounced + sequence-checked so a slow earlier response
        // can't clobber a faster later one.
        async function runServerSearch(q) {
            const mySeq = ++searchSeq;
            if (searchAbortCtl) searchAbortCtl.abort();
            searchAbortCtl = new AbortController();

            // Calibre query language: `title:"foo" or author:"foo"`. Quoting
            // keeps multi-word phrases intact and escapes the user input.
            const safe = q.replace(/"/g, '\\"');
            const calibreQuery = `title:"${safe}" or authors:"${safe}"`;
            const url = `${API_URL}/books?limit=200&offset=0&query=${encodeURIComponent(calibreQuery)}`;

            try {
                const response = await fetch(url, { signal: searchAbortCtl.signal });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (mySeq !== searchSeq) return; // a newer search supersedes us
                const results = data.books || [];
                allBooks = results;
                displayBooks(results, true);
            } catch (e) {
                if (e.name === 'AbortError') return;
                console.error('Search failed:', e);
            }
        }

        function escapeHTML(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
            }[c]));
        }

        // bookId -> backend progress record (most importantly: `updated` ms).
        // Populated by ensureProgressBooksLoaded(); enriches the "recent" sort
        // so it works for ALL in-progress books — including ones the user
        // hasn't yet paged into view via infinite scroll, and ones whose
        // progress was set on another device (no localStorage entry here).
        const progressMap = new Map();
        // Track ids we've already inserted so reRenders don't refetch.
        const mergedProgressIds = new Set();
        let progressLoadedAt = 0;

        // Best-available "last read" timestamp for a book — backend mtime wins
        // (cross-device + survives WebView storage wipes); localStorage `ts`
        // as a fallback for books we've read here but the server hasn't seen.
        function recentTsFor(id) {
            const p = progressMap.get(String(id));
            if (p && typeof p.updated === 'number') return p.updated;
            const s = readingStateFor(id);
            return s && typeof s.ts === 'number' ? s.ts : 0;
        }

        function applySort(list) {
            const arr = list.slice();
            if (sortMode === 'title') {
                arr.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            } else if (sortMode === 'recent') {
                arr.sort((a, b) => recentTsFor(b.id) - recentTsFor(a.id));
            }
            // 'author' is the backend's natural order; leave as-is.
            return arr;
        }

        // Pull the full per-book progress list, then make sure every
        // in-progress book is actually present in `homeBooks` — fetching
        // metadata for any that haven't been paged in yet. This is what
        // makes "Recently read" land an actively-read book at the top
        // WITHOUT scrolling the entire library. Backend already returns
        // records sorted newest-first; we just need their ids + mtimes.
        async function ensureProgressBooksLoaded() {
            try {
                const res = await fetch(`${API_URL}/progress`);
                if (!res.ok) return;
                const data = await res.json();
                const items = Array.isArray(data.items) ? data.items : [];
                progressMap.clear();
                for (const it of items) {
                    if (it && it.bookId) progressMap.set(String(it.bookId), it);
                }
                progressLoadedAt = Date.now();

                // Which in-progress books aren't in homeBooks yet?
                const have = new Set(homeBooks.map(b => String(b.id)));
                const missing = items
                    .map(it => String(it.bookId))
                    .filter(id => id && !have.has(id) && !mergedProgressIds.has(id));

                if (missing.length === 0) {
                    reRender();
                    return;
                }

                // Fetch missing metadata in parallel (small N — only the
                // books with progress, not the whole library). Tolerate
                // individual failures (book may have been removed from
                // Calibre since progress was last written).
                const fetched = await Promise.all(missing.map(async id => {
                    try {
                        const r = await fetch(`${API_URL}/books/${encodeURIComponent(id)}`);
                        if (!r.ok) return null;
                        const b = await r.json();
                        return (b && b.id != null) ? b : null;
                    } catch (_) { return null; }
                }));

                // Prepend the new ones so they're visible at the top of the
                // recent-sorted view immediately; applySort will then order
                // them by their backend `updated` timestamp.
                const merged = [];
                for (const b of fetched) {
                    if (b && !have.has(String(b.id))) {
                        merged.push(b);
                        have.add(String(b.id));
                        mergedProgressIds.add(String(b.id));
                    }
                }
                if (merged.length) {
                    homeBooks = merged.concat(homeBooks);
                    if (!searchQuery) allBooks = homeBooks;
                }
                reRender();
            } catch (e) {
                console.warn('progress fetch failed:', e);
            }
        }

        function displayBooks(books, isComplete) {
            const content = document.getElementById('content');

            console.log('Displaying books:', books.length, 'isComplete:', isComplete);

            if (books.length === 0 && currentOffset === 0) {
                content.innerHTML = '<div class="loading">No books found</div>';
                return;
            }

            const sorted = applySort(books);

            const booksHTML = sorted.map(book => {
                const format = (book.formats[0] || 'epub').toLowerCase();
                const coverUrl = book.cover || book.thumbnail;
                const state = readingStateFor(book.id);
                const progressPct = state && state.progress != null
                    ? Math.round(((state.page + 1) / state.total) * 100) : 0;
                const cachedDot = cachedBookIds.has(book.id)
                    ? '<div class="book-cached-dot" title="Downloaded"></div>' : '';
                const progressBar = progressPct > 0 ? `
                    <div class="book-progress" title="${progressPct}% read">
                        <div class="book-progress-fill" style="width: ${progressPct}%"></div>
                    </div>` : '';
                return `
                <div class="book" data-book-id="${book.id}"
                     data-book-title="${escapeHTML(book.title)}"
                     data-book-format="${format}"
                     onclick="openBook('${book.id}', '${format}', '${encodeURIComponent(book.title)}')">
                    <div class="book-cover-wrap">
                        <img src="${coverUrl}" class="book-cover" onerror="this.style.background='linear-gradient(135deg, #667eea 0%, #764ba2 100%)'">
                        ${cachedDot}
                        ${progressBar}
                    </div>
                    <div class="book-title">${escapeHTML(book.title)}</div>
                    <div class="book-author">${escapeHTML(book.author)}</div>
                </div>
            `;}).join('');

            content.innerHTML = '<div class="books">' + booksHTML + '</div>' +
                (!isComplete ? '<div class="loading-more">Loading more...</div>' : '');
        }

        async function openBook(id, format, title) {
            // Cache-bust reader.html via BUILD so HTML edits show up immediately.
            // The reader will pull the book blob from IndexedDB if we already
            // have it, or fetch + cache it on first open. We don't pre-fetch
            // here \u2014 the reader's own cache-then-network path handles it.
            window.location.href = `reader.html?v=${BUILD}&id=${id}&format=${format}&title=${title}`;
        }

        // IndexedDB for offline storage (schema MUST match reader.html)
        let db;
        const cachedBookIds = new Set();
        function initDB() {
            const request = indexedDB.open('EreaderDB', 1);
            request.onupgradeneeded = (e) => {
                db = e.target.result;
                if (!db.objectStoreNames.contains('books')) {
                    db.createObjectStore('books', { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => {
                db = e.target.result;
                refreshCachedIds();
            };
        }

        // Populate cachedBookIds so book covers can show a "downloaded" dot.
        function refreshCachedIds() {
            if (!db) return;
            try {
                const tx = db.transaction(['books'], 'readonly');
                const req = tx.objectStore('books').getAllKeys();
                req.onsuccess = () => {
                    cachedBookIds.clear();
                    (req.result || []).forEach(k => cachedBookIds.add(k));
                    if (allBooks.length > 0) reRender();
                };
            } catch (e) { /* ignore */ }
        }

        function reRender() {
            // allBooks already holds either the homeBooks set or the server's
            // search results, so we just re-paint it. Sorting + cached-dot
            // overlay is applied in displayBooks().
            displayBooks(allBooks, !searchQuery ? homeIsComplete : true);
        }

        // Debounce input so we don't fire a Calibre query on every keystroke.
        let _searchDebounce = null;
        document.getElementById('search').addEventListener('input', (e) => {
            const v = e.target.value.trim();
            searchQuery = v.toLowerCase();
            clearTimeout(_searchDebounce);
            _searchDebounce = setTimeout(() => {
                if (!v) {
                    // Restore the home (lazy-paged) view exactly as it was.
                    allBooks = homeBooks;
                    currentOffset = homeOffset;
                    displayBooks(allBooks, homeIsComplete);
                } else {
                    runServerSearch(v);
                }
            }, 250);
        });
        document.getElementById('sort-select').addEventListener('change', (e) => {
            sortMode = e.target.value;
            try { localStorage.setItem('ereader.sortMode', sortMode); } catch (_) {}
            reRender();
            // "Recently read" needs the full set of in-progress books, not
            // just whatever infinite-scroll has paged in so far. The backend
            // /api/progress endpoint already knows them — pull from there.
            if (sortMode === 'recent') ensureProgressBooksLoaded();
        });
        // Restore previously chosen sort
        try {
            const savedSort = localStorage.getItem('ereader.sortMode');
            if (savedSort) {
                sortMode = savedSort;
                document.getElementById('sort-select').value = sortMode;
            }
        } catch (_) {}
        // When returning from the reader, the cached set and reading state may
        // have changed \u2014 refresh on visibility-change. Also re-pull progress
        // so an updated mtime from the reader bubbles into the recent sort.
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) {
                refreshCachedIds();
                ensureProgressBooksLoaded();
            }
        });

        // Infinite scroll
        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
                if (!searchQuery) {
                    loadBooks();
                }
            }
        });

        // ---------- Per-book context menu ----------
        // Triggered by right-click (desktop) or long-press (touch). Currently
        // only "Clear Reading Progress" but designed to grow (metadata edit,
        // cover edit, etc.). The menu is positioned at the pointer/touch
        // point and clamped to the viewport.
        const bookCtxMenu = document.getElementById('book-ctx-menu');
        const bookCtxTitle = document.getElementById('book-ctx-title');
        let _ctxBookId = null;
        let _ctxBookTitle = null;
        let _longPressTimer = null;
        let _longPressFired = false;
        let _longPressStart = null;

        function showBookCtxMenu(x, y, bookEl) {
            _ctxBookId = bookEl.dataset.bookId;
            _ctxBookTitle = bookEl.dataset.bookTitle || '';
            bookCtxTitle.textContent = _ctxBookTitle;
            // Position then clamp to viewport (right/bottom edges).
            bookCtxMenu.style.left = x + 'px';
            bookCtxMenu.style.top = y + 'px';
            bookCtxMenu.classList.add('open');
            const r = bookCtxMenu.getBoundingClientRect();
            const vw = window.innerWidth, vh = window.innerHeight;
            if (r.right > vw - 8) bookCtxMenu.style.left = (vw - r.width - 8) + 'px';
            if (r.bottom > vh - 8) bookCtxMenu.style.top  = (vh - r.height - 8) + 'px';
        }
        function hideBookCtxMenu() {
            bookCtxMenu.classList.remove('open');
            _ctxBookId = null;
        }
        // Dismiss on outside tap / scroll / Escape.
        document.addEventListener('click', (e) => {
            if (bookCtxMenu.classList.contains('open') && !bookCtxMenu.contains(e.target)) {
                hideBookCtxMenu();
            }
        }, true);
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideBookCtxMenu();
        });
        window.addEventListener('scroll', hideBookCtxMenu, true);

        // Right-click (desktop / mouse).
        document.getElementById('content').addEventListener('contextmenu', (e) => {
            const bookEl = e.target.closest('.book');
            if (!bookEl) return;
            e.preventDefault();
            showBookCtxMenu(e.clientX, e.clientY, bookEl);
        });

        // Long-press (touch). Cancel the upcoming `click` so we don't also
        // open the book under the user's finger.
        const contentEl = document.getElementById('content');
        contentEl.addEventListener('touchstart', (e) => {
            const bookEl = e.target.closest('.book');
            if (!bookEl) return;
            _longPressFired = false;
            const t = e.touches[0];
            _longPressStart = { x: t.clientX, y: t.clientY };
            clearTimeout(_longPressTimer);
            _longPressTimer = setTimeout(() => {
                _longPressFired = true;
                showBookCtxMenu(_longPressStart.x, _longPressStart.y, bookEl);
            }, 500);
        }, { passive: true });
        contentEl.addEventListener('touchmove', (e) => {
            // If the finger drifts more than ~10px, cancel the long-press
            // (it's a scroll, not a press).
            if (!_longPressStart) return;
            const t = e.touches[0];
            const dx = t.clientX - _longPressStart.x;
            const dy = t.clientY - _longPressStart.y;
            if (dx*dx + dy*dy > 100) {
                clearTimeout(_longPressTimer);
                _longPressTimer = null;
            }
        }, { passive: true });
        contentEl.addEventListener('touchend', () => {
            clearTimeout(_longPressTimer);
            _longPressTimer = null;
            _longPressStart = null;
        }, { passive: true });
        // Swallow the `click` that follows a long-press so the book doesn't
        // open underneath the menu we just popped up.
        contentEl.addEventListener('click', (e) => {
            if (_longPressFired) {
                _longPressFired = false;
                e.stopPropagation();
                e.preventDefault();
            }
        }, true);

        // Menu actions
        document.getElementById('ctx-clear-progress').addEventListener('click', async () => {
            if (!_ctxBookId) { hideBookCtxMenu(); return; }
            const id = _ctxBookId;
            const title = _ctxBookTitle;
            hideBookCtxMenu();
            if (!confirm(`Clear reading progress for "${title}"?\n\nThis removes your saved page and any per-book state. Highlights and bookmarks are NOT affected.`)) return;
            try { localStorage.removeItem('ereader.state.' + id); } catch (_) {}
            try {
                await fetch(`${API_URL}/progress/${encodeURIComponent(id)}`, { method: 'DELETE' });
            } catch (_) { /* offline / server down — local clear still happened */ }
            // Drop it from the recent-sort map so it stops floating to the top.
            progressMap.delete(String(id));
            mergedProgressIds.delete(String(id));
            reRender();
        });

        // ---------- Hamburger menu ----------
        const menuBtn = document.getElementById('menu-btn');
        const menuPopup = document.getElementById('menu-popup');
        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            menuPopup.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!menuPopup.contains(e.target) && e.target !== menuBtn) {
                menuPopup.classList.remove('open');
            }
        });

        // ---------- Highlights & Bookmarks overlay ----------
        document.getElementById('menu-highlights').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openOverlay('highlight');
        });
        document.getElementById('menu-bookmarks').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openOverlay('bookmark');
        });
        document.getElementById('menu-settings').addEventListener('click', () => {
            menuPopup.classList.remove('open');
            openSettings();
        });

        // ---------- Settings overlay ----------
        const DICT_KEY = 'ereader.lookup.dict';
        const WIKI_KEY = 'ereader.lookup.wiki';
        const DICT_DEFAULT = 'https://www.merriam-webster.com/dictionary/{word}';
        const WIKI_DEFAULT = 'https://en.wikipedia.org/wiki/Special:Search?search={word}';
        const KEEP_AWAKE_KEY = 'ereader.settings.keepAwake';

        function openSettings() {
            // Populate fields from localStorage
            document.getElementById('setting-keep-awake').checked =
                localStorage.getItem(KEEP_AWAKE_KEY) === '1';
            document.getElementById('setting-dict-url').value =
                localStorage.getItem(DICT_KEY) || '';
            document.getElementById('setting-wiki-url').value =
                localStorage.getItem(WIKI_KEY) || '';
            document.getElementById('settings-overlay').classList.add('open');
        }
        function closeSettings() {
            document.getElementById('settings-overlay').classList.remove('open');
        }
        function saveSettings() {
            // Keep awake toggle — save immediately
            const keepAwake = document.getElementById('setting-keep-awake').checked;
            localStorage.setItem(KEEP_AWAKE_KEY, keepAwake ? '1' : '0');
            // Lookup URLs — save (or reset to default if blank)
            const dict = document.getElementById('setting-dict-url').value.trim() || DICT_DEFAULT;
            const wiki = document.getElementById('setting-wiki-url').value.trim() || WIKI_DEFAULT;
            localStorage.setItem(DICT_KEY, dict);
            localStorage.setItem(WIKI_KEY, wiki);
            closeSettings();
        }
        // Auto-save the toggle the instant it's flipped (no need to hit Save for that)
        document.getElementById('setting-keep-awake').addEventListener('change', (e) => {
            localStorage.setItem(KEEP_AWAKE_KEY, e.target.checked ? '1' : '0');
        });

        // ---------- Highlights & Bookmarks open/close ----------
        // Two entry points drive the same overlay, grouped by book, searchable.
        function openOverlay(type) {
            const ov = document.getElementById('hl-overlay');
            ov.dataset.type = type;
            const isBM = (type === 'bookmark');
            document.getElementById('hl-title').textContent = isBM ? 'Bookmarks' : 'Highlights';
            document.getElementById('hl-search').placeholder =
                isBM ? 'Search bookmarks, books, authors…'
                     : 'Search highlights, books, authors…';
            document.getElementById('hl-search').value = '';
            ov.classList.add('open');
            loadHighlights();
        }
        function closeHighlights() {
            document.getElementById('hl-overlay').classList.remove('open');
        }
        let _hlDebounce = null;
        document.getElementById('hl-search').addEventListener('input', () => {
            clearTimeout(_hlDebounce);
            _hlDebounce = setTimeout(loadHighlights, 200);
        });

        async function loadHighlights() {
            const type = document.getElementById('hl-overlay').dataset.type || 'highlight';
            const q = document.getElementById('hl-search').value.trim();
            const list = document.getElementById('hl-list');
            list.innerHTML = '<div class="loading">Loading…</div>';
            const params = new URLSearchParams();
            params.set('type', type);
            if (q) params.set('q', q);
            try {
                const r = await fetch(`${API_URL}/highlights?` + params.toString());
                if (!r.ok) throw new Error('HTTP ' + r.status);
                const data = await r.json();
                renderHighlights(data.items || [], type);
            } catch (e) {
                list.innerHTML = `<div class="error">Failed to load: ${e.message}</div>`;
            }
        }
        function renderHighlights(items, type) {
            const list = document.getElementById('hl-list');
            if (!items.length) {
                const noun = type === 'bookmark' ? 'bookmarks' : 'highlights';
                const verb = type === 'bookmark' ? 'Bookmark a page' : 'Highlight some text';
                list.innerHTML = `<div class="loading">No ${noun} yet. ${verb} in a book to get started.</div>`;
                return;
            }
            // Group by bookId; newest item inside each group bubbles up first.
            const groups = new Map();  // bookId -> { title, author, items: [] }
            for (const it of items) {
                const bid = String(it.bookId);
                if (!groups.has(bid)) {
                    groups.set(bid, {
                        bookId: bid,
                        title:  it.bookTitle || '?',
                        author: it.bookAuthor || '',
                        items: [],
                    });
                }
                groups.get(bid).items.push(it);
            }
            // Order the book groups using the same sort as the main library.
            // applySort needs objects shaped like books — synthesize the
            // minimum it touches and fall through with .bookId so id-based
            // helpers (readingStateFor, etc.) keep working.
            const synthBooks = Array.from(groups.values()).map(g => ({
                id: g.bookId, title: g.title, author: g.author,
            }));
            // Books that aren't in allBooks (deleted from library, etc.)
            // are still synthesized above, so they always render — they
            // just sort by title/recent the same way.
            const ordered = applySort(synthBooks);
            list.innerHTML = ordered.map(b => {
                const g = groups.get(String(b.id));
                if (!g) return '';
                const itemsHTML = g.items.map(it => {
                    const when = new Date(it.created).toLocaleString();
                    const meta = `page ${it.page != null ? it.page + 1 : '?'}${it.total ? '/' + it.total : ''} · ${when}`;
                    const body = it.text || it.note || (it.type === 'bookmark' ? '🔖 Bookmark' : '');
                    return `<div class="hl-item ${it.type}">
                        <div class="hl-meta">${meta}</div>
                        <div class="hl-text">${escapeHTML(body)}</div>
                        <div class="hl-actions">
                            <button onclick="jumpToHighlight('${it.id}', '${it.bookId}', ${it.anchor != null ? it.anchor : 'null'}, ${it.page != null ? it.page : 'null'})">Open in book</button>
                            <button class="danger" onclick="deleteHighlight('${it.id}')">Delete</button>
                        </div>
                    </div>`;
                }).join('');
                return `<div class="hl-group">
                    <div class="hl-group-head">
                        <div class="hl-group-title">${escapeHTML(g.title)}<span class="hl-group-author">${g.author ? ' — ' + escapeHTML(g.author) : ''}</span></div>
                        <div class="hl-group-count">${g.items.length}</div>
                    </div>
                    ${itemsHTML}
                </div>`;
            }).join('');
        }
        window.jumpToHighlight = function(_id, bookId, anchor, page) {
            // Hand off to reader.html. It already reads localStorage state on
            // open; we stash a one-shot jump target so the reader knows to
            // override the saved position with this specific anchor/page.
            try {
                localStorage.setItem('ereader.jump.' + bookId,
                    JSON.stringify({ anchor, page, ts: Date.now() }));
            } catch (_) {}
            // Best-effort lookup of format from loaded books; fall back to epub.
            const b = allBooks.find(x => String(x.id) === String(bookId));
            const fmt = (b && (b.formats || [])[0]) || 'epub';
            const title = (b && b.title) || '';
            location.href = `reader.html?id=${encodeURIComponent(bookId)}&format=${encodeURIComponent(fmt)}&title=${encodeURIComponent(title)}`;
        };
        window.deleteHighlight = async function(id) {
            if (!confirm('Delete this item?')) return;
            try {
                await fetch(`${API_URL}/highlights/${id}`, { method: 'DELETE' });
                loadHighlights();
            } catch (_) {}
        };

        initDB();
        loadBooks();
        // Pull /api/progress in parallel with the first page of books so the
        // "Recently read" sort is correct from the very first paint — and so
        // any in-progress book that wouldn't have been in the first page
        // gets merged into the grid right away.
        ensureProgressBooksLoaded();
    </script>
</body>
</html>
