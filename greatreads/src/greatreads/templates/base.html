<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GreatReads{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', path='/favicon.svg') }}">

    <!-- Apple Touch Icons for iOS Home Screen -->
    <link rel="apple-touch-icon" href="{{ url_for('static', path='/favicon_app_icon.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', path='/favicon_app_icon.png') }}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GreatReads">

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="GreatReads">
    <meta property="og:title" content="{% block og_title %}GreatReads - Your Interactive Reading Tracker{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Track your reading progress, manage your TBR list, and discover your reading patterns with GreatReads.{% endblock %}">
    <meta property="og:image" content="{{ request.url.scheme }}://{{ request.url.netloc }}{{ url_for('static', path='/greatreads_twitter_card.png') }}">
    <meta property="og:image:width" content="1434">
    <meta property="og:image:height" content="717">
    <meta property="og:image:alt" content="GreatReads - Your Interactive Reading Tracker">

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}GreatReads - Your Interactive Reading Tracker{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Track your reading progress, manage your TBR list, and discover your reading patterns.{% endblock %}">
    <meta name="twitter:image" content="{{ request.url.scheme }}://{{ request.url.netloc }}{{ url_for('static', path='/greatreads_twitter_card.png') }}">

    <!-- General Meta Tags -->
    <meta name="description" content="{% block meta_description %}GreatReads is an interactive reading tracker that helps you manage your TBR list, track reading progress, and analyze your reading habits.{% endblock %}">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link href="{{ url_for('static', path='/css/style.css') }}" rel="stylesheet">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Navigation -->
    {% if current_user %}
    <nav class="navbar navbar-expand-lg navbar-dark bookish-header">
        <div class="container">
            <a class="navbar-brand bookish-brand" href="{{ url_for('library_page') }}">
                <i class="fas fa-book-open me-2"></i>
                <span class="brand-text">GreatReads</span>
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <!-- Unified menu. Library is the home; Highlights deep-links into
                         the Ereader overlay (Bookmarks live there as a sub-tab now). -->
                    <li class="nav-item">
                        <a class="nav-link bookish-nav-link" href="{{ url_for('library_page') }}">
                            <i class="fas fa-book"></i>
                            <span class="nav-text">Library</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link bookish-nav-link" href="{{ url_for('tbr_page') }}">
                            <i class="fas fa-list"></i>
                            <span class="nav-text">TBR</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link bookish-nav-link" href="{{ url_for('journal_page') }}">
                            <i class="fas fa-book-reader"></i>
                            <span class="nav-text">Journal</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link bookish-nav-link" href="{{ url_for('highlights_page') }}">
                            <i class="fas fa-highlighter"></i>
                            <span class="nav-text">Highlights</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link bookish-nav-link" href="{{ url_for('stats_page') }}">
                            <i class="fas fa-chart-bar"></i>
                            <span class="nav-text">Stats</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link bookish-nav-link" href="{{ url_for('settings_page') }}">
                            <i class="fas fa-cog"></i>
                            <span class="nav-text">Settings</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    {% else %}
    <!-- Simple header for login page -->
    <nav class="navbar navbar-dark bookish-header">
        <div class="container">
            <a class="navbar-brand bookish-brand mx-auto" href="#">
                <i class="fas fa-book-open me-2"></i>
                <span class="brand-text">GreatReads</span>
            </a>
        </div>
    </nav>
    {% endif %}

    <!-- Main Content -->
    <main class="container mt-3">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-light mt-5 py-4">
        <div class="container text-center">
            <p class="text-muted mb-0">
                <i class="fas fa-book me-1"></i>
                GreatReads - Your Interactive Reading Tracker
            </p>
        </div>
    </footer>

    <!-- Base path configuration -->
    <script>
        // Set the base path for API calls (handles reverse proxy scenarios)
        window.APP_BASE_PATH = '{{ request.scope.get("root_path", "") }}';

        // Logout function
        async function logout() {
            try {
                const response = await fetch(`${window.APP_BASE_PATH}/api/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });

                if (response.ok) {
                    window.location.href = `${window.APP_BASE_PATH}/login`;
                } else {
                    console.error('Logout failed');
                    window.location.href = `${window.APP_BASE_PATH}/login`;
                }
            } catch (error) {
                console.error('Error during logout:', error);
                window.location.href = `${window.APP_BASE_PATH}/login`;
            }
        }
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Axios for API calls -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.5.0/dist/axios.min.js"></script>

    <!-- SortableJS for drag and drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', path='/js/app.js') }}?v=2.0.10"></script>

    <!-- Load left-handed mode setting -->
    <script>
    // Load and apply left-handed mode setting
    async function loadLeftHandedModeSetting() {
        try {
            const response = await GreatReads.apiCall('/settings/left_handed_mode');
            const isLeftHanded = response.setting_value === 'true';
            console.log('Left-handed mode setting:', isLeftHanded);

            const navbar = document.querySelector('.navbar .container');
            if (navbar) {
                if (isLeftHanded) {
                    document.documentElement.classList.add('left-handed-mode');
                    document.body.classList.add('left-handed-mode');
                    console.log('Applied left-handed-mode class');
                } else {
                    document.documentElement.classList.remove('left-handed-mode');
                    document.body.classList.remove('left-handed-mode');
                }
            }
        } catch (error) {
            // Setting not found, default to right-handed (do nothing)
            console.log('Left-handed mode setting not found, using default (right-handed)');
        }
    }

    // Try to load as early as possible
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', loadLeftHandedModeSetting);
    } else {
        loadLeftHandedModeSetting();
    }
    </script>

    <!-- Mountain Time clock -->
    <script>
    (function () {
        const clockEl = document.getElementById('header-clock-time');
        if (!clockEl) return;

        function tick() {
            try {
                const now = new Date();
                const mt = now.toLocaleTimeString('en-US', {
                    timeZone: 'America/Denver',
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: true
                });
                clockEl.textContent = mt;
            } catch (e) {
                clockEl.textContent = '';
            }
        }

        tick();
        setInterval(tick, 1000);
    })();
    </script>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
