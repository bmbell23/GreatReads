{% extends "base.html" %}

{% block title %}GreatReads - Home{% endblock %}

{% block content %}
<style>
    /* Center the Home content as one column on wide screens, so the stats / daily
       bars / in-progress books all share the same centered width (#84). */
    .home-col { max-width: 720px; margin-left: auto; margin-right: auto; }
    /* Daily per-format goal bars (#76). golden-shimmer is defined globally in
       static/css/style.css (reused from the gold completion glow). */
    .dg-track { position: relative; flex: 1; height: 15px; background: #e9ecef; border-radius: 8px; }
    .dg-fill  { position: absolute; left: 0; top: 0; height: 100%; border-radius: 8px; transition: width .4s ease; }
    /* Completed bars keep their format color; a warm amber glow behind (own
       keyframe, less yellow than the shared golden-shimmer; #81). */
    @keyframes dg-glow {
        0%   { box-shadow: 0 0 12px rgba(240, 160, 25, 0.8); }
        100% { box-shadow: 0 0 22px rgba(240, 160, 25, 1), 0 0 32px rgba(240, 160, 25, 0.6); }
    }
    .dg-fill-complete {
        box-shadow: 0 0 14px rgba(240, 160, 25, 0.9);
        animation: dg-glow 2s ease-in-out infinite alternate;
    }
    .dg-pct {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
        font-size: 0.7rem; font-weight: 700; color: #1a1d20; pointer-events: none;
        /* White outline keeps the % legible once the fill passes under it, on any
           format color (purple/physical was the worst case). */
        text-shadow: -1px -1px 0 rgba(255, 255, 255, 0.95),  1px -1px 0 rgba(255, 255, 255, 0.95),
                     -1px  1px 0 rgba(255, 255, 255, 0.95),  1px  1px 0 rgba(255, 255, 255, 0.95),
                      0    0   3px rgba(255, 255, 255, 0.9);
    }
    /* Today's words (left) and the daily goal (right), inside the bar (#81). */
    .dg-words {
        position: absolute; top: 0; height: 100%; display: flex; align-items: center;
        font-size: 0.62rem; font-weight: 700; color: #1a1d20; pointer-events: none; padding: 0 6px;
        text-shadow: -1px -1px 0 rgba(255, 255, 255, 0.95),  1px -1px 0 rgba(255, 255, 255, 0.95),
                     -1px  1px 0 rgba(255, 255, 255, 0.95),  1px  1px 0 rgba(255, 255, 255, 0.95);
    }
    .dg-words-left  { left: 0; }
    .dg-words-right { right: 0; }
    /* Near-square foldables (e.g. Pixel Fold unfolded, ~5:6–6:5): the in-progress
       cards are otherwise tall enough that the bottom one clips. Compact covers +
       spacing so the list fits. Tall phones (~0.46) and 4:3/3:4 tablets are outside
       this window, so they're untouched (same gating as the #60 player fix). */
    /* Near-square foldables. The two screen resolutions are the same panel rotated,
       so they differ only by which side is longer (~3% in height) — vh can't tell
       them apart. Size the cover by ORIENTATION instead: the taller portrait has
       room for larger covers; the shorter landscape needs smaller ones to still fit
       3 cards without scrolling. Tall phones (<5/6) and 4:3 tablets (>6/5) are
       outside this window and untouched. */
    @media (min-aspect-ratio: 5/6) and (max-aspect-ratio: 1/1) {
        /* portrait foldable (taller) */
        #ip-list { gap: 0.6rem !important; }
        .ip-card .ip-cover { height: 180px !important; width: 120px !important; }
        .ip-card .mb-2 { margin-bottom: 0.35rem !important; }
    }
    @media (min-aspect-ratio: 1/1) and (max-aspect-ratio: 6/5) {
        /* landscape foldable (shorter) — smaller so the list still fits */
        #ip-list { gap: 0.5rem !important; }
        .ip-card .ip-cover { height: 158px !important; width: 105px !important; }
        .ip-card .mb-2 { margin-bottom: 0.3rem !important; }
    }
</style>
<!-- High-level stats first (the 5 counts + this-year momentum), tight padding (#65) -->
<div class="row">
    <div class="col-12 mb-2 home-col">
        <div class="card">
            <div class="card-body py-2">
                <div class="row text-center g-0">
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-book-reader text-success mb-1"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Total<br>Readings</div>
                            <div class="h5 fw-bold text-success mb-0" id="total-readings">-</div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-book text-primary mb-1"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Books<br>Owned</div>
                            <div class="h5 fw-bold text-primary mb-0" id="total-books">-</div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-book mb-1" style="color:#6B4BA3;"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Physical<br>TBR</div>
                            <div class="h5 fw-bold mb-0" style="color:#6B4BA3;" id="physical-tbr">-</div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-headphones mb-1" style="color:#FF6600;"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Audio<br>TBR</div>
                            <div class="h5 fw-bold mb-0" style="color:#FF6600;" id="audio-tbr">-</div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-tablet-alt mb-1" style="color:#0066CC;"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Ebook<br>TBR</div>
                            <div class="h5 fw-bold mb-0" style="color:#0066CC;" id="ebook-tbr">-</div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-trophy text-danger mb-1"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Books<br>This Year</div>
                            <div class="h5 fw-bold text-danger mb-0" id="books-this-year">-</div>
                        </div>
                    </div>
                    <div class="col">
                        <div class="py-1">
                            <i class="fas fa-feather-alt text-secondary mb-1"></i>
                            <div class="small text-muted" style="font-size: 0.72rem; line-height: 1.15;">Words<br>This Year</div>
                            <div class="h5 fw-bold text-secondary mb-0" id="words-this-year">-</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Daily per-format goal progress (#76): today's words vs goal per format.
     Hidden until populated (and stays hidden if no goals are configured). -->
<div class="row">
    <div class="col-12 mb-2 home-col">
        <div class="card d-none" id="daily-goals-card">
            <div class="card-body py-2" id="daily-goals"></div>
        </div>
    </div>
</div>

<!-- Currently Reading (in-progress books live here now, #65; header dropped #76
     to make room for the daily-goal bars above). -->
<div class="row">
    <div class="col-12 mb-2 home-col">
        <div class="card">
            <div class="card-body">
                <div id="currently-reading">
                    <div class="text-center text-muted">
                        <i class="fas fa-spinner fa-spin"></i>
                        Loading current books...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Edit Reading modal — full parity on Home (#72). Replicates TBR's modal; shared
     showEditModal/saveReadingChanges (app.js) drive it and call refreshReadings(). -->
{% endblock %}

{% block extra_scripts %}
<script>
// Slim Home (#65): in-progress books + high-level stats. No quick-action buttons
// or modals — navigate elsewhere via the navbar. Format-dominance theming/breakdown
// is a follow-up once #67 lands; for now cards theme by the reading's designated media.

// Hold the quote loading overlay (#28) until Home's data is actually in, so it
// doesn't lift to a blank screen mid-fetch. Set SYNCHRONOUSLY (at parse time) so
// base.html's lift always sees it; resolved once the loads finish. (#85)
let _homeReadyResolve;
window.__pageReady = new Promise((r) => { _homeReadyResolve = r; });

document.addEventListener('DOMContentLoaded', function() {
    Promise.all([
        loadDashboardStats(),
        loadMomentum(),
        loadDailyGoals(),
        loadCurrentlyReading(),
    ]).catch(() => {}).finally(() => { if (_homeReadyResolve) _homeReadyResolve(); });
});

async function loadDashboardStats() {
    try {
        const stats = await GreatReads.apiCall('/library/stats');
        document.getElementById('total-readings').textContent = stats.total_readings || 0;
        document.getElementById('total-books').textContent = stats.total_books || 0;
        document.getElementById('physical-tbr').textContent = stats.physical_tbr || 0;
        document.getElementById('audio-tbr').textContent = stats.audio_tbr || 0;
        document.getElementById('ebook-tbr').textContent = stats.ebook_tbr || 0;
    } catch (error) {
        console.error('Error loading dashboard stats:', error);
        ['total-readings','total-books','physical-tbr','audio-tbr','ebook-tbr']
            .forEach(id => document.getElementById(id).textContent = '0');
    }
}

// Compact a count: 317679 -> "317K", 2340000 -> "2.34M", <1000 stays as-is.
function fmtCount(n) {
    n = n || 0;
    if (n >= 1000000) return (n / 1000000).toFixed(2) + 'M';
    if (n >= 1000) return Math.floor(n / 1000) + 'K';
    return String(n);
}

async function loadMomentum() {
    try {
        const m = await GreatReads.apiCall('/stats/home-momentum');
        document.getElementById('books-this-year').textContent = m.books_this_year || 0;
        document.getElementById('words-this-year').textContent = fmtCount(m.words_this_year);
    } catch (error) {
        console.error('Error loading momentum:', error);
        document.getElementById('books-this-year').textContent = '0';
        document.getElementById('words-this-year').textContent = '0';
    }
}

// Daily per-format goal bars (#76): today's words vs the per-format daily word
// goal. Mirrors the Stats page Daily Goals (same /settings/reading-speeds +
// /stats/activity sources) so Home and Stats agree. % can exceed 100%; a bar at
// >=100% gets the gold completion glow.
async function loadDailyGoals() {
    const card = document.getElementById('daily-goals-card');
    const host = document.getElementById('daily-goals');
    if (!card || !host) return;
    try {
        const [speeds, activity] = await Promise.all([
            GreatReads.apiCall('/settings/reading-speeds'),
            GreatReads.apiCall('/stats/activity'),
        ]);
        const d = new Date(), p = n => String(n).padStart(2, '0');
        const today = `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
        const dailyWords = (activity && activity.daily_words) || {};
        const dailyMinutes = (activity && activity.daily_minutes) || {};
        // Order: Audio, then Ebook, then Physical (#81).
        const FMTS = [['Audio', 'audio_wpd'], ['Ebook', 'ebook_wpd'], ['Physical', 'physical_wpd']];
        const rows = FMTS.map(([fmt, key]) => {
            const goal = (speeds && speeds[key]) || 0;
            if (goal <= 0) return '';
            const words = ((dailyWords[fmt] || {})[today]) || 0;
            const minutes = ((dailyMinutes[fmt] || {})[today]) || 0;
            const pct = Math.round(words / goal * 100);
            const s = getMediaStyle(fmt);
            const done = pct >= 100;
            // Inside the bar: today's words (left), % (center), goal words (right) — #81.
            return `
                <div class="d-flex align-items-center gap-2 my-1"
                     title="${fmt}: ${words.toLocaleString()} / ${goal.toLocaleString()} words today">
                    <i class="fas fa-${s.icon}" style="color:${s.color}; width:1.25rem; text-align:center;"></i>
                    <div class="dg-track">
                        <div class="dg-fill${done ? ' dg-fill-complete' : ''}"
                             style="width:${Math.min(pct, 100)}%; background:${s.color};"></div>
                        <span class="dg-words dg-words-left">${fmtCount(words)}</span>
                        <span class="dg-pct">${pct}%</span>
                        <span class="dg-words dg-words-right">${fmtCount(goal)}</span>
                    </div>
                    <span class="text-muted" style="min-width:3.6rem; text-align:right; font-size:0.76rem;">${fmtMinutes(minutes)}</span>
                </div>`;
        }).filter(Boolean);
        if (!rows.length) { card.classList.add('d-none'); return; }
        host.innerHTML = rows.join('');
        card.classList.remove('d-none');
    } catch (error) {
        console.error('Error loading daily goals:', error);
        card.classList.add('d-none');
    }
}

// Media icon + color (themes the card by the reading's designated media for now).
function getMediaStyle(media) {
    if (media === 'Ebook')    return { icon: 'tablet-alt', color: '#0066CC' };
    if (media === 'Audio')    return { icon: 'headphones', color: '#FF6600' };
    if (media === 'Physical') return { icon: 'book',       color: '#6B4BA3' };
    return { icon: 'question', color: '#6c757d' };
}

// "2026-06-12" -> "6/12" (parse the parts to avoid timezone shifts).
function formatMD(iso) {
    if (!iso) return '';
    const p = String(iso).split('-');
    if (p.length < 3) return '';
    return `${parseInt(p[1], 10)}/${parseInt(p[2], 10)}`;
}

// Format a minutes value as "Xh Ym" / "Ym".
function fmtMinutes(mins) {
    mins = Math.round(mins || 0);
    if (mins <= 0) return '0m';
    const h = Math.floor(mins / 60), m = mins % 60;
    return h > 0 ? `${h}h ${m}m` : `${m}m`;
}

// Small owned-format icons (like the Library) from media_owned.
function ownedFormatIcons(mediaOwned) {
    if (!mediaOwned || !mediaOwned.length) return '';
    const order = ['Ebook', 'Audio', 'Physical'];
    return '<span class="d-inline-flex gap-2 align-items-center">' +
        order.filter(f => mediaOwned.includes(f)).map(f => {
            const s = getMediaStyle(f);
            return `<i class="fas fa-${s.icon}" style="color:${s.color};" title="${f}"></i>`;
        }).join('') + '</span>';
}

// Per-format dominance + time breakdown (#67, #76): "PCT% · time" per format with
// logged activity. The dominant/primary format is listed first (most-left) so the
// single leading star sits on the far left; other formats follow by words desc.
// No per-entry icons — color-coding carries the format. % = share of cumulative words.
function formatBreakdownHtml(formats, primary) {
    const entries = Object.keys(formats || {})
        .map(f => ({ f, words: formats[f].words || 0, minutes: formats[f].minutes || 0 }))
        .filter(e => e.words > 0 || e.minutes > 0);
    if (!entries.length) return '<div class="mb-2 small text-muted">No reading time logged yet</div>';
    const total = entries.reduce((s, e) => s + e.words, 0) || 1;
    // Most-dominant (highest share) first, descending → least on the right. No star
    // (it conveyed nothing); order + color carry it. Tight gap so all 3 formats fit.
    entries.sort((a, b) => b.words - a.words);
    return '<div class="mb-2 d-flex align-items-center flex-nowrap gap-2" style="font-size:0.78rem; white-space:nowrap;">' +
        entries.map((e, i) => {
            const s = getMediaStyle(e.f);
            const pct = Math.round(e.words / total * 100);
            return `<span style="color:${s.color}; font-weight:${i === 0 ? 700 : 500};" title="${e.f}">`
                + `${pct}% &middot; ${fmtMinutes(e.minutes)}</span>`;
        }).join('') + '</div>';
}

async function loadCurrentlyReading() {
    const container = document.getElementById('currently-reading');
    try {
        const readings = await GreatReads.apiCall('/readings/?status=in_progress&limit=1000');
        homeIPReadings = readings || [];

        if (!readings || readings.length === 0) {
            container.innerHTML = '<p class="text-muted mb-0">No books currently in progress.</p>';
            return;
        }

        // One /stats/book-time call per book → primary_format + per-format split (#67),
        // driving the card theme, the dominance breakdown, and time read.
        const stats = await Promise.all(readings.map(r =>
            GreatReads.apiCall(`/stats/book-time/${r.book.id}`).catch(() => null)));

        container.innerHTML = '<div class="d-flex flex-column gap-3" id="ip-list"></div>';
        const list = document.getElementById('ip-list');

        readings.forEach((reading, i) => {
            const book = reading.book;
            const stat = stats[i] || {};
            const formats = stat.formats || {};
            // Theme by the DERIVED primary format; fall back to declared media.
            const primary = stat.primary_format || reading.media || 'Ebook';
            const mediaStyle = getMediaStyle(primary);
            const coverUrl = `${window.APP_BASE_PATH}/static/covers/${book.id}.jpg`;
            const progress = reading.current_progress_percent || 0;
            const targetPage = reading.current_progress_page || 0;
            const startMD = formatMD(reading.date_started);
            const endMD = formatMD(reading.date_est_end);

            let seriesLine = '';
            if (book.series) {
                seriesLine = book.series + (book.series_number != null ? ` #${book.series_number}` : '');
            }

            const el = document.createElement('div');
            el.className = 'd-flex gap-3 ip-card';
            el.innerHTML = `
                <div class="flex-shrink-0">
                    <div class="ip-cover" style="position: relative; height: 200px; width: 133px; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.15); background: #f8f9fa; display: flex; align-items: center; justify-content: center; border-left: 4px solid ${mediaStyle.color};">
                        ${book.cover ?
                            `<img src="${coverUrl}" class="img-fluid" alt="${book.title}" style="width: 100%; height: 100%; object-fit: cover;" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                             <div style="display: none; width: 100%; height: 100%; align-items: center; justify-content: center; color: #adb5bd;"><i class="fas fa-book fa-3x"></i></div>` :
                            `<i class="fas fa-book fa-3x" style="color: #adb5bd;"></i>`
                        }
                    </div>
                </div>
                <div class="flex-grow-1 d-flex flex-column justify-content-center">
                    <h6 class="mb-1" style="font-size: 1rem; font-weight: 600; line-height: 1.3;">${book.title}</h6>
                    <p class="text-muted mb-1" style="font-size: 0.85rem;">${book.author || ''}</p>
                    ${seriesLine ? `<p class="text-muted mb-2" style="font-size: 0.78rem;">${seriesLine}</p>` : ''}
                    <div class="mb-2 d-flex align-items-center gap-2 flex-wrap">
                        ${ownedFormatIcons(book.media_owned)}
                    </div>
                    ${formatBreakdownHtml(formats, primary)}
                    <div style="position: relative; height: 26px; background-color: #e9ecef; border-radius: 6px; overflow: visible; max-width: 420px;">
                        <div style="position: absolute; left: 0; top: 0; height: 100%; background-color: ${mediaStyle.color}; border-radius: 6px; width: ${progress.toFixed(1)}%;"></div>
                        <div style="position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); font-size: 0.72rem; font-weight: 600; color: #495057; background-color: white; border: 1px solid #dee2e6; border-radius: 12px; padding: 2px 10px; z-index: 1; white-space: nowrap;">
                            ${progress.toFixed(1)}%${targetPage > 0 ? ' · p. ' + targetPage : ''}
                        </div>
                    </div>
                    <div class="d-flex justify-content-between text-muted mt-1" style="max-width: 420px; font-size: 0.72rem;">
                        <span>${startMD ? '<i class="fas fa-play-circle me-1"></i>' + startMD : ''}</span>
                        <span>${endMD ? endMD + '<i class="fas fa-flag-checkered ms-1"></i>' : ''}</span>
                    </div>
                </div>
            `;
            // Tap the card → shared book-actions popup (Read / Listen / physical),
            // same entry point TBR uses. Restores reading from Home (#65).
            el.style.cursor = 'pointer';
            el.addEventListener('click', () => {
                GreatReads.openBookActions(book, {
                    reading,
                    extraInfoHtml: (GreatReads.readingExtraInfoHtml
                        ? GreatReads.readingExtraInfoHtml(reading) : undefined),
                    // Unified popup buttons (#111): Finish is the variable action;
                    // Edit Reading + Edit Book are placed by the shared popup.
                    primaryActionHtml: `<button type="button" class="btn btn-sm btn-outline-success" onclick="homeFinishReading(${reading.id})">
                        <i class="fas fa-flag-checkered me-2 text-success"></i>Finish Book</button>`,
                    editReadingHtml: `<button type="button" class="btn btn-sm btn-outline-secondary" onclick="homeEditReading(${reading.id})">
                        <i class="fas fa-edit me-2 text-primary"></i>Edit Reading</button>`,
                });
            });
            list.appendChild(el);
        });
    } catch (error) {
        console.error('Error loading currently reading:', error);
        container.innerHTML = '<p class="text-danger mb-0">Error loading current books.</p>';
    }
}

// Finish an in-progress book straight from the Home popup (#65 follow-up). Uses the
// shared GreatReads.finishReading; reloads Home after.
async function homeFinishReading(readingId) {
    if (!confirm("Mark this book as finished? You can add ratings next.")) return;
    const m = bootstrap.Modal.getInstance(document.getElementById('openBookModal'));
    if (m) m.hide();
    // finish, then open the review form for ratings (#108)
    await GreatReads.finishAndReview(readingId, () => {
        loadDashboardStats(); loadMomentum(); loadCurrentlyReading();
    });
}

// ── Edit Reading modal (full parity on Home, #72) ─────────────────────────────
// Home replicates TBR's modal + handlers (the established per-page pattern; Journal
// keeps its own slim variant). showEditModal/saveReadingChanges are shared in app.js
// and call refreshReadings(), defined here to reload Home.
let homeIPReadings = [];

// Refresh Home after a shared Edit Book save/delete (#110)
window.bkeHooks = { afterSave: () => refreshReadings(), afterDelete: () => refreshReadings() };
function refreshReadings() {
    loadDashboardStats();
    loadMomentum();
    loadCurrentlyReading();
    loadDailyGoals();   // refresh the per-format daily WPD goal bars too (#log-session live update)
}

function homeEditReading(readingId) {
    // Close the book-detail popup first so the Edit-Reading modal opens on top
    // (not stacked behind it), mirroring TBR's tbrEditFromPopup.
    const popup = bootstrap.Modal.getInstance(document.getElementById('openBookModal'));
    if (popup) popup.hide();
    const reading = homeIPReadings.find(r => r.id === readingId);
    if (reading) GreatReads.showEditModal(reading);
}

function closeEditReadingModal() {
    const m = bootstrap.Modal.getInstance(document.getElementById('editReadingModal'));
    if (m) m.hide();
}

async function startReadingFromModal() {
    const readingId = document.getElementById('editReadingId').value;
    if (!confirm("Start this reading with today's date?")) return;
    try {
        const today = new Date().toISOString().split('T')[0];
        await GreatReads.apiCall(`/readings/${readingId}`, { method: 'PUT', data: { date_started: today, status: 'In Progress' } });
        GreatReads.showToast('Reading started!', 'success');
        closeEditReadingModal();
        await refreshReadings();
    } catch (e) { /* surfaced by apiCall */ }
}

async function startReadingManualFromModal() {
    const readingId = document.getElementById('editReadingId').value;
    const startDate = prompt('Enter start date (YYYY-MM-DD):', new Date().toISOString().split('T')[0]);
    if (!startDate) return;
    try {
        await GreatReads.startReading(readingId, startDate);
        GreatReads.showToast('Reading started with custom date!', 'success');
        closeEditReadingModal();
        await refreshReadings();
    } catch (e) { /* surfaced by apiCall */ }
}

async function pauseReadingFromModal() {
    const readingId = document.getElementById('editReadingId').value;
    if (!confirm('Pause this reading? Progress will be frozen at the current point.')) return;
    try {
        await GreatReads.pauseReading(readingId);
        GreatReads.showToast('Reading paused!', 'success');
        closeEditReadingModal();
        await refreshReadings();
    } catch (e) { /* surfaced by apiCall */ }
}

async function unpauseReadingFromModal() {
    const readingId = document.getElementById('editReadingId').value;
    if (!confirm('Unpause this reading? Progress will resume from where it was paused.')) return;
    try {
        await GreatReads.unpauseReading(readingId);
        GreatReads.showToast('Reading unpaused!', 'success');
        closeEditReadingModal();
        await refreshReadings();
    } catch (e) { /* surfaced by apiCall */ }
}

async function finishReadingFromModal() {
    const readingId = document.getElementById('editReadingId').value;
    if (!confirm("Mark this book as finished? You can add ratings next.")) return;
    // finish, then re-open this form with the finished reading for ratings (#108)
    await GreatReads.finishAndReview(readingId, () => refreshReadings());
}

async function deleteReadingFromModal() {
    const readingId = document.getElementById('editReadingId').value;
    if (!confirm('Are you sure you want to delete this reading? This cannot be undone.')) return;
    try {
        await GreatReads.apiCall(`/readings/${readingId}`, { method: 'DELETE' });
        GreatReads.showToast('Reading deleted successfully!', 'success');
        closeEditReadingModal();
        await refreshReadings();
    } catch (e) {
        GreatReads.showToast('Error deleting reading: ' + e.message, 'error');
    }
}

</script>
{% endblock %}
