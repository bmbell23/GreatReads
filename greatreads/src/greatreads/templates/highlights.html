{% extends "base.html" %}

{% block title %}Highlights - GreatReads{% endblock %}

{% block content %}
<!-- Header: title left, Highlights/Bookmarks toggle top-right (matches the
     action-button placement on Library/TBR/Journal) -->
<div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-2">
    <div class="page-header-bookish mb-0">
        <div class="page-header-icon"><i class="fas fa-highlighter"></i></div>
        <div class="page-header-content"><h1 class="page-header-title mb-0">Highlights</h1></div>
    </div>
    <div class="btn-group hl-subtabs flex-shrink-0" id="hl-subtabs" role="group">
        <button type="button" class="btn btn-primary active" data-hltype="highlight">
            <i class="fas fa-highlighter me-1"></i>Highlights
        </button>
        <button type="button" class="btn btn-outline-primary" data-hltype="bookmark">
            <i class="fas fa-bookmark me-1"></i>Bookmarks
        </button>
    </div>
</div>
<!-- Filled when arriving from a Library card (?book=…) to show which book. -->
<div id="hl-filter-note" class="text-muted small mb-2"></div>

<!-- Search + Sort on one row (search full-width, sort right — like the others) -->
<div class="d-flex gap-2 align-items-center mb-3">
    <div class="position-relative flex-grow-1">
        <input type="text" class="form-control" id="hl-search" autocomplete="off"
               placeholder="Search highlights &amp; bookmarks…">
        <button type="button" class="lib-search-clear" id="hlSearchClear"
                title="Clear" aria-label="Clear" style="display:none;">
            <i class="fas fa-times"></i>
        </button>
    </div>
    <div class="dropdown flex-shrink-0">
        <button class="btn btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" title="Sort">
            <i class="fas fa-sort-amount-up me-1" id="sortDirIcon"></i><span id="sortLabel">Recent</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" id="sortMenu"></ul>
    </div>
</div>

<div id="hl-results">
    <div class="text-center text-muted py-5" id="hl-loading">
        <div class="spinner-border text-secondary" role="status"></div>
        <div class="mt-2">Loading…</div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<style>
/* Compact header + search (mirrors Library/TBR/Journal) */
.page-header-bookish { padding-top: 0; padding-bottom: 0; }
#hl-search { padding-right: 38px; }
.lib-search-clear {
    position: absolute; top: 50%; right: 5px; transform: translateY(-50%);
    width: 30px; height: 30px; border: none; background: transparent;
    color: #adb5bd; cursor: pointer; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
}
.lib-search-clear:hover { color: #6c757d; background: #f1f3f5; }

.hl-book-card { border-left: 4px solid var(--primary-color, #667eea); }
.hl-book-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; }
.hl-book-author { color: #6c757d; font-weight: 400; font-size: 0.9rem; }
.hl-item { padding: 10px 0; border-top: 1px solid #f0f0f0; }
.hl-item:first-of-type { border-top: none; }
.hl-quote {
    border-left: 3px solid #ffd54f; padding: 4px 0 4px 12px; margin: 4px 0;
    color: #333; font-style: italic; white-space: pre-wrap;
}
.hl-item.bookmark .hl-quote { border-left-color: #4aa3ff; font-style: normal; }
.hl-item-meta { font-size: 0.78rem; color: #adb5bd; }
</style>
<script>
const EREADER_API = 'http://100.69.184.113:8091/api';
let hlType = 'highlight';
let hlDebounce = null;
let bookFilter = null;   // calibre bookId when arriving from a Library card
let hlItems = [];        // last-loaded items, so re-sorting doesn't refetch

// Sort state — one control handles field + direction (mirrors the other pages).
// Sorting reorders the per-book groups (highlights are grouped by book).
let sortAscending = false;   // default: most-recently-highlighted book first
let currentSort = 'recent';
const SORT_FIELDS = [
    ['recent', 'Recent'],
    ['author', 'Author'],
    ['count', 'Count'],
    ['title', 'Title'],
];

function getDefaultSortDirection(sortField) {
    // Fields that should default to descending (newest / most first)
    const descendingDefaults = ['recent', 'count'];
    return !descendingDefaults.includes(sortField);
}

// Pick a field (or flip direction if it's already active), then re-render.
function selectSort(field) {
    if (currentSort === field) sortAscending = !sortAscending;
    else { currentSort = field; sortAscending = getDefaultSortDirection(field); }
    renderSortUI();
    renderHL();   // no refetch — just reorder what's loaded
}

function renderSortUI() {
    const cur = SORT_FIELDS.find(f => f[0] === currentSort) || SORT_FIELDS[0];
    document.getElementById('sortLabel').textContent = cur[1];
    document.getElementById('sortDirIcon').className =
        (sortAscending ? 'fas fa-sort-amount-down-alt' : 'fas fa-sort-amount-up') + ' me-1';
    document.getElementById('sortMenu').innerHTML = SORT_FIELDS.map(([val, label]) => {
        const active = val === currentSort;
        const caret = active ? `<i class="fas ${sortAscending ? 'fa-caret-up' : 'fa-caret-down'} ms-3"></i>` : '';
        return `<li><a class="dropdown-item d-flex justify-content-between align-items-center ${active ? 'active' : ''}"
            href="#" data-sort="${val}">${label}${caret}</a></li>`;
    }).join('');
}

// Reflect the active sub-tab as a filled vs outline button (top-right toggle).
function renderSubtabs() {
    document.querySelectorAll('#hl-subtabs [data-hltype]').forEach(b => {
        const on = b.dataset.hltype === hlType;
        b.classList.toggle('btn-primary', on);
        b.classList.toggle('btn-outline-primary', !on);
        b.classList.toggle('active', on);
    });
}

function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}

async function loadHL() {
    const q = document.getElementById('hl-search').value.trim();
    const box = document.getElementById('hl-results');
    box.innerHTML = `<div class="text-center text-muted py-5">
        <div class="spinner-border text-secondary" role="status"></div></div>`;
    const params = new URLSearchParams({ type: hlType });
    if (q) params.set('q', q);
    if (bookFilter) params.set('bookId', bookFilter);
    try {
        const r = await fetch(`${EREADER_API}/highlights?` + params.toString());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();
        hlItems = data.items || [];
        renderHL();
    } catch (e) {
        box.innerHTML = `<div class="alert alert-danger">Failed to load: ${esc(e.message)}</div>`;
    }
}

function renderHL() {
    const items = hlItems;
    const box = document.getElementById('hl-results');
    if (!items.length) {
        const noun = hlType === 'bookmark' ? 'bookmarks' : 'highlights';
        const verb = hlType === 'bookmark' ? 'Bookmark a page' : 'Highlight some text';
        box.innerHTML = `<div class="text-center text-muted py-5">
            <i class="fas fa-${hlType === 'bookmark' ? 'bookmark' : 'highlighter'} fa-2x mb-3 d-block"></i>
            No ${noun} yet. ${verb} in a book to get started.</div>`;
        return;
    }
    // Group by book (API order ≈ newest-first), tracking each book's most-recent
    // timestamp so the groups can be re-ordered by the sort control.
    const groups = new Map();
    for (const it of items) {
        const bid = String(it.bookId);
        if (!groups.has(bid)) groups.set(bid, { bid, title: it.bookTitle || '?', author: it.bookAuthor || '', recent: 0, items: [] });
        const g = groups.get(bid);
        g.items.push(it);
        const ts = it.created ? new Date(it.created).getTime() : 0;
        if (ts > g.recent) g.recent = ts;
    }

    // Order the book groups by the active field + direction.
    const ordered = Array.from(groups.values()).sort((a, b) => {
        let result = 0;
        switch (currentSort) {
            case 'recent': result = a.recent - b.recent; break;
            case 'title':  result = a.title.localeCompare(b.title); break;
            case 'author': result = (a.author || '').localeCompare(b.author || ''); break;
            case 'count':  result = a.items.length - b.items.length; break;
            default:       result = a.recent - b.recent; break;
        }
        return sortAscending ? result : -result;
    });

    let html = '';
    for (const g of ordered) {
        const bid = g.bid;
        const rows = g.items.map(it => {
            const when = it.created ? new Date(it.created).toLocaleDateString() : '';
            const pg = it.page != null ? `p. ${it.page + 1}${it.total ? '/' + it.total : ''}` : '';
            const body = it.text || it.note || (it.type === 'bookmark' ? 'Bookmarked page' : '');
            return `<div class="hl-item ${esc(it.type)}">
                <div class="hl-quote">${esc(body)}</div>
                <div class="d-flex justify-content-between align-items-center mt-1">
                    <span class="hl-item-meta">${[pg, when].filter(Boolean).join(' · ')}</span>
                    <span>
                        <button class="btn btn-sm btn-outline-primary py-0 px-2 hl-open"
                            data-bid="${esc(bid)}" data-title="${esc(g.title)}"
                            data-anchor="${it.anchor != null ? it.anchor : ''}"
                            data-page="${it.page != null ? it.page : ''}">
                            <i class="fas fa-book-open"></i> Open
                        </button>
                        <button class="btn btn-sm btn-outline-danger py-0 px-2 hl-del" data-id="${esc(it.id)}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </span>
                </div>
            </div>`;
        }).join('');
        html += `<div class="card mb-3 hl-book-card">
            <div class="card-body">
                <div class="hl-book-head mb-2">
                    <h5 class="mb-0">${esc(g.title)}<span class="hl-book-author">${g.author ? ' — ' + esc(g.author) : ''}</span></h5>
                    <span class="badge bg-secondary">${g.items.length}</span>
                </div>
                ${rows}
            </div>
        </div>`;
    }
    box.innerHTML = html;
}

// Open the book in the reader at this highlight/bookmark. Reader is served
// same-origin at /reader.html via the proxy; it reads the one-shot jump target
// from localStorage on open.
function jumpHL(bookId, anchor, page, title) {
    try {
        localStorage.setItem('ereader.jump.' + bookId,
            JSON.stringify({ anchor: anchor, page: page, ts: Date.now() }));
    } catch (_) {}
    const v = Date.now();
    window.location.href = `/reader.html?v=${v}&id=${encodeURIComponent(bookId)}&format=epub&title=${encodeURIComponent(title || '')}`;
}

async function deleteHL(id) {
    if (!confirm('Delete this item?')) return;
    try {
        await fetch(`${EREADER_API}/highlights/${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (window.GreatReads && GreatReads.showToast) GreatReads.showToast('Deleted', 'success');
        loadHL();
    } catch (e) {
        if (window.GreatReads && GreatReads.showToast) GreatReads.showToast('Delete failed', 'error');
    }
}

document.addEventListener('DOMContentLoaded', () => {
    // ?book=<calibreId> (from a Library card) filters to one book; show its title
    // and a clear-filter link in the header.
    const qp = new URLSearchParams(location.search);
    bookFilter = qp.get('book');
    if (bookFilter) {
        const t = qp.get('title') ? decodeURIComponent(qp.get('title')) : 'this book';
        const sub = document.getElementById('hl-filter-note');
        if (sub) sub.innerHTML = `Showing highlights for <strong>${esc(t)}</strong> · ` +
            `<a href="{{ url_for('highlights_page') }}">show all</a>`;
    }
    // ?view=bookmarks deep-links straight to the Bookmarks sub-tab.
    const view = qp.get('view');
    if (view === 'bookmarks') hlType = 'bookmark';
    renderSubtabs();
    renderSortUI();

    document.getElementById('hl-subtabs').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-hltype]');
        if (!btn) return;
        hlType = btn.dataset.hltype;
        renderSubtabs();
        loadHL();
    });
    document.getElementById('sortMenu').addEventListener('click', (e) => {
        const a = e.target.closest('[data-sort]');
        if (!a) return;
        e.preventDefault();
        selectSort(a.dataset.sort);
    });
    const hlSearch = document.getElementById('hl-search');
    const hlClear = document.getElementById('hlSearchClear');
    hlSearch.addEventListener('input', () => {
        hlClear.style.display = hlSearch.value ? 'flex' : 'none';
        clearTimeout(hlDebounce);
        hlDebounce = setTimeout(loadHL, 250);
    });
    hlClear.addEventListener('click', () => {
        hlSearch.value = '';
        hlClear.style.display = 'none';
        loadHL();
    });
    // Delegated actions (data attributes avoid inline-onclick quoting issues).
    document.getElementById('hl-results').addEventListener('click', (e) => {
        const open = e.target.closest('.hl-open');
        if (open) {
            const a = open.dataset.anchor === '' ? null : parseInt(open.dataset.anchor, 10);
            const p = open.dataset.page === '' ? null : parseInt(open.dataset.page, 10);
            jumpHL(open.dataset.bid, a, p, open.dataset.title);
            return;
        }
        const del = e.target.closest('.hl-del');
        if (del) deleteHL(del.dataset.id);
    });
    loadHL();
});
</script>
{% endblock %}
