# Isolated, vendored GreatReads service for the Ereader merge (Story 0).
#
# This is NOT the production GreatReads. It is a SEPARATE container on a SEPARATE
# port, using a COPY of the database in ./data. It must never touch the production
# `greatreads_app` container or the production data dir at ../../GreatReads/data.
#
# Run (always with an explicit project name so it can't collide with prod):
#   docker compose -p greatreads_ereader -f greatreads/docker-compose.ereader.yml up -d --build
# Stop just this service (never `down` the whole host stack):
#   docker compose -p greatreads_ereader -f greatreads/docker-compose.ereader.yml stop

services:
  greatreads_ereader:
    build: .                          # context = greatreads/  (uses vendored Dockerfile)
    container_name: greatreads_ereader
    restart: unless-stopped
    ports:
      - "8092:8006"                   # free host port (8090/8091 = Ereader, 8007 = prod GreatReads)
    volumes:
      - ./data:/app/data              # repo-local COPY of the DB + covers (NOT prod ./data)
      # External libraries — READ-ONLY; same host paths as prod compose. Needed for
      # cover fallback now and Calibre/ABS sync later (Story 2). Never written.
      - /home/brandon/projects/docker/calibre/config/library:/calibre:ro
      - /home/brandon/projects/docker/audiobookshelf/data:/audiobookshelf:ro
    environment:
      - HOST=0.0.0.0
      - PORT=8006
      - DEBUG=false
      - TZ=America/Denver
      - DATABASE_URL=sqlite:////app/data/greatreads.db
      - APP_PATH=/greatreads          # matches the reverse-proxy prefix added in Story 1
      - ENABLE_SCHEDULERS=true         # Story 2: this is now canonical prod — sole writer (old :8007 stopped).
      - SECRET_KEY=local-ereader-not-secret
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=43200
      - CALIBRE_DB_PATH=/calibre/metadata.db
      - CALIBRE_LIBRARY_PATH=/calibre
      - ABS_DB_PATH=/audiobookshelf/absdatabase.sqlite
      - ABS_METADATA_PATH=/audiobookshelf/metadata
    networks: [greatreads_ereader_net]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  greatreads_ereader_net:
    driver: bridge
